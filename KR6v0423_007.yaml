body:
  text: 鹽官居士徐昌治覲周甫訂天説一古杭雲棲寺沙門袾宏著一老宿言有異域人為天主教者子何不辨豫以為教人敬天善事也奚辨焉老宿曰彼欲以此移風易俗兼之毀佛謗法賢士良友多信奉故也因出其書示豫乃略辨一二彼雖崇事天主而天之説實所未諳按經以證彼所稱天主者忉利天王一四天下三十三天之主也此一四天下從一數之而至於千名小千世界則有千天主矣又從一小千數之而復至於千名中千世界則有百萬天主矣又從一中千數之而復至於千名大千世界則有萬億天主矣統此三千大千世界者大梵天王是也彼所稱最尊無上之天主梵天視之略似周天子視千八百諸候也彼所知者萬億天主中之一耳餘欲界諸天皆所未知也又上而色界諸天又上而無色界諸天皆所未知也又言天主者無形無色無聲則所謂天者理而已矣何以御臣民施政令行賞罰乎彼雖聰慧未讀佛經何怪乎立言之舛也現前信奉士友皆正人君子表表一時衆所仰瞻以為向背者豫安得避逆耳之嫌而不一其忠告乎惟高明下擇芻蕘而電察焉天説二又問彼云梵網經言一切有生皆宿生父母殺而食之即殺吾父母如是則人亦不得行婚娶是妻妾吾父母也人亦不得置婢僕是役使吾父母也人亦不得乘騾馬是陵跨吾父母也士人僧人不能答如之何豫曰梵網止是深戒殺生故發此論意謂恆沙劫來生生受生生生必有父母安知彼非宿世父母乎蓋恐其或己父母非決其必己父母也若以辭害意舉一例百則儒亦有之禮禁同姓為婚故買妾不知其姓則卜之彼將曰卜而非同姓也則婚之固無害此亦曰娶妻不知其為父母為非父母則卜之卜而非己父母也則娶之亦無害矣禮云倍年以長則父事之今年少居官者何限其羿轎引車張蓋執戟必兒童而後可有長者在焉是以父母為𨽾卒也如其可通行而不礙佛言獨不可通行乎夫男女之嫁娶以至車馬僮僕皆人世之嘗法非殺生之慘毒比也故經止云一切有命者不得殺未嘗云一切有命者不得嫁娶不得使令也如斯設難是謂騁小巧之迂談而欲破大道之明訓也胡再得也復次彼書杜撰不根之語未易悉舉如謂人死其魂嘗在無輪回者既魂嘗在禹湯文武何不一誡訓於桀紂幽厲乎先秦兩漢唐宋諸君何不一致罰於斯高莽操李楊秦蔡之流乎既無輪回叔子何能記前生為某家子明道何能憶宿世之藏毋叉乎羊哀化虎鄧艾為牛如斯之類班班載於儒書不一而足彼皆未知何怪其言之舛也天説三復次南郊以祀上帝王制也曰欽若昊天曰欽崇天道曰昭祀上帝曰上帝臨汝二帝三王所以憲天而立極者也曰知天曰畏天曰則天曰富貴在天曰知我其天曰天生德于豫曰獲罪於天無所禱也是遵王制集千聖之大成者夫子也曰畏天曰樂天曰知天曰事天亞夫子而聖者孟子也天之説何所不足而俟彼之創為新説也以上所陳倘謂不然乞告聞天主倘豫懷妬忌心立詭異説故沮壞彼主教則天主威靈洞照當使猛烈天神下治之以𩛙天討天説餘豫頃為天説矣有客復從而難曰卜娶婦而非己父母也既可娶獨不曰卜殺生而非己父母也亦可殺乎不娶而生人之類絶獨不曰去殺而祭祀之禮廢乎被難者默然以告豫豫曰古人有言卜以決疑不疑何卜同姓不婚天下古今之大經大法也故疑而卜之殺生天下古今之大過大惡也斷不可為何疑而待卜也不娶而人類絶理則然矣不殺生而祀典廢獨不聞二簋可用享殺牛之不如禴祭乎則祀典固安然不廢也嗟乎卜之云者姑借目前事以權為比例蓋因明道蔽云爾子便作實法會真可謂杯酒助歡笑之迂談排場供戲謔之諢語然使愚夫愚婦入乎耳而存乎心害非細也言不可不慎也客又難殺生止斷色身行直斷慧命意謂殺生猶輕不知所殺者彼之色身而行殺者一念慘毒之心自己之慧命斷矣可不悲夫不忍不言序不忍不言者霞漳黃天香社兄之所作也而所以不忍不言者妖夷天主之説惑世誣民滅儒滅佛滅道痛當世之沙門坐視含結莫可誰何也夫天香儒者也胡不寓書於天下之名公巨卿道學先生而必瀝血剖心於沙門豈天香不忍於釋獨忍於儒乎此其故難言哉且天香尚著尊儒亟鏡録七篇精辨儒教羽翼正宗可謂至矣嗣不忍不言之作獨無言及儒是未可為盡言也豫亦何忍於不忍不言而未盡言者聽之不言耶天下一統也三教一源也可使妖夷闌入倡教中國詆誹三聖羅織四方乎天下之大儒縉紳未見有明經辨析且有為之闡揚誠不知其何解也抑謂其教與儒合乎則天學實義一書已議孔聖太極之説為非子思率性之言未妥孟氏不孝有三之語為迂朱子郊社之注不通程子形體主宰性情之解為妄凡此數則可謂其合儒乎矧他書猶未及閲其抑儒篾儒難枚舉也哉夫篾佛則天香不忍不言之請懇切而周詳誠足檄沙門而交攻至篾儒而世之儒冠儒服出入聖人之門者可各踞絳帳談六經而不知顧乎吾不知忍隱不言者果未聞其教乎抑未閲其書乎抑孔孟既死而學其學者隔膜無關乎抑畏難苟安明知其非而不敢指乎抑身家念重而偷生乎抑自知其距而不以天下赤子為心乎抑天學精微果足駕夫堯舜禹湯文武周孔之上乎不然毀我儒宗亂我中國害不少也萬曆以來五十餘年不為暫也曾未聞有朝野大儒闢其非者此何心哉草莽無權則心惟一旨可以著不朽而誅異端朝廷冠冕則守簡書而申律令左道之誅疆界之禁誠何難哉果何故而不言耶嗚呼今日不言他日不言此也不言彼也不言處處天主之堂人人耶穌之教請觀域中誰之天下不將載胥及溺哉昔有唯上人之緣起誅左集今有天香之不忍不言有心世道者可以出而言矣或曰子為天香序而何言之長噫此正小子之不忍不言也子曰是可忍也孰不可忍也其庶幾以不忍動當世也苟有鑒天香之不忍而共發不忍口誅筆伐疏聞當今人其人火其書廬其居則聖人幸甚今古幸甚亦天香小子之幸甚也知我罪我斯係之矣序云乎哉崇禎乙亥長至夜三山社弟曾時薰拜題不忍不言霞漳黃貞著白衣弟子黃貞頓首百拜于天下大沙門座下蓋聞佛制比丘不得見大僧過况貞白衣人何敢出粗獷語唐突天下之名師碩德唯是災近剝膚恬不知慮故以歌謠行國之思號呼于天下名師碩德之前庶幾愍其志而加察之耳夫今天下禪宗教律之師之在在宣揚也豈不各各自謂上報佛恩哉貞誠不知報恩之果止于儼臨廣衆導利群品耶抑有在于扞衛法城降伏魔外者耶使果止于是則古今師德唯期人天皈向化無留難足矣何以或為法忘軀或雲興論辨遠則如龍猛無著近則如知玄明教輩之照映古今耶抑使有在于是則目今狡夷大倡天主之教首自利妖發難以來迄今五十餘年曾不聞一圓顱方服之人起而匡救其間豈普天之下名師碩德盡皆塞耳無聞與抑或聞之而漠然不在意與抑或雖在意中而勢無可奈何與夫不能出死力于智盡能索之秋謂之偷生之士况法王之營壘尚在先聖之紀律猶存乎彼夫泣血于秦庭終還生君之國苦心于吳室卒報死父之讐者伊何人哉孔子曰自吾有繇而惡言不入于耳言能禦其侮也今魔鬼我慈父謬妄我經嘗侮孰甚焉而猶恬然不干于懷則土木而偶矣而况其著書排擊也則汗牛充棟焉其肆意摧殘也則所過之處佛顱粉碎貝典灰飛焉其分植徒侶也則自廣之閩以至江淮河漢之地幽燕薊遼之鄉蕃衍盈升焉允哉逢此百凶亦何能尚𥧌無聰其安之也意者畏威懼禍以故莫敢誰何與則四大本空五蘊非有此皆師德日取四衆登曲彔而告之而惟恐其不信受者乃于己則犛牛愛重首鼠為懷是何為蚳蛙則善而自為則吾不知也意者魔説無根久將自敗姑靜以俟之與周詩有曰莫豫莽𧊵自求辛螫肇允彼桃蟲拚飛維鳥言微毒當防小而忽之則大將不可制彼北斗化胡等經偽造于張道陵杜光庭之輩始終晉宋至元而燔之則邪説之難除也况妖夷陽攻釋以欵儒陰抑儒以尊己其説矯誣視化胡而更巧其心叵測較張杜而為尤種訛言于聖代豈理也哉遺邪説于方來誰之咎矣意者其説雖張愚夫信之不可入于君子之耳以故不與之較與孟氏曰思天下之民匹夫匹婦有不被堯舜之澤者若己推而納之溝中彼身任天下之責者猶設心若是而况明燈照夜為世導師何有親操慧炬而坐視愚夫之入于邪見稠林而莫之止也無論安忍棄衆大闕慈悲抑出世本懷之謂何得無規名剎以邀名托利生以近利者乎子曰歲寒然後知松柏之後凋也意天下之名師碩德率皆凋之類與不然覩茲魔亂縱橫當有恐祖生先我以著鞭者矣寧有心目其人而燕雀其思也耶且夷之言曰不佛者置之不辨亦非度盡衆生我方成佛之本願也故其著于書則雲棲被駁而理屈三槐受難而詞窮夫雲棲三槐何人哉彼豈不知二老皆僧中所謂博大真人者而其門下子孫之賢能握麈尾而談四十九年大小乘教者布北斗以南之天下乃不悔禍之延公然顯揭蓋有以窺其虛實故耳嗟嗟二老名播當世凡緇流欲藉之以揚聲者莫不曰我雲棲師翁雪浪大師至于重泉抱屈大義未申而子兮孫兮反褎如充耳者何哉豈所謂親者未必親而所謂賢者未必賢也蓋邀其名而不邀其禍近其利而不近其害者耳雖然四海之廣神州之大安知無相時觀變如契嵩大師之伏首東山三十年卒使慧天朗耀大道廓如者哉然天下之人智者寡而愚者衆計利妖之來不二世海濱之民惑其説而從之洗聖水擦聖油而樂為之死者蓋數十萬戶彼中州之士縉紳之家未問焉若更假之以歲月必有載胥及溺之禍伏願大師大德大發智悲亟以西土列祖攝九十六種外道之法以攝受之或躬摧或量破俾之然心折自立赤幡之下然後疏表上聞收其惑世誣民之説投之水火之中著為令甲以示後世之臣庶毋貪夷貨毋縱詭隨毋罔誣上帝以凶囚毋作慝于汝神明而媚所不可知之夷民罪死者以消愆毋以十字刑枷置于祖宗神祗之上信自心之作佛遵王路以躋蹌如是則貞雖死之日猶生之年如前訕謗之罪抑粉骨其奚辭哉臨書涕泣不勝蒼黃辨天初説寓天童釋密雲圓悟著天香黃居士擬辨天主教持其書以示豫豫觀其立天主之義以闢佛則知彼不識佛者果何為佛又何足與之辨哉但彼云不佛者置之不辨亦非度盡衆生我方成佛之本願者則不惟不識佛亦且不識衆生何故我佛覩明星悟云奇哉一切衆生皆有如來智慧德相但以妄想執著不能證得惟彼不能自證得故執天主為天主佛為佛衆生為衆生遂成迷倒故有人我彼此是非之相此乃彼之病根所以我佛云不能度無緣者正以彼自執為天主故也苟彼不自執為天主則自然不執佛為佛不執一切衆生為衆生方始識我佛之旨亦識度盡衆生之義今彼以妄想執著而欲闢佛是則自暴自棄自闢自矣經云外道聰明無智慧余固知其聰明故聊示鞭影倘彼尚執情不化然後徐申其説以與之辨崇禎八年八月五日辨天二説余初説既出恐彼教中人不聞不知特遣潤禪遍榜武林索其辨論得二旬餘日不報後八月念一日有夢宅張君湉者毅然直持天教之堂以告曰湉嘗遊二氏之門第未入其閫奧向聞大教倡乎敝邦欲領教而未得也頃有自四明來者持辨天初説一紙湉讀之乃與大教辨學之説也且聞大教中屢徵詰辨故敢將以請教以決所疑以定所趨彼主教傅姓泛際者對曰妙妙向來原有這個意思遽接讀之沉吟再三似不甚解適我存李先生公子以引人入教在座乃為之解説不覺愕然面赤率爾問曰黃天香是何處人曰不知曰何從得此曰得之于友人處曰何不教這僧來這裡面辨曰此人乃一方知識現在寧波何得來此乞先生出書為辨可也曰善且曰吾將治行江右亦留一篇于此然吾尚有伏先生等在焉亦足以與之辨明也既而張君告辭曰倘先生稿就湉當過領曰諾隨以辨學遺牘一册贈之後三日往問曰書成否湉特來領司閽者拒之不復使入乃曰此僧去歲曾來會中與辨不勝發性而去今又何必來辨且初説中都是他家説話有何憑據况自亦有許多我相執著不平之氣實非欲與我辨者不過恐其徒歸依我教故作是説以遮之耳若與之辨則成是非故不與之辨也曰既不與辨請買其書得乎曰我教中書不賣錢者唯真歸向天主然後與之一二不然縱欲求之不可得也據張君親述如此則見汝非不辨也不能辨也不能辨者蓋義墮而莫可救也唯義墮而莫救故詞窮色沮遁形露矣然汝不能辨而余復置之而不辨則曲直終不分矣故汝不能辨而我必辨之夫辨者曷憑乎憑理也曷據乎據理也故以理為憑以理為據則以我辨他可也以他辨他亦可也今汝但謂都是他家説話有何憑據然則我説無憑汝説應有憑何不以汝説而辨我乎汝不能辨則汝説必無憑而我説有憑矣我之所憑者何也至理也至理也者天下萬世不易之道也故余初説謂汝妄想執著者以汝不達大道之元但逐名相故執天主為天主佛為佛衆生為衆生而不知佛者覺也覺者悟也人人覺悟則人人皆佛矣又何間于天人群生之類哉故佛無定形在天而天處人而人不可以色相見不可以音聲求以其即汝我人人從本以來具足者也以汝我從來具足者不自覺悟而乃闢之非自暴自棄與今汝反謂余亦自有許多我相執著不平之氣然則總不必以理論量唯汝教是從隨汝迷倒而後謂之無我相與是大不然矣夫理直氣壯理屈詞窮此必然之勢也孟氏不云乎自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣故余謂汝我相執著者據理而斷也自反而縮者也汝之謂余我相執著者唐塞之言也自反而不縮者也且汝初對張君則曰妙妙向來原有這個意思既而則曰吾將治行江右亦留一篇于此然吾尚有伏先生等在焉亦足以與之辨明也洎其卒也則謂若與之辨則成是非故不與之辨也噫俄爾之頃貌言情態何變幻錯出之若此也且汝輩之來倡教于此土也必確有一定之見更無二三之説而後可以約天下之歸趨如鐘不考不聲石不擊不光其相怋恤深相諍論孰是孰非者非汝利氏辨學遺牘之言乎今汝又謂辨則成是非抑何前後彼此互相矛盾者耶夫天下之理同于大通大通而後是非泯是非泯而後諍論息故我大聖人之嘆一切衆生皆具如來智慧德相者蓋親證大通之道也汝既恐辨則成是非則何不反諸己躬而自證其大通之道乎自證大通之道則不見有人我彼此勝劣之相一道平等浩然大均矣見不出此徒詭譎其情形遮護其短陋何庸也且汝有大誡十其八曰勿妄證注曰儻人本無是事而故誣陷之如此者妄夫余住天童不踰甬東者五載其去歲不過武林江南北之人塗知矣豈來汝會中與辨不勝發性而去者乎故誣陷人以本未嘗有之事妄耶不妄耶夫余其彰明較著者也若夫渺茫之地恍惚之間其為妄證又安可勝計耶故余謂汝所立之誡所述之言所勒之書皆妄也汝若不妄則應與聖賢經嘗之道互相表裡何妨與天下之人共知共見而必欲真歸向天主者而後與之一二也夫聖賢立言所以載道也聖賢之言之所載之道者非一己之道也天下共相率繇之道也故六經孔氏不以私其家五千四十八部釋氏不以私其黨己之徒藏之名山大川散之通都國邑聖天子頒之辟雍庠序與天下之臣民世守之太祖高皇帝成祖文皇帝定為南北二藏任天下之自信者請焉弗禁也唯聞香白蓮等教其説妖妄非入其教者不得預聞今余又不知汝書果何書汝教果何教而謂外人縱欲求之不可得也耶崇禎八年九月望日辨天三説季秋之望余二説復出如前致榜武林而孟冬九日夢宅張君仍持告天教之堂坐移時始有范姓者出乃中國人蓋遊淇園楊公之門而篤信天教者也張君具言前事以二説示之范君接得竟不目即內諸袖乃曰凡有書出來無不收然必不答實告于公此是教中大主意張君曰此非釋氏生事蓋因貴教中言理無二是必須歸一索辨之言不一而足且曰辨者吾所甚願也故天童和尚爰出初説欲與辨論以決是非而貴教傅先生又面許辨答後竟食言于是復有二説今又曰不答且曰百説千説一總不答何先後矛盾之甚耶范君曰教中雖有欲歸一之説然而佛教與天教原是不同必不可合者蓋佛教雖重性靈而偏虛不實唯我天教明言人之靈魂出自天主則有著落方是大全真實之教雖然佛教以天堂地獄教化衆生而我天教亦以天堂地獄教化衆生如兩醫者爾我如病人隨服其醫之藥唯期療病而已何必是此非彼况又欲合衆醫為一耶如病不瘥則更醫可也張君曰此是病者分上事夫醫者之理豈有二哉范君曰理雖不二亦未有見病人請二醫於家使其爭論而合為一者張君曰若是則並行而不悖胡為貴教著書排佛毀佛形像何也范君曰教門不同自然要如此闢張君曰此即以是加彼彼或以是報此則終無歸一矣范君曰然敝教皈依者必先與講明天主大義至再至三然後受教其進若此之難故其出教亦不易不似學佛之徒倐爾進倐爾退故彼欲化我雖是好心而我輩斷斷無舍天教而復皈依佛者不必空費許多氣力况雲棲嘗著天説四條欲辨天教尚且不勝豈今天童更有過于雲棲者乎據張君親持二説往告西人不自面言而假見我國之范君且以必不答為教中大主意藏其貌愎其詞凜乎截乎若示我嚴城堅兵無自而入者蓋欲以含沙之計陰肆其鬼蜮之懷如去歲曾來會中與辨不勝之説或矯誣於異日或揑造于他方窮其心志不過以之惑世行姦耳豈明教辨學之意哉抑當事者之有憂余身林下老且死何必與之計論第據范君之言則余又不可以不辨也范君謂佛教雖重性靈然偏虛不實唯我天教明言人之靈魂出自天主則有著落方是大全真實之教靈魂出自天主且存後論佛教偏虛不實余言不足重則我皇祖御製心經序蓋論之詳矣試為范君陳之皇祖之訓曰二儀久判萬物備周子民者君君育民者法其法也三綱五嘗以示天下亦以五形輔弼之有等凶頑不循教者往往有趨火赴淵之為終不自省是凶頑者非特中國有之盡天下莫不亦然俄西域生佛號曰釋迦其為佛也行深願重始終不二於是出世間脫苦趣其為教也仁慈忍辱務明心以立命執此道而為之意在人皆若此利濟群生今時之人罔知佛之所以每云法空虛而不實何以導君子訓小人以朕言之則不然佛之教實而不虛正欲去愚迷之虛立本性之實特挺身苦行外其教而異其名脫苦有情昔佛在時侍從聽從者皆聰明之士演説者乃三綱五嘗之性理也既聞之後人各獲福自佛入滅其法流入中國間有聰明者動演人天小果猶能化凶頑為善何况聰明者知大乘而識宗旨者乎如心經每言空不言實所言之空乃相空耳除空之外所存者本性也所謂相空有六謂口空説相眼空色相耳空聽相鼻空嗅相舌空味相身空樂相其六空之相又非真相之空乃妄想之相為之空相是空相愚及世人禍及今古往往愈墮彌深不知其幾斯空相前代帝王被所惑而幾喪天下者周之穆王漢之武帝唐之玄宗蕭梁武帝元魏主燾李後主宋徽宗此數帝廢國怠政惟蕭梁武帝宋之徽宗以及殺身皆繇妄想飛升及入佛天之地其佛天之地未嘗渺茫此等快樂世嘗有之為人性貪而不覺而又取其樂人世有之者何且佛天之地如為國君及王侯者若不作非為善能保守此境非佛天者何如不能保守而偽為用妄想之心即入空虛之境故有如是斯空相富者被纏則欲並生喪富矣貧者被纏則諸惡並作殞身矣其將賢未賢之人被纏則非仁人君子也其僧道被纏則不能立本性而見宗旨者也所以本經題云心經者正欲去心之邪念以歸正道豈佛教之妄耶朕特述此使聰明者觀二儀之覆載日月之循環虛實之孰取保命者何如若取有道保有方豈不佛法之良哉色空之妙乎於戲皇祖蓋聰明睿智開物成務之大聖人也使先佛之道無當於理皇祖豈肯偏黨不公而獨謂其教實而不虛耶夫聖人之道必折衷于聖人方始歸一而可行可遠豈聖人之所然而我反不以之為然乎不然聖人之所然者則與聖人之見左矣與聖人之見左抑豈聖人之徒哉范君殆將賢未賢之人則亦聖人之徒也聖人之徒必以聖人為師周公不曰文王我師也若以道論皇祖則亦范君之師矣范君不師皇祖之言而師夫皇祖所未折衷之人而其人又其心行大有叵測者蓋亦異于周公矣况謂人之靈魂出自天主則有著落方是大全真實之教無論其愚迷橫計即一出言之表立教之端且不可為訓而况其拯世而化人耶何也靈魂者蓋生死之大兆也即我先聖呵為識神者是亦即世間俗人罪夫見事不清詆為魂靈者是也以此為端以此為表教可知矣然則范君與西人蓋全不知靈魂何起性靈何歸又烏怪其業識忙忙而作此外道魔説耶夫唯性始無變易魂則有動搖既有動搖則有遊逸既有遊逸則有起滅則惑斷惑嘗禍且彌運詎不亦生死之大兆乎哉納民于生死大兆之中反尊之為教主可乎不可乎故靈魂出自天主斷然必無之事今且問范君天主亦有靈魂耶其無靈魂耶若無靈魂天主且屬烏有何以靈魂出自天主若有則天主之魂渾然至善之體出者既然則為所出者莫不皆然今一家之內一鄉一邑之間何以智者愚者仁者暴者萬有不齊至于莫可窮詰而况殊方之外異俗之人哉然則天主何不一體同觀平等化育乃使其覬有餘矜不足者之自古至今相陵相奪而長此厲階耶偏小虛妄君當自擇而真實大全之説余不知其于義何居矣若我先聖人之教則不然明號于人曰竒哉一切衆生皆具如來智慧德相但以妄想執著故不能證得據其皆之意豈非大者乎據其具之意豈非全者乎據其人人皆具本有之性靈而告之則盡虛空遍法界之類無乎不合無乎不同豈非謂之至大至全至真至實至公之大道者哉昔者我大聖人之既證此道也復大觀乎群生生死往復之元廣而導之誨而不倦故上極成其聖道下極諸趣苦樂之相莫不示其所以然如良醫之治疾明其證候示其寒熱投之以劑無不霍然者也夫天堂地獄蓋衆生業力所召非夫病者所受之症候所感之寒熱乎而天教唱言皈依者升天堂不則地獄而已簧鼓愚民欣上厭下捨此趣彼則己以病而加諸人矣反以兩醫為喻抑何其自昧而昧人耶故范君謂佛教以天堂地獄教化衆生者亦妄也佛蓋知夫天堂地獄之所繇來故立戒定慧之教引而出於昭曠之原耳何也一切衆生所以輪轉三界流浪四生者蓋業感為其纍也業感之纍始于妄想之所因妄想之因始于不達本性之故以其不達本性著于前境緣境為識循識為業繇業得報故有六道種種差別之異果果識為因熏發現行而輪回于是乎不息矣然此如如正體無始無終不自天來匪從人得故曰無所從來亦無所去故名如來但迷之則生死始悟之則輪回息使天主苟不自悟則亦浮沉三界之人耳烏能以靈魂與人哉使三界之人而苟自悟則不妨隨處作主遇緣即宗在天而導夫天處人而導夫人非夫天人而命夫天人命夫天人者而天人無以命之然則所謂天主者蓋名也虛也而名乎天主者非虛也本性之實也本性之實則無物不同無物不然然自得其然非有所以使之然同自得其同非有所以使之同無使而同是之謂大同無使而然是之謂大然窺之不見其際探之莫測其源包乎天地貫乎古今精日精月靈鬼靈神出入乎死生主張乎天人者而天人烏得而主張之哉出入乎死生者而死生烏得而出入之哉至哉妙乎本性之實也范君不務本實徒羡虛名執妄想之空相而甘心于天主天堂之樂非皇祖所謂為人性貪而不覺而又取其樂者乎愚及世人禍及今古洋洋聖訓臨爾有赫奈何其不懷明畏乃有所隕越耶無論三界無安猶如火宅范君不宜俾晝作夜畏日趨冥然天堂亦非幸至之鄉未有身行十不善道之業而能高距六欲之境而况其四禪八定者乎故曰五戒不持人天路絶夫身有不善業者三曰殺曰盜曰淫意亦有三曰貪曰嗔曰癡口則有四曰妄言曰綺語曰兩舌曰惡口皆絶人天之路之業者也而殺盜淫為首殺尤首矣貪嗔癡則其所自起者也范君既謂天教亦以天堂地獄教化衆生而反恣情縱欲謂一切衆生固當食噉蓋天生以養人者天何頗耶害性命以育性命天道至仁豈然乎哉唱如是説者不過以口腹者乃生人之大欲存焉投其所欲以要人耳行地獄之因希天堂之果豈非天堂未就地獄先成者乎據是則身行明示尚乃如此如謂必先講明天主大義至再至三然後受教其進若此之難者則余又豈能測其講明何義而非私傳暗授不可知之説者乎夫教者導也所以導人而證道者也故非道莫導非千岐而一致萬類而一得之道不可以為道性命之道千岐而一致萬類而一得者也何人無性何人無命聖人無性命以與人者也導之使各證其本有皆具之性命而已以性命為教導則亦以迷悟為進退悟者為進迷者為退然悟亦無所得迷亦無所失故進亦無方隅退亦無處所總天下萬類之含靈唯日進退出入于性命之中聖人慮其昧而不覺也故多方而啓迪之于是乎有權教焉有實教焉實之所以示頓也權之所以示漸也漸者漸見此道也頓者頓悟此理也頓漸之示機之所繇別也權也者有顯權有冥權聖人顯權之則為淺教為小道與其信者為其小息之所也聖人冥權之則為異道為他教為與善惡同其事與夫不信者廣為其方便得道之緣也是以道妙天人而天人莫能測者也然則聖人之道之教固已彌綸三際磅礴萬有者矣豈以從己者為私人而㥬惶于進退得失之間哉夫余所以與天教辨者非求勝之而使人之從我也畏夫人之不知道而昧已也昧夫已則逐夫物矣逐夫物則妄念生焉未有妄念動于中得為仁人君子而不夫殞身喪富之禍者也何也覬夫人矜夫已而不悟平等之理也不悟平等之理者不逹本性之實也逹夫本性則無欠亦無餘無智亦無得矣以無所得故無所求非無求也求自本心而已非無得也得自本性而已所以先德云不著佛求不著法求不著僧求嘗禮如是事則皈依之義蓋可知矣故范君謂余彼欲化我雖是好心夫子之説君子也余豈敢當哉謂我輩斷斷無捨天教皈依佛者無乃駟不及舌歟夫佛者覺也覺盡本性而無餘覺者也故名大覺亦名正覺其覺也非一己之覺也與萬靈同稟是覺而特先證其覺者也人不稟是覺則無是人矣物不稟是覺則無是物矣范君不稟是覺則無是范君矣無人無佛無范君則天地世界且空荒絶滅矣誰為名天名物名教化名歸依者哉夫范君即今能藏竄范君乎范君能回避范君乎如不能藏竄不能回避也則范君行皈依佛矣范君住皈依佛矣范君坐臥皈依佛矣自有范君以來固無劫無生無時無處而不皈依佛者也乃至謂斷斷無捨天教而復皈依佛者亦皈依佛矣魚龍死生在水而不知水衆生終日在覺而不知覺可不謂大哀耶惟人有覺而不自證其覺有大聖人者先證我所同然之覺復不敢自私其覺而欺夫人之不覺實而示之權而教之多方淘汰而啓牗之必使其超然契證直趨乎真際而後已聖人何如心哉聖人何如人哉我與聖人同稟是覺而不自知其覺則我之負于人多矣復不欲夫聖人之我覺而狎之侮之排之毀之則是欺夫聖人矣聖人與我同覺者也欺夫聖則欺夫目矣自不可欺而聖人固可欺乎今閭巷之人欲以言而辱人必亦思曰彼福德人也不可辱也辱則折吾福矣夫佛者聖人之聖人也以非死生而示死示生以非天人而示現天人與物同然而莫知其所以然豈古神靈睿智博大盛備之聖人乎視閭巷福德之人為何如哉然則毀者之不特折福也明矣余蓋重有憂焉故不敢以不辨若夫范君謂余豈今天童更有過于雲棲乎者則斯言也殆庶幾夫其近之矣何也一切衆生皆具如來智慧德相者也豈余有過于雲棲即極古之聖者神者謂之盡其性則可謂之過夫人則不可也范君不聞乎孟子曰何以異于人哉堯舜與人同耳故余盡觀大地無人不同無人不合所以不敢欺夫西人卒惓惓與辨者豈有他哉正欲共明此無過夫人之一事耳西人惟求過人遂忘當世有不可欺之賢哲自心有不可昧之寸靈一味誣人以顯己飾詐以驚愚如范君謂雲棲嘗著天説四條欲辨天教尚且不勝至謂余亦不必空費許多氣力之類是也夫印土被難奘師救義况利集馳遍計之説雲棲無義墮之詞乎所不滿余意者第未折衷于群生皆具之性本耳然亦就機而談即事而論者也豈能盡雲棲之萬一而遂謂之不勝耶且問范君利氏曾與雲棲面質乎曾與雲棲往復難問乎槩夫未之聞也及按二人卒化之年則利氏先雲棲五載矣雲棲以是春出説即以是秋入滅説未出而預辨何物鬼魑得能譸張為幻耶子曰視其所以觀其所繇察其所安人焉廋哉使范君與天下之人之從之者之皆審此意也詎不勝於余之辨之也夫余蓋終以是意望夫范君與天下之人之從之者崇禎八年十二月八日證妄説雲棲弟子張廣湉筆證天教中刻有辨學遺牘一書乃辨吾雲棲天説四則而作也考雲棲出天説時西人利氏已歿五載不知此作出自何人之筆而偽云利氏所辨讀之不勝驚嘆今據事直證其誣緣彼文繁不能盡録僅將偽跋刻列于首願相與共證之豫視沈僧天説豫甚憐之不意未及數月竟作長逝耶聞其臨終自悔云我錯路矣更誤人多矣有是哉此誠意所發生平之肝膽畢露毫不容偽也今之君子所以信奉高僧者以其來生必生西方淨樂土也西方錯路乎彼既認為非高明者宜舍非以從是否則不為後日之蓮池乎噫豫讀此書津津有味乎其辨之明亦惟恐衆生墮此危池耳又豈得已而述耶彌格子識乙亥秋月有禪客從四明來出天童和尚辨天初説見示豫因持往天教堂中索其答辨時彼堂中稱傅先生者出會贈豫辨學遺牘一帙內載利先生復虞銓部書及利先生復蓮池大和尚竹窗天説四端後有涼庵居士跋豫正駭且疑適禪客復持閩中所刻遺牘又增有彌格子一跋更誣先師錯路誤人之偽語豫益歎其荒誕怪妄不得不即其所説之誣而一一直證其姦也按先師天説三則天説餘一則皆竹窗三筆篇末之語篇首先師自序識其歲月乃萬曆四十三年乙卯之春刻成未印而先師以是年七月初四日圓寂以後方漸流行閲彼教中所刻利子行實蓋瑪竇先於萬曆三十八年庚戌四月已沒而同侶龐迪峩等乞收葬骸骨疏文亦稱瑪竇于萬曆三十八年閏三月十九日年老患病身故凖二説去先師著竹窗三筆之時相隔五載安有未見其説而先為立辨之理先師序文紀歲瑪竇行實亡期昭然顯著有目共見者猶乃公然欺妄况其他乎彌格子跋云豫視沈僧天説豫甚憐之不意未及數月竟作長逝耶據此數句彼亦自供三筆為先師臨歿之書矣夫乙卯前既無竹窗之三筆而庚戌後何有鬼籙之瑪竇哉此其脫空之謊一也彌格子跋又云聞其臨終自悔云我錯路矣更誤人多矣嗟嗟先師無此語莫謗先師好先師臨終一假光明預期告滅示寂之日縉紳雲集僧俗環繞遠近奔赴者肩摩踵接室內外滿逾千衆豫時亦在室中共聆囑纍之言靜聽末後之訓念佛面西而逝彌格子于親見親聞者之前造此無根妄語不知其欺心幾許况此跋刻於閩中而浙板無之蓋謂可以欺千里外之閩人而浙中之耳目難掩耳先師西逝至今二十餘年而此辨牘始出其不敢出于當年而出于近日者彼將謂親炙者物故必稀吠聲者隨波易惑耳因知答虞德園先生之書亦屬烏有先生之作矣此其脫空之謊二也彼偽答竹窗天説中云不佛者置之不辨亦非度盡衆生我方成佛之本願又云辨者吾所甚願也鐘不考不聲石不擊不光又云相與商求是正其索辨之語層出疊見豫因是持天童密雲和尚辨説至彼堂中示之彼傅姓者出見面許立論相答三日後往乃以不可答見覆明是理屈詞窮而託言唯喜面談不欲筆戰蓋以筆戰則徵實而難遮其醜面談則駕虛而易飾其姦黔驢之技止此矣且云密雲曾來會中辨論負墮拂衣而去夫密雲和尚當今尊宿與人談話聽者如雲一有語言即時抄録傳誦何嘗有私相論議不為人所見聞之時也耶今有辨不答自語相違此其脫空之謊三也即此三節而其他無稽欺世處俱可得其大槩矣豫雖不慧不忍目擊訕謗之語貽誤後世重獲罪于先師故以俚言發其虛罔使人知其可笑不可信如此若其教之鄙猥淺陋侮聖惑民自有明眼大手筆起而闢之非豫之所敢任也天童密雲和尚復書讀來教知門下願力生然真法門墻塹者也證妄説尤深切著明何物姦回復能伸其喙哉若貧道寥寥數言不過略提大槩耳唯一普潤禪師跋天教之徒為書與跋以誣雲棲二十有餘年矣卒無與證者故人多惑其説而居士乃立言以證之人皆曰白雲棲之誣者居士之説之力也嗚呼居士之説將為天下後世之人耳豈直為夫雲棲而已哉不然雲棲之德純如也不可誣也尚奚取白於二十餘年之後哉為説於二十餘年之後者政慮夫天下後世之人猶惑其説而莫之返也證妄後説西人誣罔先師余作證妄説辨之説甫出而議者謂雲棲弘濟利生之德昭如日麗中天人孰得而掩之彼誣謗者徒自污耳何足以損其光明哉矧于無德無名人既不重言奚見信胡不聞古德云一切是非莫辨之説耶子烏用是喋喋也余從容應之曰子言誠是但知其一不知其二所謂鬬諍是非不可有邪正是非不可無况有關于法門者乎子豈不見先師竹窗隨筆中禪餘空諦之辨乎請為子誦之先師謂吳郡刻一書號禪餘空諦下著不肖名曰雲棲某著刻此者本為殖利原無惡心似不必辨然恐新學僧信謂不肖所作因而流蕩則為害非細不得不辨今天教之徒偽刻辨跋暗布遠方貽訛後世使見理不真者誤信其説陷入邪見網中其為害何止流蕩而已也鄉愚不具信根那同新學之僧况其設姦揑誣又非本為殖利而無惡心者比則余證妄之説豈得已之述哉子更不見夫先師答虞銓部書云倘其説日熾以至名公皆為所惑廢朽當不惜病軀不避口業起而救之又三筆中云現前信奉士友皆正人君子表表一時衆所仰瞻以為向背者余安得避逆耳之言而不一忠告乎又云倘余懷妬忌心立詭異説故沮壞彼主教則天主威靈洞照當使猛烈天神下治之以𩛙大討然則先師居恆未嘗不以此切切焉者德園先生著天主實義殺生辨末亦云雲棲師嘗言諸君若皆信受我將著破邪論矣緣先師在日彼倡教立説尚無如此之熾而趨從之者亦無如此之盛今其説日熾而其徒日昌且公然妄言偽揑以誣罔我大師矣嗚呼師今已往邪信日多余安得起大師於嘗寂光而復作之也傷哉昔明教謂韓子譏沮佛教聖人太酷吾嘗不平比欲從聖賢之大公者辨而裁之以正夫天下之苟毀者而志未果然今吾年已五十者且鄰於死矣是終不能爾也吾之徒或萬一有賢者異日必提吾書貢而辨之其亦不忝爾從事於吾道也矣今之從遊於吾雲棲門下稱賢者多矣寧無念師恩繼師志者起而辨之乎夫一夫不獲若豫陷之儒言也我佛稱天人師具大慈大悲等視衆生猶如一子所以阿贊楞嚴會上贊世尊云若一衆生未成佛終不於此取泥洹是則學佛者當心契佛心行合佛行以承佛志以紹佛願何乃高視空談而謂一切是非莫辨耶今子是莫辨而非有辨當下分別宛然是非𧊵起一切莫辨之説將誰欺乎梵網經云聞一謗佛音聲如三百矛刺心今稱大僧者誰不秉梵網之戒若知佛即我師師即佛等寧忍聞其謗而恬然無動於中乎子既安忍無動而又議豫之喋喋也何哉或者曰西人蓄謀叵測子發其姦寧不畏其禍余應之曰彼守邪因之教且聞其能循教以死天余奉正真之道獨不能抱道以死佛乎况禍福關於前因生死繇乎定業余籌之熟矣西人何能吉凶我然余於天教之人亦何有𬽦讐嫉忌之心哉念彼離國遠來鍊形攝養欲人去惡為善以敬天帝亦無不可者而無奈執性顛倒妄計邪因不得佛意即據所立之規誡尚不及舊醫十善乳藥之正木又何知客醫八種破舊之遠方術舊醫乳藥大經猶呵為其實是毒矧茲非乳之邪彼徒知為善生天而更不知生天必修十善十善者首不殺生謂凡有生命者不得殺彼十誡之五曰毋殺人夫殺人者死我國中已有著令何藉彼今日遠來指出也智愚莫不知上帝好生而我國中歷代聖人亦莫不好生或解網或畜池或釣不綱不射宿或遠庖厨不忍食聞聲肉或戒折方長種種仁慈悉難盡舉而彼教謂禁殺牲大有損牧牲之道牛馬等受終身之患不如殺食止一時之痛噫是何忍心害理之説一極此也種地獄因希天堂果斷斷必無之理即此一誡以見大端餘何暇盡摘其疵縱彼倒執超情何能出一切智神通韋馱等六師三種外道之見况萬不及一乎教中謂寧願如提婆達多之永墮阿鼻地獄不願同鬱頭藍弗之生非非想天以懼邪見故耳雖然在法華開顯之時三乘五乘七方便九法界均得會歸於圓乘一實之諦何棄乎彼教之不我類也獨怪夫偽造污言誣謗三寶自執一主之尊以惑世殃民耳然三寶乃人人自心本有者也其可謗乎謗之適足以自損於三寶何傷也苟逹三界惟心萬法唯識不自執其膠固以欺其心則余將虛其中而聽其教焉又烏用是喋喋也今無奈彼執情不化止可與結毒鼓緣以遠益之耳悲夫附緇素共證先大師示寂緇素駢集數萬餘指諄諄以專修淨土莫改題目為訓當時在會入耳銘心者非止賢一人也至於竹窗三筆四天説係大師臨滅之年始出而西人利氏已先卒化五載安有説未出而預辨何物鬼魑揑此虛誑妄語欺世誣民即鄉愚稍朴茂者尚不忍為况欲移風易俗以行其教乎夢宅居士證妄説直發其姦詭真法門功臣雲棲掙子也雲棲後學釋大賢題
