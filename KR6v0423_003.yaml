body:
  text: 鹽官居士徐昌治覲周甫訂破邪集序向與西士遊第知其曆法與天地球日圭星圭諸器以為工不知其有天主之教也比讀其書第知其𥨸吾儒事天之旨以為天主即吾中國所奉上帝不知其以漢哀帝時耶穌為天主也其書可百餘種顓與佛抗而迹其人不婚不宦頗勝於火居諸道流以是不與之絶比吾築家廟奉先而西士見過謂豫此君家主當更有大主公知之乎豫笑謂大主則上帝也吾中國惟天子得祀上帝餘無敢干者若吾儒性命之學則畏天敬天無之非天安有畫像即有之恐不是深目高鼻一濃鬍子耳西士亦語塞或曰佛自西來作佛像利氏自大西來亦作耶穌像以大西抑西以耶穌抑佛非敢抗吾孔子然佛之徒非之而孔子之徒顧或從之者何也未幾當道檄所司逐之燬其像折其居而株擒其黨事急乃控於豫豫適晤觀察曾公曰其教可斥遠人則可矜也曾公以為然稍寬其禁而吾漳黃君天香以破邪集見示則若以其教為必亂世而亟為建鼓之攻又若以豫之斥其教而緩其逐為異於孟子距楊墨之為者豫謂孟夫子距邪説甚峻然至於楊墨逃而歸則受之而以招放豚為過今亦西士逃而歸之候矣愚自以為善學孟子特不敢似退之所稱功不在禹下耳且以中國之尊賢聖之衆聖天子一統之盛何所不容四夷八館現有譯字之官西僧七王亦賜闡教之號即近議修曆亦令西士與欽天分曹測定聊以之備重譯一種示無外而已原不足驅也驅則何難之有李文節曰退之原道其功甚偉第未聞明先王之道以道之而輒廬其居亦不必豫因以此意廣黃君而復嘆邪説之行能使愚民為所惑皆吾未能明先王之道之咎而非邪説與愚民之咎也白蓮聞香諸教入其黨者駢首就戮意𥨸哀之然則黃君破邪之書其亦哀西士而思以全之歟即謂有功於西士可矣崇禎戊寅歲孟秋晉江八公蔣德璟書明朝破邪集序粵自開闢以還三教並興治世治身治心之事不容減亦不容增者也何僻爾姦夷妄尊耶穌於堯舜周孔之上斥佛菩薩神仙為魔鬼其錯繆幻惑固已輾然足笑世人不察入其教者比比愈有以中夷豢金之陰狡矣余在京邸時接門人黃貞請闢天主書𥨸有慕沈宗伯苦志而未逮無何輒以母喪告歸讀禮家居未敢干𮈔毫分外事不審此秋季艾妖輩踵至吾漳既已歸人如市又欲買地搆堂幾令人目擊心怖嗟嗟夷變至是不惟亂世統兼亂道脈不特𢦤人類并𢦤人性舉世冥冥莫知其詳間有知者亦莫之敢言即有言者案架沉埋終莫之見其作故今日之能使人知使人言使人見江統憂賈生哭則破邪一集其以于世道人心顧不巨歟惟願得是集者取而讀之知諸先生與碩德君子之一字一金而勿辨髦視之則幸甚矣敢不孝姑為序崇禎丁丑年孟冬霞漳宗璧居士顏茂猷撰題黃天香詞盟壯哉黃子不遠千里呼朋闢邪唯力是視疾彼西人釀茲禍水聖脈幾沉佛日漸晦能言距之世道攸繫崇禎丁丑長至夜語居士唐顯悅書壬戌進士破邪集序夔邇來力闢社黨不無見尤焉吾師董見龍先生諭以安命之學禪友曹源公又進以無諍之旨佩服其教方修儒宗而求諸心持佛戒而懺口業臘八夜坐心如寒石次日猶推轉不下次子渤素孝自書館來問疾談次方消誓從此不談人間是非而清漳賢者黃天香持所刻破邪集問序于夔觀儒臣之疏諸賢之論凡所以闢西洋天主邪教者詞嚴義正已無庸更置喙矣西洋本猾黠小夷多技巧能製玻璃為千里鏡登高遠望視鄰國所為而以火炮伏擊之故他夷率畏其能多被兼併以此稱雄于海外若其為教最淺陋無味而人多從之何哉蓋利欲相誘夷先以金啖愚而貪者雖士大夫非無欲亦墮其術耳病端實實如此別無玄妙奇異也孟子待橫逆妄人以為與禽獸奚擇于禽獸何難夔愚每謂視天主教與從其教者只宜視如禽獸不當待以夷狄之禮何則夷狄猶靦然人也而諸君子猶鰓鰓焉引聖賢與之析是非此不亦待之過厚與佛慈悲等而非吾孟子所以自處乎夔又謂吾儒之有孟子猶禪釋之有達磨皆直指人心見性孟子學孔子吾輩只宜學孟子學孟子而天下之能事畢矣孟子救人類先救人心而又諄諄告戒曰人之所以異於禽獸者幾希又曰夜氣不足以存則其違禽獸不遠又曰飽食暖衣逸居而無教則近于禽獸又曰楊墨之道無父無君是禽獸而率獸食人其言痛切幾于一字一淚則以禽獸視天主教與從其教者誠非刻而可以佐天香闢邪之本心矣雖然邪教之亂儒亂佛也吾與天香諸君子能以口舌為功至於嚴不軌之防芟除殄滅無俾易種則當事之責廟廊之權即佛慈悲尚判五逆七遮不通懺悔况吾儒治世者乎倘謂其天文尚可用則不主休咎已明絶吾儒恐懼修省一脈且彼以堯舜周孔皆入鍊清地獄矣其毀吾聖賢慢吾宗祖至此而尚為寬大不較羈縻勿絶之語此之謂失其本心而違禽獸不遠也崇禎戊寅臘月初旬閩中周之夔章甫書蘇州府推官辛未進士請顏壯其先生闢天主教書霞漳去惑居士黃貞著邇來有天主教中人利瑪竇會友艾姓儒略名到吾漳而鈍漢逐隊皈依深可痛惜更有聰明者素稱人傑乃深惑其説堅為護衛煽動風土更為大患貞一見即知其邪但未知其詳耳乃稽自萬曆間以至今日始知此種夷邪為毒中華不淺貞不得已往聽講數日未能辨析破除之幾至大病至四五日以後方能灼見其邪説所在歷歷能道之心神始為輕快大端則有五者能為人世大害餘且未暇多指懇祈師慈細察俯聽容貞縷析其𠒋毒得以達于師臺也蓋彼教獨標生天生地生人生物者曰天主謂其體無所不在無所不知無所不能謂主賦畀靈魂于人曰性不可謂性即天不可謂天即吾心又謂天地如宮殿日月似燈籠更不可謂天地即天主天地也天主也人也分為三物不許合體以吾中國萬物一體之説為不是以王陽明先生良知生天生地生萬物皆非也此其壞亂天下萬世學脈者一也佛菩薩神仙斥之曰魔鬼言其必入地獄彼書云祭拜天地日月菩薩神仙等物皆犯天主大戒深得罪于天主是也又彼教中有十誡謂無子娶妾乃犯大戒必入地獄是舉中國歷來聖帝明王有妃嬪者皆脫不得天主地獄矣貞詰之曰文王后妃衆多此事如何艾氏沉吟甚久不答第二日貞又問又沉吟不答第三日貞又問曰此義要講議明白立千古之大案方能令人了然皈依而無疑艾氏又沉吟甚久徐曰本不欲説如今我亦説又沉吟甚久徐曰對老兄説別人面前我亦不説文王亦怕入地獄去了又徐轉其語曰論理不要論人恐文王後來痛悔則亦論不得矣蓋彼教中謂犯戒後能皈天主真心痛悔則地獄之罪亦可免直至氣盡而不知痛悔則無及故也嗟嗟辭窮莫遁謗誣聖人其罪莫容者二也觀音菩薩關聖帝君及梓童帝君魁星君呂祖帝君等像皆令彼奉教之徒送至彼所悉斷其首或置廁中或投火內語及此令人毛髮上指心痛神傷此貞親見者此其教人叛聖殘忍莫甚大罪大逆者三也謂人死無輪回惟皈依天主教戒者其靈魂永在天堂不皈依者餘雖善靈魂亦必永在地獄蓋不知天主大恩故也忘本故也至天地將壞時天主現身空中無數天神圍繞乃自上古以來一切死者皆悉還魂再生一一審判善者現成肉身歸天堂惡者現成肉身歸地獄永永無轉變此際雖有天不能運轉而日月無光雖有地不能生發而草木俱滅謂殺生不妨以禽獸生而無靈死後無魂故也此其妄誕邪謬之甚四也艾氏言會友二十人來中國開教皆大德一體也今南北兩直𨽾浙江湖廣武昌山東山西陝西廣東河南福建福州興泉等處皆有天主教會堂獨貴州雲南四川未有耳嗚呼堂堂中國鼓惑乎夷邪處處流毒行且億萬世受殃而今日縉紳大老士君子入其邪説為刊刻天主教書義為撰演天主教序文貞目覩所及甚多此其可患可憤者五也彼𥨸附儒教昭事欽若之説恣逞凶毒姦巧陳水石兄謂其于吾教中做鼠入強出之賊旨哉言也伏望吾師究其書詳其説急著論闢之除之以維持天下萬世人心學脈所謂其功不在禹下今日急務莫此為甚白蓮無為等教乃疥癬之疾不足憂也天主邪教入中華天下無有闢之者此真可為痛哭流涕長嘆息者也昔日惟有虞德園先生與蓮池和尚力闢其邪蓮池老人至云吾當不惜老朽之軀起而闢之惜乎未幾西歸然當時蓮大師與利瑪竇未嘗見面未詳邪説未深辨擊且天主教書未甚多出如文王入地獄等語亦未有知之者今日天主教書名目多端艾氏説有七千餘部入中國現在漳州者百餘種縱橫亂世處處流通蓋欲掃滅中國賢聖教統一網打盡行其邪毒而後快于心焉微燃不息炎炎可待矧今已非微燃之勢者乎閩省皈依已稱萬數之人九州播惡實受無窮之害豈可忍乎坐視而釀大蠹者耶小子貞不揣愚狂力陳情旨梵網經云如三百矛刺心唯刺心故不禁其言煩贅如此伏惟師慈俯納多方剪斥臨稟不勝感激之至尊儒亟鏡敘儒教崇於宇宙也諸子百家不能與同行豫胡庸贅言尊乎哉則以今日之欲滅之者之卑之也故不忍不號天下以尊儒道耀乎乾坤也子臣弟友原奉以為照豫胡庸贅言鏡乎哉則以今日之欲滅之者之混之也故不忍不請天下以鏡夫欲滅之者何物乎西之夷天主耶穌之徒與華之夷從天主耶穌之徒者是已然夷固不即滅儒也而其計先且用媚與𥨸媚能顯授人以喜𥨸能陰授人以不驚喜焉從而卑之不驚焉遂即混之爪牙備血力強一旦相與蹲素王之堂咆哮滅之矣豫小子誠為此懼雖然仲尼吾心之仲尼也仲尼之道惡可得而滅焉仲尼日月也洙泗一堂舊所傳授之光明未墜於地又惡可得而卑與混焉或曰妖夷惑世誣民晦盲否塞乃世運之夜色也其亟以中天之日月鏡之乎或曰妖夷語默動靜皆怪乃中邦之魍魅也其亟以禹王之鼎鏡之乎豫則以為此蓋似道非道而害道媚儒𥨸儒而害儒者乃孔門之王莽也豫其亟以仲尼一堂所傳授之鏡鏡之乎鏡焉然後知聖賢之面目鬚眉有真不至為妖夷之所假鏡焉然後知妖夷之肝膽情形皆惡不至貽耳目以誤迷鏡焉然後喜者或其有隱憂不驚者或其有危愕庶不相率而為夷也乎此區區所以求天下之鏡之而惟恐其不亟焉今夷之言曰我等必教中華盡尊我耶穌而惟我是從不然不能已也嗟夫苟中華相率而從夷吾知仲尼之微服遠去也必且有甚于當年之桓魋豫小子惟有赴東海而死耳豈肯處夷世界以求活也哉斯鏡也聖賢先得我心而作之者也現成不朽母用豫鑄光明不垢母用豫拭豫惟舉此鏡以鏡之而已矣然妖夷之假也已久民物之迷也日衆豫小子之號尊請鏡也又惡可以不亟狡夷之害無窮不辨為忍心害理説利瑪竇輩相繼源源而來中華也乃舉國合謀欲用夷變夏而括吾中國君師兩大權耳今其國既𥨸讀吾邦文字經書復定爵祿之等年月考選其人之能開教於吾邦者大富貴之此其計深哉于是彼國之夷奮臂爭先竭畢世之心力而為之凡可以亂吾聖賢之教無所不用其極而無忌憚焉其最受朱紫疑似者莫若上帝天命與天之五字狡夷以為甚得計者在此吾國吠聲之夫與貪貨之流起而和之各省皆有其羽翼吠者無目者也見聲不見人也貪者喪心者也見金不見人也害道害世茲無窮矣計自利妖首難以至今日五十餘年吾儒豪傑之士未聞有為孟子之辨者忠孝節義之像日受其斬天道德性之宗漸以不明誠可為痛哭流涕者矣豫小子涼德不才以期期之口著辨愧汗殊深然固不得已之苦心也誠以為忍心害理之甚者莫甚于今日坐視而不言者也聖賢知天事天夷不可混説子曰五十而知天命知天莫若夫子矣然其垂教大旨惟有德性心學盡吾至誠無息之道而已矣初不教人褻事帝天蓋天之所以為天於穆不已之誠也天即理也道也心也性也此道最靈而有權柄故易云天道福善禍淫此理最靈而甚神速故曰一念善則景星慶雲隨之是以吾儒惟有存心養性即事天也惟有悔過遷善即禱天也苟舍是而別有所謂天之之説別有所謂事之之法非素王之旨矣豫讀禱爾於上下神祗子曰丘之禱久矣未嘗不了然大暢悠然深省也是吾夫子之大功德分明揭事天禱天之精義以詔天下後世也注云上下謂天地天曰神地曰祗又是朱子大功德使人知有天有地有天神有地祗在上在下也是吾夫子子路未嘗不並言天地也未嘗不並禱天神地祗也豈非祗神之所以為祗神者一吾心之道乎豈非吾心之鬼神視之而弗見聽之而弗聞體物而不可遺乎豈非能視者即鬼神能聽者即鬼神夫微之顯誠之不可掩如此乎此聖賢經書之明旨昭若日月于中天夷妖何得而混之也是故夷妖混儒之言天言上帝而絶不敢言地不敢言禱於地祗不敢言即吾心之道不敢言即吾心之誠豈非以其害于天主耶穌之説乎哉而我華人以夷之天主耶穌為合吾儒之經書帝天者何異以鳥空鼠即為合鳳凰之音也與生死理欲相背説自十六字傳心以來中國之儒門無異學惟有仁義而已故生死皆不失其正仲尼集千聖之大成孟子學孔子者後先垂教可謂至矣妖夷不知真體所在心惟天主是逐不嫌盡此生而媚之則生也為抱妄想生是虛生志惟天堂是惑不難捨此生而求之則死也為抱妄想死是虛死生死皆欲也夫吾人之生死大事也妖夷與孔孟理欲相背如此矧其他乎受用苦樂相背説子罕言命與仁注曰命之理微仁之道大蓋命即理也此理極精微仁乃道也此道最廣大惟君子致廣大而盡精微總之所以尊德性也此德性非可以言傳乃千聖不傳之祕現成之受用易云艮其背不獲其身書云安汝止如是則可以見聖人生未嘗生也死未嘗死也所謂生死不相干也所謂齊生死也超生死也所謂毋意必固我者也聖賢生之受用誠樂哉如是則與狡夷之所謂靈魂者生時如拘縲絏中既死則如出暗獄教人苦生樂死也毫不相干矣蓋狡夷不知真體所在外執天主內執靈魂情著天堂而謀所以登無事而自被刑枷非罪而捶胸乞救活潑潑之趣何在坦蕩蕩之宗奚存狡夷與聖賢苦樂相背如此矧其他乎尊貴迷悟相背説故君子尊德性明是德性外皆卑也舍德性別無可尊矣此德性本體在我原明故曰克明德此德性本體與天不二在天為命故曰顧諟天之明命此德性本體原無邊際極其高峻而莫與儔故曰克明峻德皆自明也明則誠矣即此是人之道故曰誠之者人之道也即此是天之道故曰誠者天之道也即此是天與地之道故曰天地之道可一言而盡也其為物不二夫豈天主耶穌之所得而主宰所得而七日造成乎即此是物之道萬物皆從此誠而生故曰則其生物不測夫豈天主耶穌之所生物乎故曰誠者物之終始不誠無物是故君子誠之為貴明是誠之外皆賤也不足貴也夫君子之所尊貴如此而謂不悟者能之乎如是則與狡夷之所尊貴在于深目隆鼻之天主耶穌也毫不相干矣蓋狡夷不知真體所在不悟自成自道自貴其貴以故教人乞成乞道於耶穌乞靈乞貴於天主今觀其尊刑枷之凶夫貴釘死之罪人恭敬奉持無所不至誠為可悲夫狡夷之所尊貴如此而謂不迷者為之乎狡夷與君子迷悟相背如此矧其他乎道貫天地人物非夷所知説是故當知此誠真體無所在而無所不在也在聖人則為聖人之道故曰大哉聖人之道洋洋乎發育萬物峻極于天在君子則為君子之道故曰君子之道費而隱夫婦可以與知能行聖人有所不知不能是夫婦不乞靈於神聖也神聖不能有豐於夫婦也竪無上兮橫無外兮虛空逼塞滿兮語大莫載也野馬尿溺兮窗前草兮物物一太極兮語小莫破也在鳶魚則為鳶魚之道飛戾天兮忘其天躍于淵兮忘其淵鳶魚各足也生民之食息起居何非此道之妙用兩間之水流花開總屬此理之流行造端乎夫婦察乎天地矣君子也聖人也夫婦也天地也飛潛動植也共在一道中矣故曰天得一以清地得一以寧王侯得一以為天下貞此吾道一以貫之宗性與天道之旨也洙泗一堂當日漏泄已多然及門弟子猶不可得而聞况妖夷輩今日可得聞此哉是故知此者謂之知天行此者謂之事天吾儒豈別有所謂知之之學如今日利妖指天主降生為耶穌耶穌復返為天主地獄天堂有幾重始為知天乎哉又豈別有所謂事之之法如今日妖夷淋聖水擦聖油運十字刑枷以自桎梏其身心暗招密誘男女混雜始為事天乎哉總之妖夷不能知此一貫之道故妄立天主與靈魂而卑賤太極與理道也太極理道仲尼不可滅説夷之言曰若太極者止解之以所謂理則不能為天地萬物之原矣蓋理亦依賴之類自不能立曷立他物哉又曰自不能立何能包含靈覺為自立之類乎理卑於人理為物而非物為理也故仲尼曰人能弘道非道弘人也如爾曰理含萬物之靈化生萬物此乃天主也何獨謂之理謂之太極哉繇此觀之夷妖明目張膽滅仲尼太極是生兩儀之言而卑賤之矣以天主耶穌滅太極矣夫既滅之而復引仲尼人能弘道非道弘人之語何為哉蓋欲以仲尼攻仲尼也使天下知仲尼之説為矛盾而太極生兩儀為不足聽也華人峩冠博帶輩讀仲尼書者敢曰利先生天學甚精與吾儒合嗚呼是可忍也孰不可忍也祗為太極之亂臣賊子為素王之惡逆渠魁焉已矣豫請略言之夫道者人之體性形之君也本含弘而光大人者道之妙用性之臣也惟當率其性之固有而滿其本然之分量以盡其妙用之職此之謂人能弘道非能出乎道外而弘其道之所本無也故以致良知良能之功用言之言人能弘道也可若以良知良能之本然言之言道能弘人也亦可所以知格物尤貴知物格吾且即問其人云何而能弘道所以能弘者為何物則道為人之主宰也不己彰明較著乎但人不順道不率性是自違於道自逆於性自暴自棄矣而道亦何能授擴充之柄於人乎故曰非道弘人此仲尼望人率性修道之奧旨反覆抑揚之微言也豈利妖輩所可得藉口哉故曰道也者不可須離也可離非道也豈依賴之云乎若謂之依賴則可離矣利妖之滅太極即滅中庸也利妖不言白馬乎曰馬乃自立者白乃依賴者雖無其白猶有其馬繇此而言則利妖以道為依賴是利妖以道為可離也是利妖實謂雖無其道猶有其人也此口一開孔之門皆閉矣詩曰人而無禮胡不遄死詩固謂人卑於禮矣何妖夷之無道無理至此哉夫滅理無道而曰精曰高攻孔悖孟斥中庸而曰符曰合卑德性而尊耶穌賤明誠而貴天主輕仁義而重天堂以生為縲絏以死為出獄源源而來開教於吾邦布金幾乎滿地豫則安能已於辨哉故曰忍心害理之甚者莫甚於今日坐視而不言者也破邪集自敘霞漳黃貞天香著姦夷設天主教入我中邦以堯舜周孔入地獄此千古所未有之膽也細查彼國毒法妖術真可暗天黑地惑世誣民此又諸夷所未有之毒也歷窺彼夷亂華機局真能使智者愚賢者不肖士庶同迷貴賤共惑五胡之禍未堪匹此且彼土産金銀密交上下黨羽之多不可算楊墨之禍未堪匹此貞嘗泣而言之矣始自癸酉年艾儒略之入吾漳也貞乃知之時每自嗟曰如此大患今天下無一人出力掃除之何耶又自思曰萬曆間宗伯沈仲雨驅逐之疏霹靂未幾而此夷旋踵復入千倍於昔天下為其所惑莫知其詳則今日雖再驅之安知後來不如今日之為其所惑而莫知其詳乎况豫草野愚拙微寒孤立其何能為因憤鬱胸熱如火纍夜雞鳴不𥧌得一計焉曰我今日當起而呼號六合之內共放破邪之炬以光明萬世以消此滔天禍水於是每拜天默禱曰小子貞願以無用之身用報孔孟用報君親用救天下萬世生靈勿為夷邪所害共還中國衣冠又自發誓以堅其志曰雖姦邪機深局巧金多黨大粉身碎骨我必無畏神祗共鑒於是不論儒徒佛徒是我非我惟極力激勸乞同扶大義乃奔吳越之間幸得沈仲雨等諸公舊疏於沉晦之秋遂募刻播聞然始也保守身家者多敢闢者少求之既如逆浪行舟且高明特達者微阻障者衆辨之又若紛𮈔尋緒每一回想不覺淚下或笑我曰此乃食祿者事何須子為應之曰政緣食祿者不肯為此故我飲水者為之或計我曰子一人耳縱為公卿亦不能與之敵况韋布耶子一人耳縱富千萬亦不能與之敵况微寒耶子枉費心力應之曰我一人誓必為之或危我曰彼姦黨聲勢自卿相以至士庶自兩京以至各省郡誰能計算子一人獨不為首領計耶且誰聽之而從子之舉乎豫曰我今日首領尚存政好出頭縱今天下無一人聽我我一人亦決當如此做况主上聖明政恨無人入告耳或辭我曰我只管明明德彼自消滅子何須如此豫曰我恐姦謀遂時把一刀了爾七假八假消滅在彼之先耳或折我曰彼教無父無君決不能行不足慮也答曰邪書毀堯舜孔孟者今現百餘種流惑天下蔓延於後禍世無窮試觀今日何處非耶穌之堂叛逆之教也乎或慰我曰此係天意子將奈何答曰天地今日亦被誣為耶穌所造且號於人曰天地如宮殿不宜祭拜祭拜則背耶穌天主天主怒置之地獄上天之意甚欲昭明故生貞也不肖日以破邪為務天意其政在斯或限我曰子非孟子胡能距得楊墨豫應聲喝之曰孟子原不是孟子我原不是我或止我曰子設破邪之計呼朋作闢蓋所以發明至道而砥柱狂瀾昭揭患害而維持邦家也猗歟偉哉然詞意已備事理已詳年月已久可以已矣今何必復求人闢愁苦如斯解之曰姦夷處處行金結人誰不貪者日日用術惑世誰不惑者凡豫求得吾儕之作闢章也便有許多辨説心力在凡吾儕之俯從豫請也便有許多利害明白在良知感激在而此後便不為夷黨所惑此撥亂微機難以言説况正人君子之文章可以培植人心多多益善乎嗚呼七年以來一腔熱血兩畫愁眉此身不管落火落湯此集豈徒一字一血談之唇焦未録之筆禿難完今幸集成謹拜手稽首以白天下後世曰此國夷衆生生世世奪人國土亂人學脈不可使其半人半日在我邦內也此破邪之集良存華明道之至計諸聖人之授靈於小子者其尤當世世流行而不可廢也夫崇禎己卯仲春書罪言山陰王朝式金如甫著閩中黃天香子為顏光衷先生門人翩然來越以狡夷之駕為天主説者相告願鳩同志合擊之必絶其根株乃已蓋痛邪説之迷人日日已甚而我國家廟社之憂不可言耳萬曆間南少宗伯沈公首發其姦疏三上未報而一時兩都府部臺省連章特奏相繼並起遂得旨放逐我華人惑於其説者亦皆依律正法夷氛為之頓熄則其為朝廷一大喫緊事可知矣顧查南宮署牘爾時狡夷入中國者才十三人耳今則指不勝屈矣建事天堂聚衆惑民止留都洪武岡一處耳今則景教之設延及數省矣擦聖油淋聖水者特八九擔竪今則縉紳先生且為其書辨首綴尾頌功揚德加吾中國聖人數等矣向使當日諸公及見如事其痛哭流涕又可勝道耶且狡夷欺天侮聖篾君毀祖其謬妄悖逆皆振古所未有而所以售其姦者亦從來所不及或布散金錢蠱彼貪愚或窮極機巧動諸黠慧陽持七克十戒之文以收好修之士陰𥨸生天入獄之説以堅從邪之志天下根殊器別固已一網打盡而又資之以舉國之物力竭其畢世之精神遂敢破明禁而闌入抗王章而不去日蔓月延幾遍海內斯其心其勢不舉我中國君師兩大權盡歸之耶穌會裡大明一統之天下盡化為妖狐一窟穴不止也岌乎殆哉故萬曆間明旨有立教惑衆蓄謀叵測之語蓋已逆知其如此矣然而今日朝廷不及問學士大夫不及知獨天香子以韋布之賤起而昌言之且呼號同志若求亡子於道者視古人著論徙戎更為深隱吾計天下豪傑之士必將翕然應之若式則視我君父大倫為邪説所破壞中國大聖人事天享帝之文為么麼所𥨸侮私心固弗忍而欲一倡大義為天香子摧鋒陷陳力又有所未能徒坐而貽君父以隱憂蓄生民之鴆毒則我一人不獨為大聖人之罪人實為天香子之罪人矣嗟夫驅夷直言溫陵黃廷師著字惟經號調兩己未進士古盛王通道諸夷蓋亦因其向化而以中國之治治之耳蠢彼夷酋朝貢有期其屬不許私入內地正朔是奉其人不得謬獻私書此華夷不相及之辨也我朝應天御極除𦎬羶而闢文明按堯舜之璣衡遵周孔之統系列聖代興諸賢輩出窮三才奧窔闡千古祕扄發明已無餘蘊未聞有天主之説如夷人利瑪竇艾儒略所云者也夫天主一説誕謬不通朝野諸先生名士擯之詳矣但未有詳其夷種原繇者余今謹將其夷種夷姦一一説破可也按此種出于東北隅為佛狼機亦為貓兒眼其國係干𮈔蠟而米索果其鎮頭也原距呂宋不遠所謂數萬里者偽耳其祖名仙士習其祖母仙礁麻里耶未嫁而孕生一子名為寮氏年十五頗有邪術周流他國誘占各處地方其間復有豪傑起而擒之釘以十字刑架而寮氏竟為罪鬼矣後承其術者緣此就假一説謂寮氏之死也蓋為萬民贖罪瘞三日復生説法三十三日飛升天上又謂凡能為寮氏死難者寮氏生之最上天於是諸國崇奉十字刑架輕生敢死雖赴湯蹈火亦所甘心更殺諸國主而襲其國遂設五院一曰仙多羅明一曰仙巴難𮈔索果一曰仙阿牛實丁一曰仙弊里氏一曰仙但耶此五院等番俱名巴禮分五項備用如遇鬬爭則以仙弊里氏往遇施與則以仙巴難𮈔索果往遇講和解紛則以仙但耶往至若教人文字則阿牛實丁司之而在仙多羅明則專持其邪説邪術誘惑鄰國即今艾利等所稱天主教是也嘉靖初年此番潛入呂宋與酋長阿牛勝詭借一地托名貿易漸誘呂宋土番各從其教遂吞呂宋皆以天主之説搖惑而併之也説既謬而又佐以邪術凡國內之死者皆埋巴禮院內候五十年取其骨化火加以妖術製為油水分五院收貯有入其院者將油抹其額人遂癡癡然順之今我華人不悟而以為聖油聖水乎且不特其術之邪也謀甚淫而又濟以酷法凡呂宋土番之男女巴禮紿之曰汝等有隱罪寮氏弗宥當日夜對寮氏解罪不論已嫁未嫁擇其有姿色者或罰在院內灑掃挑水或罰在院內奉侍寮氏則任巴禮淫之矣至若騙男人解罪則用白布長衣自頭面罩至腳下用小索五六條其索尾繫以鐵釘勒令人自打于背上血出滿地押遍五院乃止蓋借虐男人之法以嚇婦人也其淫酷蓋如此哉然使不從其教何至彼吞占何至彼荼毒耶繇是觀之彼所謂天主者即寮氏也寮氏乃其祖而敢紿我中國曰天主是欲加我無禮如呂宋也術險機深漸不可長神宗聖上弘柔遠之量命撫按驅之歸國不意祗歸我廣嶴或藏匿諸姦細家中旋即夤緣而起或掌星曆或進巨銃假此使得復開教於各省郡今其黨據雞籠淡水等處其意何叵測也奈之何尚有被其所餌被其所惑者豈部科諸公之疏參海內紳士之辨駁無有耳而目之者乎孟夫子曰吾聞用夏變夷未聞變於夷者也謹揭之以防猾夏之漸崇禎戊寅孟夏撰邪毒實據霞漳蘇及宇著號恬夫戊寅撰艾儒略等夷人也自萬曆間入我中國有識者窺其立心詭異行事變詐已疏其不軌而驅之矣今也胡為乎復來哉其故可思矣復來而天下不惟莫能詳察其姦併且前驅諸疏亦幾不得見夷輩喜而相告曰我西士有四眼日本人有三眼兩到日本開教被其兩殺故云中國人有兩眼呂宋人無一眼於是多藉技藝希投我聖天子之器使胡公卿士大夫相率詩詠之文讚之疏薦之至於禮樂兵刑錢穀營建諸大權皆讓能於夷欲夷司其事繇是夷勢夷毒日釀於其中而不可言夫復來而若此之久也天下竟無一人憂之而維其變將奈何夫中邦而若此又安得謂有兩眼耶所賴志士端人聞之心傷見之痛哭設破闢之計起豪傑之章賢士大夫有與之闢焉嗟嗟中邦人士今也亦可以有兩眼矣然愚細玩之道學先生祗辨真偽文人才士猶工典雅而狡番之所以為毒未昭其備也政恐讀者未便傷心痛哭而窹𥧌不寧也又將奈何野人無知天曆之説未暇置辨蓋但患人之不華華之為夷不患曆之不修修之無人也今姑舉邪毒異慘一二親見聞者實而據之一此夷詐言九萬里夫詐遠者令人信其無異志而不虞彼之我吞耳不知此番機深謀巧到一國必壞一國皆即其國以攻其國歷吞已有三十餘有薦疏云彼西洋鄰近三十餘國奉行此教是也遠者難稽其蹤最近而呂宋而米索果而三寶顏而雞籠淡水俱皆殺其主奪其民只須數人便壓一國此其實實可據者歟一此夷藏姦為市忠助銃令人喜其有微功祈雨令人疑其有神術自鳴鐘自鳴琴遠鏡等物令人眩其有奇巧且也金多善結禮深善誘惑一人轉得數人惑數人轉轉數萬今也難計幾千億萬夫邪之淺者難以舉盡最慘而毀聖斬像破王滅祀皆以藐我君師絶我祖父舉我綱常學脈而掃盡者也此又其實實可據者歟猶未也天主之教創書駕説以惑王臣士子華人喪心輩與之唱和矣而彼則早慮天下賢愚不一出入參半邪毒之流行為未遍未速所以必後先陰標諸教曰無為曰奶奶曰天母曰圓頓多方籠罩以為羽翼而無為之慘更甚蓋所以鳩天下之亡命無賴而煽惑夫一切愚夫愚婦也然嘗自排者何意吁噫難言之矣古有一計害三賢者此所謂一邪滅三聖者也於是呪壓之使合家持齋素愚弄之使各處起干戈蓋所以陽敗國家陰壞道釋明與天主反暗與天主通也教中默置淫藥以婦女入教為取信以點乳按祕為皈依以互相換淫為了姻緣示之邪術以信其心使死而不悔要之發誓以緘其口使密而不露至於擦孩童之口藥皆能制其必從令其見怪自萬曆初年此夷入中邦中邦即有吳公吳婆變亂特世人未知之也今日試觀父不父子不子夫不夫婦不婦孩童難保其孩童鴆殺生靈傷風敗俗莫此為甚我且計今之惑於邪也不惟民而兼士不惟愚而兼智我且計邪之行於今也不特顯而且陰不特遍而且速聞夷輩蓋嘗喜謂中邦之大器可窺矣其妄擬官民之毒法也數十里為一保保外不許相通人授里票為凖票志姓名形貌有越保而行者有行無里票者皆斬無赦里中設邪寺妻女驅入又嘗抽子以別母抽夫以離妻或抽本鄉倐居別國或抽此土倐往他邦東西變換南北移易蓋皆所以令熟者生強者弱勇者不得相通智者不得相謀是姦夷所以御呂宋三寶顏米索果等之毒法也此又其實實可據者歟夫既有實實三可據吾不知幾時後如何增毒如何愚弄嘗聞之友人曰彼夷凡所吞之國所統之人皆欲斷滅其智慧不許其學習必使人人為木偶然後快於心彼種則學習機巧無所不至此姦夷不易世而王之毒計也故嘗嘆胡元無智術不百年而亡今入中華實欲滅儒道釋而焚盡文字典籍以木偶萬世特其謀未遂耳何時而無是念乎聞此令人心寒今日滿朝俱荷君王恩遍野皆習孔孟書蠢爾狡番敢誑天子拜耶穌為天主敢毀孔孟入地獄為話柄朝廷無人憂憤之且也學脈教化兵刑禮樂錢穀營建堂堂中國大權交相口揚筆舉欲委狡番秉令是中邦人士不惟無兩眼而深愧日本也實且喪寸心而漸同呂宋歟念及此能不傷心痛哭鳴鼓合攻尚且高枕而臥是耶非耶哀哉利説荒唐惑世建溪魏濬著近利瑪竇以其邪説惑衆士大夫翕然信之竇既死其徒倡為天主之教呼群聚黨所至譸張南宗伯參論驅逐始散去然惑于其説者堅而不可破人情之好異如此所著輿地全圖及洸洋窅渺直欺人以其目之所不能見足之所不能至無可按驗耳真所謂畫工之畫鬼魅也毋論其他且如中國于全圖之中居稍偏西而近于北試于夜分仰觀北極樞星乃在子分則中國當居正中而圖置稍西全屬無謂古以陽城為天地之中若專論地中則應在崑崙高處第偏東地少海多偏西地多海少崑崙乃地中而非通地與海之中也通地與海之中宜在陽城耳故陽城八尺之表夏至午景在表北一尺六寸而冬至午景在表北一丈三尺偏東者早景疾晚景遲偏西者早景遲晚景疾則陽城為中得之測驗而定非懸談也嘗見金幼孜北征録載永樂間從駕親征北虜三月八日次鳴鑾戌夜見北斗正直頭上其所親見如此余且舉一嘗事人人皆知者春秋二分日躔行至黃赤道之交正居南北之中如鄉會兩試時值二分前後吾閩場日映止于足膚而會場日映席上閩去京師不能五千里相去已爭如許矣又交趾以南北戶見日謂之日南交趾距中國未遠也元人陳孚以至元間使交趾二月初三日宿溫丘驛未昏見新月乃在天心皆其較然可據者也又陽城仰觀北極出地三十六度南極入地三十六度若北至朔方則出入之度五十南至交廣則出入之度二十而已鳴鑾交趾所見相遠以至於此焉得謂中國如此蕞爾而居於圖之近北其肆談無忌若此信之者乃謂其國人好遠遊斯非遠遊者耶談天衍謂中國居天下八分之一分為九州而中國為赤縣神州此其誕妄又甚於衍矣至於九天之説總以星體之大小揣臆言其遠近日反在土火之下杜撰可笑蓋五星之體太白最大歲星次之辰星熒惑又次之惟填星最小測驗家謂太白徑百里歲星徑九十以次漸殺至填星徑止五十里星體大小即一座之間亦各異狀如心及河鼓三星皆中星大左右二星俱小織女三星上星大而下二星小比極五星大小更異是豈大者必近而小者必遠耶全圖只因月中魄影如世所謂婆羅樹及玉兔者昔人以為大地山河之影因杜撰以欺世人耳試取圖與月影質之即見瑪竇所製測驗之器謂之自鳴鐘者極其精巧此自是人力所能如古雞鳴枕之類耳豫嘗細析而觀之大要在兩大輪卷鐵暗匿輪中而貫之以軸鐵不受卷必展則設機以製之使不得展而轉極微細又設數輪相承以次漸小漸密鐵輪微轉亦以次相促而漸催漸急數盈則觸機而機脫迅疾如風輪上設杵十二如乳杵至則刮其挺以擊鐘疏密皆有次第然鐵既受卷久之則性亦稍緩不能與時合又須再卷使急大約每日定須一整整時須藉日影為準倘連日陰晦則無從取定矣但其法簡於壺漏耳
