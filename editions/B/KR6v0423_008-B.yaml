body:
  text: 鹽官居士徐昌治覲周甫訂統正序憶予曩謁霞城大座師許於華亭知有天主教來矣時邑之縉紳士庶口自操刃攻之若𭁵日訟于郡公縣公者人不啻萬億計狀不只千萬張緣以暴銀金多攀接貴介不肖利其有者亦稍稍作寬活套子聽其自去此予目擊其事也今夏月謁瑪石王父母師轉任閩之建安并仝詹月如年兄任甌寧復聞有天主教之寓于建寧也有年矣建邑之士其高期聳者莫不以鄒魯之邦自任豈小醜能亂哉且屬名儒梓里儀型不遠然其中不無仁智百姓受其狂惑毋怪乎小道可觀也以况雲閒之訟之者則未之有矣葢其俗天性惇厚不欲以非理繩人誠先賢過化之區而詩書源長即此軰亦不能生事耳雖然學必以正為宗一切吊詭皆可坐在左道之誅况以夷人亂華春秋首嚴而儒不儒釋不釋道不道獨標名曰天主教則更為左道之尤乎此閑先之力予所以與雲間許老師諸人有同心自不甘沒沒也偶因訪盟社李猶龍兄暨楚桃源上官法護先生得拜費隱禪師大和尚性命正解并諸公闢邪諸說因知三教聖人尚存人間此正其轉身說法時耳凡切吾徒衛之不可不力聊以一言辨之于首非好辨也以待後之學者大肆斧龯吾道幸孔崇禎九年夏月臨川劉文龍雲子甫著原道闢邪說寓黃檗釋費隱通容著揭邪見根源按利瑪竇邪見妄著天主實義一書列為八篇而首篇論天地萬物布置安排皆繇天主所生論至天主則曰天主之稱謂物之原如謂有所生則非天主也物之有始有終者鳥獸草木是也有始無終者天地鬼神及人之靈魂是也天主則無始無終而為萬物始焉據此便是利瑪竇妄執無始無終為天主之邪見根源矣殊不知此無始無終正是吾大道之元亦是吾全真之旨且此全真之旨人人具足大道之元個個不無在聖無增處凢不減抑亦在天而天在人而人至於物物如是法法亦然固無二無二分無別無斷故悟此謂之聖人迷此謂之凢夫要且凡夫之與聖人初無二致如是則聖凡靡間而物我匪虧顯見大道之元無彼無此全真之體無始無終一道平等而浩然大均矣葢瑪竇不悟此意專用心意識向天地萬物上妄自推窮計度以心意識向天地萬物上推窮計度到虛玄深邈處自家體貼不來便妄執有個天主具無始無終之量能育天地徤生萬物而萬物則有始有終謂鳥獸草木是也有始無終則天地鬼神及人之靈魂是也惟天主無始無終能制造幹旋且指物比類要人欽奉遵守而矯為過高之論卑劣今古聖賢指人都無有主而引誘多方黨于邪見假詞擊難辨駁繁端不啻枝上生枝而蔓上生蔓興如此煩碎之辨正眼觀之何益于事所謂毫釐之差有千里之謬信不誣焉或云人物鳥獸與天地鬼神如何見得是無始無終之旨耶曰前已總明今又復問姑分二說一者因人契證以顯人物天地及其鬼神俱是無始無終底意耳就當人心念上返照窮元則過去心念無有而未來心念無起現在心念無住三際既無則心念全無始而亦全無終矣如心念既無始而又無終則身體脫然無繫亦無前後三際了無生死去來直下披露無始無終即色身五蘊完全解脫而大道全真備在我矣既人人返炤窮元契無始終則草木鳥獸天地鬼神當前廓爾邈無形迹便是草木等類全無始終而顯大同之旨也且草木自不云草木鳥獸自不云鳥獸天地自不云天地鬼神自不云鬼神皆是當人識心分別見有差殊若無識心分別則頭頭是道物物全真故楞嚴經佛對阿難云汝今諦觀法法何狀正此之謂也又馬祖云凡所見色皆是見心亦不外此意又玄沙禪師一日于斫柴次見一老虎面前傍僧云和尚虎玄沙云是汝虎玄沙歸院傍僧問適來見虎云是汝未審尊意如何玄沙云娑婆世界有四種極重事若人透得不妨出得陰界可見無識心分別則物物契同縱猛虎當前亦無可懼矣又天何言哉四時行焉百物生焉則天亦無識心分別故能行四時生百物而與四時百物𡨋相溥洽更無缺悖者矣又鬼神之為德其盛矣乎視之而弗見聽之而弗聞體物而不可遺夫鬼神既非視聽可及又能體物不遺則鬼神亦無識心分別而其德固為盛也且孔子推鬼神之德如此之盛而瑪竇謂有始無終豈其宜乎然則鬼神天地鳥獸草木雖因人契證顯其無始無終要且自性如是而亦自離意言境故經云諸法不自生亦不從他生不共不無因是故說無生無生之體渾然一致默識心通而與契合無容妄想執着擬議分別于其間矣二者以明天地人物及其鬼神不因人證本來是無始無終全無間隔之差且據實約多廣而論則虛空無盡而所包世界亦無盡以所居眾生亦無盡乃至天地鬼神草木鳥獸悉皆無盡不得而數量之以虛空無有邊際則凡所有物悉無邊際法爾如是非是強為使之然也又據實約久嘗而論則虛空無終始而世界亦無終始眾生亦無終始并及天地鬼神草木鳥獸悉無終始覔其終始起伏了不可得以顯虛空世界一切眾生及天地鬼神草木鳥獸同時同際無分前後永久嘗存熾生不息葢亦不期然而然非使之然也然我土傳說謂盤古之時始有天地人物等類而盤古之前無有天地人物一切等類者此據理推之係一切眾生情分召感以成生息始終之道正我佛說隨一切眾生差別之性故有成住壞空之刼不同至于纖悉之物皆具此刼刼數因緣載藏經惡字函起世因本經內住世品備悉又據理推之世界有多多無盡則此世界成而彼世界壞彼世界住而此世界空空而復成成而復住住而復壞亦不期然而然勢之必然非此世界壞而彼一切世界悉皆壞之也如是則盤古之前無有世界人物據我娑婆世界之說非極空際所有世界悉無之也理亦明矣譬如一州城市自有方隅據方隅中俱有屋宅毋論一隅屋遭回祿一回祿後則屋又仍依襲始造據始造中又有最初第一始造之者就最初第一始造之者比一物之始生而後依襲多生一物如是眾物亦然此便是喻利瑪竇妄執天地人物及草木鳥獸有最初始生之謂也然各方隅中所有屋宇有遭回祿及不遭者喻之刼𢿘有住有壞此約別分以明天地萬物有始有終也一州縣中城市屋宇望之儼然無有燬者及不燬者喻之極空所有世界終古象立無有壞者及不壞者此約同分以明天地萬物無始無終也以同分言而該多廣眾博故以別分言而就約畧窄狹故總以同分明之虛空無盡眾生無盡世界無盡乃至天地萬物悉皆無盡既皆無盡則無始無終既無始終則天地萬物皆無始終而眾生世界亦無始終乃至極虛空際凡所有物悉無始終如是則縱目所觀縱手所指物物頭頭事事法法本來無始而本來無終自具大道之元全真之旨又會而歸之總備當人自心顯為一體焉今畧比明葢當人有心思及一物則一物可知可見并及可聞一物不思則不可見亦不可聞并不可知類而推之一物如是眾物亦然乃至一世界如是多世界亦然既爾則一人有心一世界現多人有心多世界現無多人心無多世現一人無心無一世現如是則世界之廣多事物之彌盛總在一心包羅該博無一法而不具攝者故孟子曰萬物皆備於我子思曰致中和天地位焉萬物育焉程子曰放之則彌六合卷之則退藏於密經亦曰心生則種種法生心滅則種種法滅又云心也者總持之大本萬法之洪源不可以知知不可以識識知莫能知識莫能識默契其旨存乎其人也又於此當立三支比量以防外道毀法之謬葢西域菩薩與外道論義要顯三支齊備則義勝許立若宗因喻三支不齊或宗與因相違而因與宗相違而喻與宗因相違等皆不能立自墮赤幡之下甘倒著衣而出或自斬首立誓以見法有輸勝故也今初立量以先明天地萬物皆是無始無終為道原全真故此當先立量云大道全真為有法天地萬物具該為宗一於無始無終為因同喻如虛空以虛空亦綿亘不斷無有邊際而具該萬象故異喻如龜毛兔角以龜毛兔角本無所有異于無始無終不能與萬象具該也次當立量以萬法會歸唯心則立量云唯心為有法萬物具備為宗亦以無始無終為因同異二喻一如前例茲不煩贅且瑪竇妄執有天主獨具無始無終而生萬物為有始有終理甚乖舛誠不足信試以辨明葢萬物既有最初始生之時則最初始生之前無有萬物既無有萬物則必彼時天主能生之功亦必有滅有終以因天主能生之功有滅有終故顯萬物最初始生之前無有既彼時無有能生之功又無所生之物則顯無有天主唯一混沌空晦而已炤如前論眾生召感混沌空刼是也而瑪竇不悟錯認妄計為天主以具無始無終寧不邪謬之甚乎且伊既謂天主具無始無終則應智能體用悉無始終方顯為全智全能有徤生不息之道若有間隔空缺於其中則非是徤生不息之道亦非全智全能之理而亦愈顯非具無始無終之體量也譬如虛空該羅萬象無時間離而亦無可逃遁直與萬象無始無終方稱全功豈有天主具無始無終為全智全能而獨生物有間有缺有滅有終乎然則據伊妄計天主錯認雖多不用盡究就此最初生物一端反覆辨論理窮於是顯見無有天主明而且著誰有智者受伊外道之所惑哉又縱伊謂天主則無始無終而生物謂有始有終今以三支比量炤破宗因相違誠外道法固不能立理無可信也於此當立量云天主為有法能生有始有終鳥獸草木為宗自以無始無終非所繇生為因同喻如龜毛生物以龜毛非所繇生本無所有則無生物之理既無生物之理則因與宗相違而亦宗與因相違既宗因相違則伊所立天主之義不極成矣唯是自法相違矯亂不一者異喻如人生人以人同人類故異於無始無終非所繇生之天主生出有始有終之鳥獸草木也智者於此推而鑒之則知伊之妄計天主固為無根之談也然瑪竇全不省天地萬物備于自己而自己與天地萬物具足無始無終本來者一着子向天地萬物之外妄執有一天主獨具無始無終誠為邪見外道也葢不信大道本來具足向外別立有法名為外道不見大道本來自具妄見別有一法為之企慕名為邪見故命名曰揭邪見根源然則其書總明是邪見而稱天主實義者正是妄執有天主為邪見之實義則其書當叱為邪見書云揭邪見以空無謗佛邪書第二篇假以中士謂吾中國有三教各立門戶老子謂物生於無以無為道佛氏謂色繇空出以空為務此亦見瑪竇外道不識我佛單闡無始無終全真大道為究竟妄以空無生物謗我佛矣殊不知我佛以無始無終全真大道演為一乘實相了義之法為之開示令人悟入且一乘者何乃實相嘗住之法也此實相嘗住之法在於何處就現前天地萬物縱目所觀縱手所指頭頭就位物物天真從本以來是實相嘗住之法物既如是人亦復然故法華經云是法住法位世間相嘗住以事事法法住於本位則天住天位地住地位日住日位月住月位人住人位物住物位既各相住于本位則本位即是無始無終實相嘗住之體既是實相嘗住之體則顯天相嘗住而地相亦嘗住日相嘗住而月相亦嘗住人相嘗住而物相亦嘗住既都是嘗住則天地萬物古今物理皆一乘實相嘗住之法也且此一乘實相嘗住之法從本以來非空非有非因非緣非自然性四句既離百非並遣口欲言而詞喪心欲緣而慮忘直得出乎心思言議之表默契於斯者可謂悟入實相嘗住之法矣夫如是則目前色色物物豈從空出耶若從空出則終歸於空豈得謂之實相嘗住乎既非空出則是汝妄言謗佛謂色從空出義固墮也以空為務義亦墮也空能生物義亦墮也汝義既墮則汝此篇說話辨論窮詰皆妄言也汝謂二氏之徒並天主大父所生則吾兄弟矣譬吾弟病狂顛倒怪誕吾為兄之道恤乎恨乎在以理諭之而已觀汝不逹全真道元妄執有天主則汝是邪見外道豈我佛為汝兄弟乎汝既邪見外道正病狂顛倒怪誕至無窮刼未有返日我今且不恤汝亦不恨汝但以全真元道之至理喻汝耳汝之夷軰其亦知返乎汝又謂堅繩可繫牛角理語能服人心觀汝不逹全真道元妄執邪見則如野牛妄奔妄觸無有休日我但以元道正理為堅繩亦可繫汝邪見之牛角且不計汝服不服矣汝又以虛無為賤以天主為貴是汝既不逹實相嘗住之理妄謂佛教是虛是無如謂之虛汝自妄虛也謂之無汝自妄無也謂之賤汝自妄賤也又何能凂凟于我佛乎汝又謂試以物之所以然觀之既謂之空無則不能為物之作者模者質者為者我教既非空無是汝妄計為空為無誠如所言不能為物作者模者質者為者此是迷空情現益見汝自敗露矣然汝既不逹大道之體人人本具物物全真妄以空無作此反覆辨論欲取勝于佛吾知汝不能取勝特自取敗抑亦自無自空自虛汝若是誠是有是真是實决不自甘作此無主孤魂計心外有一天主百年之後往彼依附使一切人都作無主孤魂悉如汝者真所謂業識茫茫無本可據也或云色繇空出以空為務瑪竇亦有所憑未必臆說曰縱有所憑亦不過我家小乘偏計色空之謂非是我佛一乘實相之談然瑪竇未曾備覽佛經唯迹朱子大學之序謂異端虛無寂滅之教其高過于大學而無實且朱子亦不曾備究佛經大乘實相之旨不過涉獵見聞影響附會于其間便以為然矣然朱子一言之錯而瑪竇據以為憑醜婦效顰轉見其陋邪蔓引蔓不可勝長凢我金湯固當剪除云揭邪見不循本分以三魂惑世邪書第三篇內假以中士謂誰有安本分而不求外者雖與之四海之廣兆民之眾不止足也愚矣此亦見瑪竇自昧全不知悟葢伊既妄計心外有天主可慕可修可剏業於彼便是不循自己本分而向外馳求終竟無有了日反說他人誰有安本分而不求外者見倒惑生理固然也始不知人人所固有者曰本心曰本性曰大道并形所繇來者今古聖賢莫不於此盡心性焉故以斯道以覺斯民百姓安而君王治故君王富有四海不以為多兆民之眾不以為盛不謂不止足抑亦非愚葢分所固有也匹夫之窮一簞食一瓢飲雖居陋巷不改其樂終不外慕葢亦自安其分也使人人各安其分則上下和睦而四海晏然天下於是太平矣如是則君安君位臣安臣分而百姓庶民悉皆安分既皆安分則道流德化于其間固不外乎當人自心與自性也然則瑪竇迷于本心失于本性理必悖嘗逆倫致君為愚使臣不忠而上下不和凡天下之事悉皆倒置必自利瑪竇軰向外多事不循本分之故也伊又謂然則人之道人猶未曉况於他道而或從釋氏或繇老氏或師孔氏而折斷天下之心于三道也乎夫明其心盡其性不假于外則人道備而釋氏同老氏契而孔氏貫且此三者一猶三三猶一如寶鼎之三足摩醯之三目不期然而自然能復天下之心無有遺逸何斷折之有瑪竇誠異于此昧却本心妄求于外則人道固未曉抑尤迷于釋氏而老氏孔子全未夢見故謂折斷天下之心于三道也不亦宜乎於此亦顯見瑪竇將儒教與釋道並棄不在伊目豈孔子為萬世師一旦被此邪見所蔑而明鑑君子當與排擊歸于正理是急務也又以三魂作多方辨論惑世誣民其害不一試以聖言量破之孟子曰形色天性也唯聖人然後可以踐形夫踐形者就其本體當然之理全真默踐合乎天性為一體直是心身一如身外無餘色心不二神形靡間而身前弗慮死後不計聖人于是了生死通神明亘古今而不磨誠為大道之根本也而瑪竇不達聖人之道妄以遊揚魂慮為實法繫人望於大道已甚不可何况更於一人計有三魂曰靈魂曰覺魂曰生魂謂生魂之與覺魂百年都滅而獨靈魂百年不滅夫有滅有不滅則不能踐形為一體亦非合乎天性之道唯是欣厭取捨生滅邊事而當人本命元辰大全之旨全無實踐可知伊是無主孤魂隨處棲泊不馳天堂便入地獄一憑天主賞罰自無立地之處矣又裂禽獸不具靈魂應供口腹致人恣殺全無不忍之德將吾聖賢盡人盡物之性一時迷沒且人分上計有三魂已是迷妄何况更裂禽獸不具靈魂致人恣殺寧非迷中又生迷妄中復增妄乎據此誠為穿鑿邪見業識紛飛害己害人其謬固不可勝言也豈知我聖人能踐乎形天性一體而心身一如身外無餘色心不二形神靡間故生前過去弗計而死後未來不慮覿體了然無容毫髮於其間所以神明燭古今直與天地伍焉此又理學君子固宜燭破其外道之邪見惑世誤民之太甚也揭邪見迷萬物不能為一體邪書第四篇以萬物不能為一體又以自執天主不與萬物為一體亦以萬物不可與天主為一體識情計度勢固然也葢伊舍乎心離乎性向天地萬物之外執有天主誠虛妄法如龜毛兔角無可與萬物諧而萬物又豈可與虛妄該乎無怪伊謂物物各一類彼此各一軀尊自尊而卑自卑大小相背巨細相凌不能一歸於大本親薦其覿體也夫大本也者乃天地萬物本於無始而亦本於無終也若萬物究竟有終盡之時則試問伊邪軰即此天地萬物從今日去至於未來何時何日何月何年何世何刼是終盡之驗乎若萬物亦有始生之時則亦試問伊邪軰即此天地萬物從今日始推至過去盤古之前離汝妄執天主能生之外而此萬物亦是何時何日何月何年何世何刼是始生之兆乎吾知離汝妄執天主能生之外推之萬物固無始也而亦無終也既無始而亦無終則即此無始無終是天地萬物之大本也悉其名則曰本心曰本性曰至理曰大義曰一氣名目雖多而旨固無外此無始無終之大本融其大本則曰亘古今通物我包萬有齊群象無所不該而無所不貫故此大本與萬有群象古今物我為一體葢名相雖殊而所稟之道體一也然則物物頭頭道體不昧則名無其名而相無其相名相不立而全體覿露超乎識心妄想出于思議之表矣苟涉思議形於妄想則名相殊而町畦現大小別而尊卑異欲合為一體不止如人欲到東京而行向西日刼相背終無到日矣此正合利瑪竇用識心妄想分別萬物不能為一體之實驗也然既迷一體之旨亦背一心之道故舍乎心離乎性向天地萬物之外妄執有一天主將我三教聖人心性之道竊合其量謂天主無始也無終也具有無量之能包乎天地萬物而不與天地萬物為一體故賤天賤地賤人賤物賤古今聖賢反謗我佛說心量之法為誑經為傲慢將聖賢闡天地同根萬物一體矯揉悉盡幾為伊識神所迷矣嗚呼舍乎心性終古經嘗之法妄執天主為過高竊於聖而反毀乎聖噴此腥唾如口含糞橛自臭一時比我聖賢終古嘗道豈可同年而語乎或云天地萬物本於無始無終為今古嘗法有義乎曰凡天地萬物在乎當人善契不善契止于幾微之間若認以為有是妄執嘗見若認以為無是妄執斷見默契於其間則出乎妄執有無斷嘗之見而合于無始無終一實真嘗亘古亘今之道也若利瑪竇則以天地萬物為有始有終不契真嘗之體計為斷見且吾聖賢闡心性之外更無餘法縱執有之皆是虛妄不實而瑪竇偏計心性與天地萬物之外執有天主另具無始無終有無量能誠以虛妄不嘗之法計以為嘗如是則嘗計無嘗而無嘗計嘗轉徧計度叠成六十二種邪見如我聖典所明而瑪竇悉皆備足望我一實真嘗之道何日而得染指乎誅左集緣起武林後學釋普潤著夫天主教者實乃邪因外道反嘗異端法所不容理之必黜者矣按其始挾技以逢好事揑徵以啟信邪既而招來醜類朋作偽書今舉其尤餘推以類葢彼不達唯心全迷一體故執心外有法謂萬物皆生于天主性體不徧一靈唯局于吾身且陽排釋道以疑儒陰貶儒宗而探學斥率性為非道譏事親為不臧怨禽獸以無靈誣木石而有命因以烹割為齋蔑好生之盛德悖逆猶孝亂秉之大倫抹殺輪𢌞謂無終而有始私頒律曆示彼正而我偏無後未為不孝多妾誠為大愆理欲混淆華夷倒置故凡入其教者斬祖宗之祀唯諂祭一天主火神聖之像但供十字刑枷廢父母三年之喪行渠魁七日之禮大呼我主我罪揕披髮而號暗洗聖水聖油彈指點額而詭駕言𨚫祟以行怪假托授秘而誨傷俗敗倫靡所不至甚則螻蟻佛祖伯仲君親謂周易多少不通堪赴丙丁童子誣禪宗自他俱悞全然烏有先生謗太極仁義為賤虛三藏教乘為謬妄指胡女產之耶穌呼為上帝罷德變之魔鬼名曰釋迦姦盜詐偽之徒一造其室遂登永樂之天堯舜周孔之聖不得其門久錮鍊清之獄行人之不敢行道人之不忍道欺天侮聖無父無君至此極矣况復賂漁中貴羶餌寒衿貢獻縉紳簧鼓黔首教之以避吉趨凶制彼甘心而赴難弔生慶死激其奮志以樂忘加以製火車鑄巨銃城廣嶴築平和帑叵測其所從人不定其所止鼠窺我土業已五十餘年蚕食我民不知幾千萬戶察其不召而來既逐不去其視三尺為何如外貌謙恭內懷詭譎實與五胡無軒輊得民如寶揮金若泥逼處都郡要隘意果欲何為哉苟志於衛道籌邦上弘下化者應不啻賈生之痛哭寧忍乎巢父之傍觀是故子輿力排楊墨良有以也初祖躬摧六部豈徒然哉嗚呼哲人往矣景慕空殷踵斯作者予日望之潤也匪似濫居禪窟輙興斯舉不獲已焉每思聞一言而謗佛如三百矛以刺心後昆之罪首莫迯先覺之功臣罔克愧未及著全書而破邪願先驅揭眾言以見志於是蒐諸遐邇得若干篇緇素兼收拙工靡擇意在廣集同然之理公誅左道之心庶道統治統咸明君恩佛恩齊報云爾崇禎甲戌仲秋之望扶病書於閩漳南山潛雲堂闢天主教檄武林釋成勇著竊惟法本無諍理難容偽正邪元不兩立佛魔久已攸分爰有狡夷潛居都會負固跳梁乃法綱之漏網用夷變夏誠王路之伏戎害理喪心殃民惑世指周孔為罪人欺天罔聖訶佛祖作魔鬼謗法蔑僧弟父友君弔生慶死集怪誕以成書其心叵測布金錢而賈眾立意何為包蓄異謀譸張詭行斬祀滅倫藐二祖列宗之成憲斥書毀易塞百世一統之治原恃錢神如無盡燈肆焉作亂昧般若如大火聚妄敢輕嘗害豈六師𦕈同一介甚至誣污雲棲大師誹辱天童和尚災近剝膚怪同見斗然吾道乃涅槃天上之皎月霾翳何虞但此類亦大悲心中之赤子寧無痛惜某等既為佛子幸際聖明沈宗伯之諫疏猶新許徵君之闢書尚在凢我同仁敬期共事或口誅筆伐齊吐徽音或面折庭諍各申妙辨摽赤旛於當道鳴論皷於王庭掃殄妖氛肅清狐兔庶佛日永明法燈徧熾曷勝惶悚泣告崇禎十年春王正月具天學初闢羅川釋如純著天教云天主者乃全能全智造成天地萬物為之主宰者也厥初生亞當阨襪此為人類之祖其靈性其形體本極備羙備福後一犯違聖命恩澤悉隳病患隨至情欲錯出天路隔焉此祖宗之罪污又傳於人類故人從受孕來即皆體是污染而凡後來罪惡無不繇此根芽闢曰然則天主賦命唯善無惡何不使亞當阨襪全其性善絕其情欲不為萬代子孫清淨之源乎且當初生之人情欲未及滋蔓少展神功俾渠克肖豈不易易况全能全智則必洞徹萬世之流𡚁即盍去其方命者并護後來人人善始善終絕為惡之根倪何不利益而乃恣其惡念蔓延至今以致污染不了是何自遺惡本耶葢斬莠必除其根療疾必攻其本而此人工猶窮委防微何天主全能而反養癰蓄蠹如此耶若云天主彼時即欲滅之但恐無傳人種然天主有生人不已之機何不再生一個好人以之傳耶若謂其惡未甚不忍遽絕則稽天之浸發于涓涓燎原之熖起于星星天主忍坐視乎若謂已知其有生必有過犯而聽其自善自惡以定賞罰是罔民也其所主謂何其稱全智全能謂何則知所謂天主者非能為天地人物之大主宰章章矣吾人又胡彼之惑為天教云仁者以天地萬物為一體乃至以之為體則此亦一體彼亦一體不可強而同明矣闢曰葢體有性體之體有形體之體形則妄而異性則真而同不可不辨也故論性體則智愚靈蠢飛潛動植小至塵芒大至不可禦無少不同也如論形體則萬品流形而自異然非萬物一體之旨之所取胡可執相難性而疑萬物一體之本性乎今子若能了相無自性并無自相則相相一相也性性一性也而疑釋矣余故知渠錯認本源故輒云人物不同性人與天主性尤逈別是為天主一性人一性物一性而一貫之道碎裂無餘嗚呼以此論性而教斯民實三教聖人之罪首矣天教云上達以下學為基天下以實有為貴以虛無為賤二氏之謂曰無曰空於天主理大相剌謬不可崇尚明矣闢曰循名起執罪惡之端得意忘言聖賢所與葢不知妙無者不無真空者不空乃妙有真空真空妙有之義耳况佛氏微旨離四句絕百非口欲言而詞喪心欲緣而慮忘老氏亦云吾不知其名強名之曰道遽可以空無盡之哉葢耳食之徒承虛接響謂無為絕無所有之斷無謂空為毫無所存之頑空不明其旨妄加詆訾如人未到寶山疑皆瓦礫封於自見非謗則誣矣彼豈受爾之誣哉况無極而太極不以無為貴乎吾有知乎哉無知也不以空空為貴乎太極即具眾理空空原𣷉兩端濂溪得嫡其傳尼父道統心脉業承眾聖師表萬世抑將非上逹之基敢不崇尚而賤之耶噫大矣哉空無之不可輕議矣明也而况不滯于是者固可借此以非乎天教云自古及今萬國聖賢咸殺生食葷而不以為悔亦不以此為違戒又孟軻示世主以𢿘𮊁不可入污池斧斤以時入山林非不用也闢曰噫是不知聖人有莫大慈悲甚深妙義轉旋五濁生機之微君子之所為眾人固所不識也伏羲氏始設網以警異類詳其意總防民土處木棲之囏而非以生厥我供恣其殺也嗣是禹治洪水益焚山澤亦不過驅龍蛇虎豹於淵菹使各安其所殆非為殺生者作俑也是以成湯解網子產縱鱗與夫釣而不綱弋不射宿君賜生必畜之至於不折生草不履生虫者孔子仁之然徵仁術於觳觫之牛驗良心於惻隱之緒故曰見其生不忍見其死聞其聲不忍食其肉其垂戒也孰嚴於是前聖後聖雖設施不齊要之好生不忍之心未始有不同者矣苟天生禽獸我殺我食胡為聖賢襲此姑息之不忍耶抑不知生而我給反節𮊁之入山以時耶又胡為必齋戒於褅嘗禁屠沽於旱潦無故不殺牛羊七十政開食肉其殺之之罪孰明於是不幸而習行成性莫覺其非今子遽曰戒殺生者為不經實天生而為我用如食河魨者曰必不至死噫于我何預哉苟子親聞天主禽獸我生食爾也禽獸死而靈亦滅也恣爾殺不爾罪也則可否則率天下後世之人逆聖賢不忍之心而為忍行者必此之言嗚呼子之罪上通於天矣至以菜中紅液為血種種謬妄鄙俚之談不足斥天教云輪𢌞之說乃閉他臥剌之語佛竊為然藉此以駭人者自佛教入中國始聞其說誠不足信闢曰性真嘗中求於去來生死迷悟聖凢了不可得但清淨心中不達外境唯心倐然而動名之曰妄以妄為因作種種事業業有善惡輕重之殊故感報亦苦樂升沉之別葢果非業不足以召業非惑無從而興惑業苦三更相繇藉如汲井輪自成輪轉若揭日月於中天誠無得而疑者苟果不繇業則均為天主之所生無論禽獸之卑蜎蠕之𦕈即人類中富貴貧賤壽夭窮通不啻天淵倍蓗而天主之至公安在哉其輪𢌞之理如是豈待竊閉他臥剌之語耶雖然果不自果因業而果業不自業繇惑而業惑不自惑緣妄而惑妄不自妄從真起妄真不自真對妄名真故曰應觀法界性一切唯心造是則心生則種種法生心滅則種種法滅所謂夢裡明明有六趣覺後空空無大千佛不云乎一切眾生具有如來智慧德相但以妄想執着而不證得從迷積迷莫知底止世尊說為可憐憫者又豈藉輪𢌞之說而駭人哉若曰佛教入中國始聞其說是大不然雖無其言業有其事如鯀化為熊望帝為龍羊哀為虎彭生為豕如意為犬黃母為黿宣武為鼈鄧艾為牛徐伯為魚鈴卞為烏書生為蛇李微為虎等此種種皆儒書記載盡釋教未入中國以前昭昭有之特未揭出輪𢌞兩言耳葢有其言而無其事者或有之矣未有有其事而無其言井不信其實有之事者亦惑矣若曰盡信書則不如無書則六經可焚棄是非通論也程子嘗曰親見村民化為虎自引虎入其家食其猪羊聖人亦曰精氣為物游魂為變甚有深意葢生而曰心死而曰魂非二物也聖人曰變吾佛曰輪理則一也此非又一證乎何遽謂無輪𢌞耶則知此身既不可以嘗保倘背善而趣惡固不免為異類故玄宗直指云人用禽獸心死必為禽獸生用人天心死必為人天此唯心之旨不易之理也若謂無能記前世之事以證無輪𢌞者不見羊祜識環鮑靚記井向靖女亡而再育問父母以求刀文澹幻質以還生說香囊而驗父龜齡賦橋碑之宿寫子瞻指殿陛以曾堦事匪無徵孰敢不信且吾人壯而不記襁褓耄矣頓忘壯年一身所歷之事尚然罔憶而况隔生乎至於終年染翰累舉筆而忘字薄暮移榻夜起而莫辨東西豈遂謂不繇昔而突然自有于今耶縱歿彼而即胎此尚有臨終倉卒之怖母腹局促之昏顛倒而下莫知所措改頭換面習業懸殊迨識人事來竟不知相去幾歲月矣欲責以憶前世之事不亦甚乎故曰菩薩有隔陰之昏羅漢有出胎之障苟非智通宿命惑淺業輕未易記往事也故憶者少而忘者多也若云記者少不足以徵輪𢌞余亦將曰以此少記者足徵子教非無輪𢌞何則記之云者存往事於心也子教謂凢人之生時天主即造靈魂𢌿之然則斯身也固父母遺體也斯靈也亦天主之始造也其所能記前事者何也佛經固不足信也書史亦不足信耶學佛者固不足信也夫學儒者豈亦不足信耶欲盡信固不可也寧無可信也耶苟有一可信則子將欺天乎欺人乎適足以自欺也且輪𢌞者往返之謂也轉展不息固輪𢌞也即從此遷彼亦輪𢌞之分也必一定不移而後始可言無輪𢌞矣子教謂生則存斯世也死則隨其善惡而升降焉永永無盡也然則自天降靈乎人又自人或復登乎天是𢌞也輪亦過半矣况又曰人稍有惡未盡必入煉獄伺其罪淨而後升天又曰耶穌自天而生于人自人而墜地獄又自獄而復生為人又自人而登于天其輪𢌞亦既多矣縱曰以不變禽獸為不輪𢌞者吾教固未嘗單以人獸而論輪𢌞且余亦未敢為子保也心境交加疾如風火從朝至暮一息不停俯仰之間變態萬狀前念未滅後念繼生道心人心禽心獸心不知其幾週匝乎其間其為輪𢌞不已甚乎又何伺帶角披毛而後為異類哉此心實輪𢌞之本也循業受報輪𢌞之理也前所引者輪𢌞之事也游魂為變輪𢌞之證也記述往事輪𢌞之徵也昭著若此雖欲不信不可得也夫天教云性異同繇魂異同類異同繇性異同焉闢曰夫血氣之屬必有知凢有知者必同體葢目均視焉耳均聽焉身均覺焉鼻均嗅焉舌均味焉心均思焉順則樂而逆則悲生則安而死則危其不學而知曰良知不學而能曰良能豈惟人有哉即至微如蚊蚋蚤虱莫不知趣利避害慾食行藏其所以不能推論道理者黑業使之然也非知之體有異乎人者也若必以推理別其類豈惟禽獸哉而人亦有之且多有之亦可謂非類耶既不能推理未可以遽分類是以形而類非以性類也况人之行猶有甚于禽獸者又將何以類之哉故人畜異類并異其性者非也孔子曰性相近習相遠斯言得矣天教云佛氏之國陋而且鄙世人誤讀佛書信其為淨甚有願蚤死以復生彼國者良可笑也闢曰此係謬妄無據誠不足斥但彼不情造過惑世誣民大都類此且此謬所易明引教證虛以例餘者按彌陀經云從是西方過十萬億佛土有世界名曰極樂即所謂淨土也葢三千大千世界為一佛土謂一佛之報土也正言從此娑婆世界之西去過一佛土二佛土乃至十萬億之佛土其遠亦不可思議矣故曰生則决定生去則實不去乃唯心淨土之旨耳今子指印土國以當經中所詮之極樂其淨穢苦樂竟不啻霄壤矣且西人遠於印土尚可航海而來如以彼為淨土則吾人亦可往矣又何必願早死以生乎且曰世人誤讀佛書不知自誤也曰良可笑適足以自笑也不思之甚也其無根謗佛皆若此悲夫天教云中國緣帝王托夢宰相貢䛕差去使臣奉君相意旨何所不可崇餙取至番文誰人識之以意演誰人證之葢自蔡諳秦景用白馬駝回虛譎詐而百端偽妄以潛伏不可究詰矣闢曰此亦前章之類妄誣尤甚一無所據既云不可究詰則真信詐䛕均之無考虛譎詐等又何從而知之苟以筆舌抑揚固無所不至舉世無知則倖脫有識者其吹毛求疵故入人罪灼見子之心術則何益矣夢而曰托似乎有心必未夢之先懸知西竺元自有佛恐人未信特假夢以求其符則可然明帝實未嘗知西方有大聖之說乃太史傅毅述古語以對明帝之卜夢者故曰臣聞西方有大聖人名之曰佛不治而不亂無為而成陛下所夢其必是乎是乎也者未决之詞也葢毅亦未嘗親見故秪曰聞何遽曰帝王托夢宰相貢䛕耶下承上命不能必其無崇餙然亦有不可崇餙在焉其釋迦之畵像似崇餙矣然而舍利流光旋環如葢暎蔽日輪非蔡諳等可崇餙者矣取來之經四十二章而已矣用白馬以駝似崇餙矣然經中若文若旨非佛不足以言豈諳等能之乎偕迦葉摩竺法蘭二尊者來似崇餙矣然其放光說法飛行自在而諳等能之乎凢民易惑四眾雲臻似崇餙矣然天雨寶花及奏眾樂諳等能之乎是時欽釋慢道似崇餙矣然而築壇焚經以辨真偽而道教燼而釋教存故唐太宗焚經臺詩有春風也解嫌狼藉吹盡當年道教灰之句豈諳等能之乎縱能崇餙於一時寧能使天下後世皆崇餙乎邦畿內外創梵剎以居僧似崇餙矣於時後宮陰夫人王媫妤等一百九十人司空楊城侯劉善峻等二百六十人四岳道士呂慧通等六百二十人同時剃染帝親與群臣給供浹句諳等能之乎且安榮寵忌寂寞莫宮宦之若也妻孥之愛孤獨之悲士庶咸若也封已見疾新端莫羽流之若也然其脫鶴厰而披袈裟捨名位而歸蘭若豈惟諳等之不能即極威以臨之重勢以迫之導之以親友驅之以虎狼苟無實感於心遂肯捐棄恩愛毀容易服一旦皈誠未之有也又按鑑斷明帝天資明敏尊賢下士幾成聖治倘昧于恢詭譎詐尚得稱明敏乎當時師傅鯁正循良如張佚張衍桓榮宋均軰皆宿德純儒犯顏敢諫豈復貢䛕而釀非理者乎如云崇佛即䛕也則自漢歷今其間帝王卿相崇佛者不一而足謂裴房楊李等為貢䛕之臣且不可敢以唐宋諸君迨我有明太祖成祖至於神宗皆為納䛕之帝又安可乎曰取至番文誰人識之斯言不情之甚胡能損至教哉葢國必設掌理四方之職以司隣國之詞令故譯塲經舘列十位以該羅預從事者有八備十條之約其所以鄭重若此正緣華梵相恐誵文義者爾十位維何所謂主譯者筆受者度語者證梵文者證梵義者證禪義者潤文者證譯義者梵唄者校勘者非精通三藏明練顯密無以為譯主非言通華梵學綜有空無以𠑽筆授度語者變梵成華傳度令生解也證文然後梵本真證義則其所詮正定慧等持方稱證禪之職辭章藻雅始宜潤色之充證義酌既之旨校勘讐已譯之文自始至終能事畢矣然有恒位而無恒人唯推能者當之故聶承遠父子房融等嘗筆受焉李嶠韋盧藏用等嘗潤色焉至於監護簡校則有周平高公侯壽房梁公楊慎交杜行顗等監掌譯之事詮定宗旨者也觀其條理詳密考證再三無以加矣敢云取至番文誰人識之以意演誰人證之不思之甚也妄誣之甚也天教云按朱子語錄佛經皆中國文士自相撰集如晉宋間自立講師孰為釋迦孰為阿難孰為迦葉各相問荅筆之於書闢曰斯尤謬妄誠不屑辨第恐無知傳為口實今即以朱子之事反證其非考晦翁蚤從學於李延平先生久之恨不能發明及詢長者咸指之禪學已而徧謁禪老與李東萊張南軒同問道於大慧禪師先是從劉屏山遊屏山意其必留心舉業遂搜其篋唯有大慧禪師語錄一帙及登科致書於開善謙禪師曰熹向蒙大慧禪師開示狗子佛性話頭未有悟入願受一言警所不逮謙荅書云把這一念提撕狗子話頭不要商量勇猛直前一刀兩段晦庵覽之有省噫勃哉既知佛法皆出中國文人何不自撰幾卷而反看他人之語何也况又問道於學佛之徒又何也自學佛教人勿學佛自用佛語又怪周程明露佛語又何也陳忠肅公謂性理之學東林總禪師授之濂溪其言已徧于天下矣故周程張謝游楊晦庵等著書立言凢說道理處皆用佛經禪語之意故反有指內典曰這一篇與宋儒相合這幾句亦與相合嗚呼曾不知宋儒盡是禪宗流將出去者詳晦庵意不過自護門戶耳豈三藏五乘之教果出於文士哉固無庸置喙者矣且晉宋以來之人物賢而且明歷歷可數才德之望經綸之美如謝安石量識高古才思逸群如王羲之情性之正去住之高如劉遺民風規瀟洒文章精遒如謝靈運曠懷雅韻閒靜自樂孰如陶靖節詩書法程節義嚴峻孰如顏魯公𢖍陽龐蘊識見之高禪髓之邃相國裴休文章之古道學之至孰能加焉刺史李翱侍郎居易卓識宏度文明典雅孰能加焉二蘇子黃山谷天資明哲深入禪窟楊大年李遵勗不離塵俗悟徹心源孰能加焉學士王公日休秉政李公商老皆愽學知識高明正大有人所未易及者是諸名賢篤志事佛或入匡山之蓮社或親宗匠之爐鎚子云晉宋間文人此其大概者矣為我一一指陳令無疑惑三藏五千四十八卷某經某人問荅某人獨說某經昭晰以示天下破千古之重昬亦使佛氏心伏何不可乎今既不能指出則子之妄言明矣將引他人不根之談欲沮佛祖真實至教如吹螢火以涸蒼溟徒喪子之心力惜哉且曰文人作過多端偏畏死後故其侫佛獨在人先噫心立不中發言矯亂於茲可驗據子先言佛經文人所自說則實無佛何侫之有輪𢌞亦自所說何畏之有况侫佛者未始有不忠乎其君不孝乎其親不成乎其仁者大本既基內省不疚何畏侫偏先人耶苟當仁不讓而先人則所趨之道正矣朝聞夕死而豫行則所信之言至矣就有道正而忘已則經非我說明矣誣人之罪以罪加之子之業深矣
