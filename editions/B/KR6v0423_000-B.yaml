body:
  text: 例言篇中稱呼如聖朝等及其書法如擡頭等皆宜改書今一從原刻以見當日之舊篇中間有難讀者恐屬訛誤而無他本可校不敢妄改此書主於破邪而如學術有純駁立言有深淺固不遑論雖緇流之言取以為息拒之用可見破邪之急於拯焚溺故通篇從原本不增損一字闢邪題詞余佩服儒教攻苦有年葢通晝夜寒暑而行住坐臥于此中方以未得理道為憾忍聽邪說亂之也哉日兢兢焉以一善之得一隙之明急為傳布嘉與流通何帝典王謨名臣烈士貞夫節婦不一一表章于帙中迄上古中古前朝君相豐功偉業咸密密裒崇于言外無非以大經大法迪人心而開人目使異說不得乘而中也偶於中秋偕費隱禪師連舟詣禾見其案前所列闢邪諸書若痛斥天主教之以似亂真貶佛毀道且援儒攻儒有不昭其罪洞其奸彰灼其中禍于人流害于世胥天下而膺之懲之不已者南有宗伯北有諫臣𠳿𠳿疏論於神宗顯皇帝之前已稱直窮到底閩諸君子浙諸大夫侃侃紏繩夫以技衒巧以利誘愚口誅創異筆伐黨同何啻張膽明目至于雲棲有說密老有辯費師有揭邪之不容攛正也纚纚數千言佛與儒同一衛道之心矣費師又慮巧偽易滋除蔓匪細不合諸刻揭諸塗使人人警省在在聳惕焉能戶為說而家為喻因以數帙授昌治編其節次臚其條款列其名目一種憂世覺人之苦心洞若指掌一叚明大道肅紀綱息邪說放淫詞闢異端尊正朔較若列眉於中刪繁就簡去肉存髓凡一言一字可以激發人心抹殺異類有補于一時有功于萬世者靡不急錄以梓是則昌治以膚見當佐闢也夫崇禎十二禩季冬五日鹽官徐昌治覲周甫書于大業堂中聖朝破邪集目錄徐昌治訂卷一南宮署牘序陳懿典叅遠夷疏凢三沈查驗夷犯劄會審王豐肅等犯案并移咨吳爾成南京都察院回咨卷二發遣遠夷回奏疏沈會審鍾明禮等犯案吳爾成會審鍾鳴仁等犯案徐從治拿獲邪黨後告示清查夷物案折毀違制樓園案附估修黃公祠徐從治福建巡海道告示施邦曜提刑按察司告示徐世蔭福州府告示吳起龍卷三破邪集序蔣德璟聖朝破邪集序顏茂猷題黃天香詞盟唐顯悅破邪集序周之夔請顏先生闢天主教書黃貞尊儒亟鏡敘一說凢七黃貞破邪集自序黃貞罪言王朝式驅夷直言黃廷師邪毒實據蘇及㝢利說荒唐惑世魏濬卷四聖朝佐闢自序許大受聖朝佐闢凢十許大受卷五辨學蒭言敘一辨凢五陳侯光天學剖疑戴起鳳殺生辨虞淳熈破利夷僭天罔世虞淳熈闢邪解黃紫宸闢邪解黃問道劈邪說李燦闢邪摘要畧議張廣湉卷六誅夷論畧林啟陸闢邪管見錄鄒維璉攘夷報國公揭李維垣十二深慨序黃貞十二深慨王忠品級說黃虞誅邪顯據錄李王庭曆法論謝宮花四宿引證謝宮花續正氣歌謝宮花卷七天說凢四釋袾宏不忍不言序曾時不忍不言黃貞辨天說凢三釋圓悟證妄說張廣湉復張夢宅書釋圓悟證妄說跋釋普潤證妄後說張廣湉附緇素共證釋大賢卷八綂正序劉文龍原道闢邪說凢四釋通容誅左集緣起釋普潤闢天主教檄釋成勇天學初闢凢九釋如純
