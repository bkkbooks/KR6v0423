body:
  text: 鹽官居士徐昌治覲周甫訂誅夷論畧武安林啟陸履夫甫著竊聞聖代以原道正教為根宗以防邪闢異為藩垣鄉有塾國有學胄子翼以典樂之官庶人嚴于庠序之教斯所以世代有昌隆之勢外夷有向化之風禮樂日興民心歸正焉然其間有萬不獲已者則佐之以律令或從而誅滅之或從而要荒之雖上古至治亦所不廢也帝曰臯陶蠻夷猾夏𭁵賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允所以嚴華夷也又曰龍朕堲讒說殄行震驚朕師命汝作納言夙夜出納朕命惟允所以謹忠讒也遠夷去讒國之福也乃利瑪竇何物直外國之一狡夷耳詐稱大西洋航海而來間關八萬里自萬曆年間因奸細引入我大明倡天主之教欺誑君民毀裂學術細查天主之義謂天主生天地人禽獸草木之魂禽獸草木死則隨滅獨人雖死其魂不滅所作善惡俱聽天主審判而善惡無他分判只是從天主教者為善雖侮天地慢鬼神悖君親亦受天主庇而登天堂不從天主教者為惡雖敬天地欽鬼神愛君親竟為天主怒而入地獄夫庸愚者既溺于徼倖隱怪者又便于放恣繇是縉紳相率而薦揚之士民相率而從事之嗟乎上古帝王未嘗不以欽若天命簡在帝心者為致治垂世之宗即歷代師儒亦各以畏天命之語諄諄然相告誡也且曰天者理也帝者以主宰而言也夫天之生民有物必有則人能順天理恊帝則自可以主宰萬物統制乾坤補宇宙之缺陷正世代之學術此吾儒之所謂天主也而天下民物各具一天主也堂堂正大典籍昭彰何我軰盡棄弗顧而反聽于魑魅魍魎之教削越祖宗丟拋神主排禮法毀典籍滴聖水擦聖油崇祀十字刑枷而以碧眼高鼻者為天主乎其書譯入華地不能徧閱適逢崇禎八年利妖之遺毒艾儒畧軰入丹霞送余有天主實義聖水紀言辨學遺牘鸞鵠不並鳴說代疑續篇諸妖書等其言極膚淺極虛誕陽斥二氏之邪妄陰排儒教之岐途然其闢儒處未敢十分啟口者竊欲藉儒冠儒服者達其教于朝廷使得以肆其奸毒也彼夫斥二氏以成佛作祖之言杳不可查因果輪𢌞之說茫無可據何獨以祀天主者定登天堂為天主之忠臣背天主者定入地獄為天主之叛民之可查可據乎嘗觀二氏之言特謂一念善即是成佛成仙種子一念惡即是畜生地獄種子斯不過儆惕人心使之遷善以棄惡也老氏道德經佛氏因果經亦曾教人忠以事君孝以事親陰以敬神陽以愛人是亦有以補助乎儒教也未有若天主之說使帝王廢郊社褅嘗之典士民棄祖宗祭奠之禮正大神明目為魔鬼不敬天主視為罪人至教人燬關聖觀音之像斬文昌帝君之首丟棄祖宗神主于糞穢人心始覺驚怖稍稍有追先敬聖之思而貪利其財者竟堅不可破也且以文王之翼翼昭事以孔子之丘之禱久若肯悔過以皈天主纔為天主所賞而登天堂苟不悔過而叛天主遂為天主所罰而入地獄我軰未及文王孔子之萬一若不悔過盡燬文孔之典籍悉歸天主之大教不惟天堂無路而且不知置我于何獄矣今世儼然儒冠者寧從文孔入地獄乎抑隨耶穌登天堂乎雖黃口嬰兒亦當識所從違也柰何入教者俱是名公巨卿或進表章薦于聖上或作文章為之序跋或徧地吹噓或隨方擁護為之持維靡所不周此何意哉抑利其貨乎吾未見不接夷利者之別無可致富也抑奇其才之不數出且謂其學之近正教乎吾未見置文武周孔于地獄俟其悔過乃許登天堂具髮齒頂踵者所當仰天大哭者此也而反以是為正乎其徒有曰為我正度數鑄貢銃此二事大有功于朝不知此軰之論天文地理日月星辰儘有四大妄誕謂星一天日月一天不相躔次誕一又謂地形如鷄旦黃精上下四旁人可居住足踵相對人可旋轉而走遂以本天親上本地親下此二語謬會其理以欺愚頑誕二又云彼嘗從日邊來利瑪竇嘗旋轉一週誕三書曰王省惟歲卿士惟月師尹惟日庶民惟星是所以別上下定尊卑天道無乖則人事順應使凢有血氣者得尊尊而親親也彼又謂星高于日月五星二十八宿形體大于日月彼曆中月置三十一日未嘗置閏日月之蝕不須有司扶救夫不救晦蝕則有先後時殺無赦之戒不置閏則有時漸不定歲漸不成之虞若從彼曆是使藏時失序上下倒置庶民得以凌駕乎卿士師尹之上卿士師尹得以凌駕乎主君之上也明矣夫堯治世必以治曆明時為國家之首務而此軰之擅入我大明即欲改移曆法此其變亂治統覷圖神器極古今之大妄誕四也有此四誕誣上誣民罪可勝誅哉况我朝威聲可以奪夷外國向化來貢者數十餘邦縱有奸夷亦不肆其兵戈區區一銃能為國家萬年計乎從未見三代唐宋以來治曆明時防夷禦𭁵者俱用此碧眼高鼻之狡番為哉吾且謂國家之大僇辱者此也而反以此為榮不亦醜乎當今主上雖極明哲然深居九重之中閱彼表章所薦謂此心此理若合符節况為君人者德合柔遠得不曰在我則有變夷之權在彼更有來王之誼是何虞慮之有不知此軰奸侫之甚實亂人國來王者彼反而王我變夷者我反而變于夷矣若有宰輔諫臣以及四方官府陳彼利害伸我律令此軰自當迸迹絕域在內則無奸讒震師之患在外則無狡夷猾夏之虞唐虞景色不煥然宇宙間哉嘗思上古之世洪水虎豹之灾害民居者未盡害人命𢦤人命者未必盡𢦤人性然而櫛沐兼驅者伊何人哉及至戎狄之猾夏異端之亂道亂賊因而無懼諸侯因而放恣處士因而橫議彼當時誰不付之沒可柰何然而或操膺懲之權或僭筆削之罪或好辨之譏車不停轍席不暇煖者伊何心哉自我聖祖高皇帝開治統以來以六經明世以賢良治國繼堯舜之道宗周孔之學其所以教澤士民祿養簮纓者可謂厚且至矣雖粉身碎骨寧足以報其萬一乎柰何妖夷之教倡亂是非陷溺人心遂默然不動國運學脉付之誰人乎陸以草野書生極知蕘言不足以斥奸邪但古有云梟搏雞雛其母奮趐知不能庇愛弗已也陸在血性中寧捨君親之愛乎繇是食不安寢不寧覩典籍而增愁向君親而揮淚輾轉一夜竊述是篇庶有觀感而興者俱出一語以闢此軰不惟上可以正教防邪佐聖主之盛治下可以典樂明倫維生民之學脉亦使此軰不至咲我大明之聾啞一一聽其簸弄耳闢邪管見錄豫章大司馬鄒維璉德輝甫著海外極西之國有夷人利瑪竇號西泰者萬曆初年偕徒四五人流入中國著天學實義等書自標天主教梓以傳世其詞意險怪首尾矛盾似深而實淺似文而實陋徒以利口喋喋妄自尊大已蹈荊楚僭王之罪而其伎倆善盜肺肝如見大似呂不韋穿窬之雄彼方思以易天下孰知天下明眼有人寧能一手盡掩哉謬以天主合經書之上帝夫既明知上帝屢見於六經郊社所以祀上帝則至尊在上帝可見矣昔者大儒釋帝為天之主宰葢帝即天天即帝故尊天即尊帝也何云上天未可為尊并諱上帝之號而改為天主之號乎始曰天主是理繼曰天主是神終托漢時西國之𠒋夫耶穌為天主應運設教是其標大題僭大號不惟呵佛罵老且凌駕於五帝三王周孔之上從來大變未有甚於此者至於孔子太極之訓春秋之作孟氏仁義之對無後不孝之言皆見指摘但云我以天主為父萬民為子而仁孝轉大世間君父同為兄弟何足事哉噫逆亦甚矣且天生素王以教萬世生民以來所未有也然其至誠無息大道若愚辭仁聖而不敢當謝生知而云好古豈故為是謙辭哉聖不自聖故為至聖而利妖敢以邪說比六經乎昔人有言莊周道家之儀秦王通孔門之王莽若夫利妖電光之舌波濤之辨真一儀秦拔佛家之幟登素王之壇真一王莽侮聖欺天譸張為幻左道之誅豈可容於堯舜之世哉璉以管見而談終覺惶汗惟望憂時憂道大君子極力剪除勿使蔓延惑世以害天下而為中國將來憂實區區之鄙衷也已上翰林院左春坊蔣公德璟攘夷報國公揭時公奉差復命路經三山福州左右中三衛千百戶掌印効用等官李維垣等福州府閩候二縣儒學生員陳圻等謹揭為共剖丹衷事竊思華夷界限甚嚴邪正勢不兩立胡有天主之夷群入內地上欺聖主中結朝士下惑愚民萬曆四十四年奉神宗皇帝驅除出境天啟初藐旨復入布滿天下煽惑交結甚於萬曆之時似不普中國而變夷狄不已也且吞我屬國呂宋及咬𠺕巴三寶顏窟頭朗等處復據我香山𤀀臺灣鷄籠淡水以破閩粵之門戶一旦外犯內應將何以禦愛國之士已詳言之垣等或受國恩或叨聖養覘茲景象深抱心腹之患愧卑秩貧儒力棉未能除此朝食恭逢台臺學素格于天人任佇隆乎舟楫此正太史今日之事勿貽國家他年之憂伏乞入告朝廷盡除以清華夏生靈幸甚道脉幸甚天下後世幸甚垣等臨揭曷勝激切籲呼之至須至揭者崇禎十一年十一月日福州左右中三衛千百戶掌印效用等官千戶李維垣趙學淵朱繩文牛伯挺王秉忠戴壎百戶李鏘唐國輔林挺棟蔡士玉朱繼宗劉文華韓堯道呂調陽羅萬象侍元卿撫院標下效用原都司僉書管守備事陳邦政撫院標下効用原欽依青村把總以都指揮體統行事署指揮僉事百戶王繼武撫院標下賛畫守備葉樞撫院標下効用守備功加二級鄭邦卿撫院標下効用守備功加都司僉書林深原任欽依銅山寨把總以都指揮體統行事署指揮僉事何養魁原恊理戎政軍門賛畫加衘都司僉書楊憲祿總鎮標下効用把總陳周官原任揚州府炤磨陸國煾纂修貢生辦事候題中書周士義候任邵武府倉大使鄭德閭福州府閩候二縣儒學生員陳圻林浩王德峻陳周祚蔡在新陸之珍李朝宗布衣田正登劉國𬡅涂維高登相李銓十二深慨序孟夫子謂心之官則思思則得之貞竊以人之神智必歷而始得焉信生王君感時著十二深慨即普天鏡也普天鏡者何普天下之大炤其情其病備寫於中數毫髮而莫迯者也然苟不深心為道為世而日維持履歷於其間烏能知之是其思誠微矣嗚呼奸夷覬中華亂學脉出神沒鬼為開闢未有之變痛舉世鮮能知其詳何以故則亦舉世鮮有心人而未之思也故其官之不靈如此予焉能不望有心人而一睹斯鏡敬為序崇禎戊寅歲孟秋金浦天香黃貞書十二深慨清漳王忠信生甫著于𮈔蠟夷人入我中華倡天主教予為之深憂而切計者誠痛我中華之自疢夷害凢有幾種試畧言之有聞及布金輙生垂涎見其謙恭嘆為有禮不知此夷政借金寶以濟其奸設為矜莊以餙其偽及聞其邪說信為至教謂三教之所不及此則讀聖賢之書背聖賢之教貌華而心夷也可慨也有知其悖亂頗存鋤奸之意狡軰知情遂賂以財物眩以偽書迷其心箝其口令袖手坐視任彼奸謀殊不思後來身家難免荼毒則所賂者安歸乎可慨也有忽彼小醜以為無能取其珍寶以為無害應其書札為之吹噓使中國之士大夫共相傳說稱揚其羙因亦以書札為之往來不知狡夷正欲假此以網盡中華此雖非夷人之外護而夷已實得其護也可慨也有陋其說不為同流但姑與之交接聊示優容而不堅拒以明絕之使彼得為夤緣要結之竇此則繞夷之波開人以入夷之端也可慨也有頗明書史自恃靈明謂我神理廓然本體自在何至為小醜滅沒見夫闢邪者謂之杞人之憂迂濶無當不知邪教日興正教日混君父生靈之急孰有切於斯者柰何昧復隍衣袽之戒而漸成棟撓滅頂之凶乎可慨也有見夷軰之毀佛仙及神祗等像輙謂神靈自有𡨋誅姑待其自斃人安所用力乎不知天地精英悉𢌿之人惟有忠誠義激者出而後正氣之神因相默護人司陽神司陰陰陽合力而後魔祟可滅安可坐視而悉聽之神乎此則亦無關疼癢之言也可慨也有聞此猖獗恬不為怪浸無可否從此亦此從彼亦彼但躭利竇只顧身家不知利竇之竟成禍端身家之終為胥溺所謂燕雀處堂者也可慨也有聞及草野之士力鋤夷奸輙訕咲之曰此事必屬之有力者區區韋布將柰彼何不知正緣有力者未知任其事故必到處疾呼告揭夫既治之則予何言哉此則不知覆楚存楚之機之在絕𡥉純忠一人也又安得自委于韋布而日墮彼夷之奸計乎可慨也謂剝復循環各有定數運會未變必有擔當運會將變非人所為不知君子急天下也如其家譬如父母有疾雖灼知其必不可為寧忍不投以藥石而坐聽其亡此情理所不忍者也况從來豪傑任世苟時事有一毫可為猶必盡全人之力故能轉禍為福以成回天之功又安得徒委之大數哉此則所謂悠悠任運置世道於不問也可慨也有矢志鋤奸之人為之日久或緣寡助而中棄或緣懼禍而中危此則不克有終困于懦弱之無能為也可慨也素稱明理之人洞見邪正之分但燕安高堂之中而無吐握之意草野或有所陳說欲叩無門故奸邪猖獗總莫之知遂使庭無義士之跡門過九閽之遠也可慨也草野告變幸而有階初心接見頗能感發而左右朝夕旁撓以為無甚迫切遂不殫心竭慮以弭禍亂此則旋起旋沒無意天下事有負海岱之高望矣可慨也是故憂危慮遠之士抱忠君愛國之心深知此軰出神沒鬼多一月增一月之蠹寬一日滋一日之毒於是苦心死以維持不啻疾痛之在身其切切偲偲遍暴天下將使豪傑端人共起而應之耳嗚呼孟夫子當年周流列國間至蒙好辨傳食之譏伊何人哉伊何事哉伊何心哉苟曲突少待斃多天下將柰何當道大人英邁君子幸毋蹈種種之愆毋忽草草之言共芟邪夷之黨以閑先聖之道疏其滛謀聞之當宁使夷氛永絕海宇廓清上安邦國下扶綱甞則僕之深慨有賴矣崇禎丙子孟春撰品級說黃虞著中國天子以下公卿百官各有品級以一至九顯然定分無容紊也彼天主教之師徒亦僭定品級中國以一品為尊彼則以九品為至尊中國以九品為卑彼則以一品為至卑有七品主祭六品副祭之說餘不得祭又有宗教分教必夷人以主之祭制冠裳皆用夷服吾恐目習其所見耳變其所聞將羲皇以來之道綂治綂與聖祖高皇帝驅胡定鼎萬世金甌之天下禮樂制度人心風俗一旦變於夷狄莫此為甚孟子曰吾聞用夏變夷未聞變於夷者也嗟乎今將變夷矣夫以管仲覇佐而有尊攘之功孔子猶然仁之華夷之防邪正之辨自古聖賢甚峻甚嚴今之士庶柰何從夷教而反為同聲之吠耶余觀品級一節益見其冠裳倒置幾不成世界矣可慨也夫誅邪顯據錄西甌李王庭猶龍甫著六合之內有存而不議議而不論者恐其亂人觀聽也若夫不得不論不得不議者凡列衛聖皆不可少一口誅之力如今日之天主教是已第辯之而不得其顯有可據者則其心不服辯之而不得其事之真屬矯誣者則其心尤不服是以余于心性天堂地獄等說外獨舉其彰明較著言之令賢智之士固賞此語有同心而識苟非污下亦得以隨事察奸也試即彼所張掛中堂墨刻云稱天主哀憫眾生乃于四川裂山石獻經文篆字始知天主降生之本噫何舛也四川列在中華固非無人不到之所且石崩獻文亦非西夷獨有之經試問四川之人果于何年月何日時何州縣何村落有石崩之迹有篆字之文四川之人茫然不知也川人不知而西夷之人獨知之乎此不過借河圖地不愛寶之說以神鬼其教而謬謂藏之石室耳烏知石文可暗刊而此石迄今川中竟付烏有將何說以愚人更可異者水法一節必于邊外石田用之夫石田可用則中都旱田亦可用也并中都山田亦無不可用也乃必試于邊豈水生于石乎此又不過以難能之事荒惑今人料今士大夫所日悸者漕運之艱故倡為此說以傾動世耳曾思真真經濟無地不效其實用豈待托之遐荒以文其拙耶至如記函一件其鄙夷不屑我輩更莫此為大夫天生聰明將自我作古即一目十行一覽無遺何代無之乃託名倒記背誦既使下愚之夫希其捷即中材之士認為真孰知此萬萬無有之理實實以聾瞶待人勿論不得縱使一旦得之而章句誦說之學何益于心解力行矧其不然也如前三事夫非彰明較著不辯自知者哉曆法論闢西曆棄閏邪說閩芝城謝宮花個臣甫著今西夷所以聳動中國驕語公卿者惟是曆法然中國之曆法自有一定之論不待西夷言之也我太祖詔劉國師上觀天文下察地理鑄量天尺制定天球星宿分野銅壺滴漏晝夜時刻消息度數分毫若天現在京都眾目可觀至于曆法考諸前代國史如漢武帝太初元年鄧平所造太初曆後劉歆衍之為三綂曆東漢章帝元和二年造四分曆獻帝建安十一年劉洪造乾象曆魏明帝景初元年楊偉造景初曆東晉孝武帝太元九年姜岌造太元曆劉宗文帝元嘉二十年何承天造元嘉曆孝武帝大明七年祖冲之造大明曆魏孝明正光二年李業興造正光曆東魏孝靜帝興和二年李業興造興和曆北齊文宣帝天保元年宋景業造天保曆後周武帝天和元年甄鸞造天和曆靜帝大象元年馮顯造大象曆隋高祖開皇四年張實造開皇曆仁壽四年劉焯造皇極曆煬帝大業四年張胄元造大業曆唐高祖武德九年道士傅仁均以元起戊寅造戊寅曆高宗麟德元年李淳風以元起甲子造麟德曆中宗神龍元年南宮說造乙巳曆玄宗開元十二年僧一行造大衍曆肅宗寶應元年郭獻之造五統曆德宗建中五年徐承嗣造正元曆穆宗長慶二年徐昂造宣明曆昭宗景福元年邊岡造崇玄曆五代周世宗顯德三年王朴造欽天曆宋祖建隆三年王處訥造應天曆太宗太平興國六年吳昭素造乾元曆真宗咸平四年史序造儀天曆仁宗天聖二年宋行古造崇天曆英宗治平元年周琮造明天曆神宗熙寧七年衛朴造奉天曆哲宗元祐七年皇居卿造觀天曆元符三年姚舜甫造統元曆徽宗崇寧二年姚舜輔又造占天曆金太宗天會五年楊級造太明曆南宋高宗紹興五年陳德一造統元曆孝宗乾道三年劉孝榮造乾道曆淳熙三年劉孝榮造淳熙曆金世宗大定二十年趙知㣲修大明曆宋光宗紹熙二年劉孝榮造會元曆五年楊忠輔又造統天曆元太祖十五年耶律楚材造庚午曆宋寧宗開禧三年鮑澣之造開禧曆理宗淳祐十年李德卿造淳祐曆寶祐元年譚玉造會天曆度宗咸熙七年陳𣇄造成天曆元始祖至元十八郭守敬等定授時曆我朝大統曆法莫不叅證斟酌無移再考授時測定閏應頒大統曆行于天下萬世遵法復徵回回曆官鄭阿里等十一人至京議曆給廩有差後因夷言天文皆宗耶律荒唐悠謬洪武三十一年夏四月罷回回欽天監削夷官之號即大明一統誌有載上遣使往西域經天竺至天方國其國人止知崇奉一天凡有災福望天祈禱依然如中國之敬天也亦未聞有天主釘死十字架上設教行世令其從之者先拜右手之傷求勇德拜左手之傷求忍德右足之傷求勤德左足之傷求畏德又拜脇旁之傷求愛德夫既以為天主之德且不能保全一體之傷又烏有德以及人乎夫既以為天主之尊天神為之擁護尚被葢法氏釘死是天主天神皆不靈無用之物也焉能主宰萬物乎况曰服呪水畫呪油食酒為食天主之血食麵為食天主之肉有一石置于案頭謂是天主之骨人能服聖水聖油者雖平生為惡天主恤其一念皈依前惡全赦夫天主耶穌因妖言惑眾且被法氏釘死不能自赦焉能為人赦乎此皆誕妄之極而謂可信乎然天方國亦有回回曆其地近邊與中國氣𢿘差三度固知回回曆中國存而不用也即中國之曆法自太初以至授時莫不遵古置閏如西夷之邪說謂閏可棄是唐之欽天易之繫辭中國千古之帝王卿相神聖賢哲大識大見皆在醜類下也是耶非耶夫我明大統曆兼叅諸曆之長行之萬世無𡚁我太祖立欽天監內臺分科各習一藝專精象占無得差移至今而曰推筭有失不能如劉國師之準則當治欽天監內臺糜祿之罪也四宿引證夫天主教之七日朝夕持呪稽首房星昴虛四宿而又拜慧星者何說也考之天文昴宿有七星水星也昂為天耳目又為白衣聚會七星中有旄頭者胡星也昴星欲明明則獄訟平國無侫臣天下安不明則刑必濫侫臣得志天下凶其六星不欲明明則邊兵多死動則大臣下獄信讒害忠為白衣聚會明而動則胡兵大起其大星跳躍而他皆不動則胡兵侵邊六星明與大星等則天下大水七星皆明而黃胡虜大兵起虛宿有二星亦水星也其星明靜則天下安不明則天下旱動搖則有更朝廷舊制者房宿有四星木星也房星均明則天下太平其星暗則大臣亂政明而大則胡兵起星動外則財寶出動內則財寶入月行而星動則亂臣謀害殃及萬里星宿亦有七星均明大則王道大行小則賢良不用而天下虛空遁藏搖動則胡兵起而又拜慧星者何也天文占謂慧星入掃紫宮布新除舊天下革命此西夷之朝夕祝願昴宿明黃虛星二宿動搖房星明大慧星入紫也若不明言之恐愚夫愚婦不察狡夷奸猾之意也故錄是以為世人鑒續正氣歌昔有文山兮正氣昂昂成仁取義兮日月斯煌惟我中原兮人比鳳凰嗟彼西夷兮類聚犬羊陰蓄異謀兮天主教張熒惑士女兮橫水湯湯世聾瞶而不悟兮舉國若狂一桴眾鼓兮竟不知當今有聖王邪說充塞兮顛倒冠裳人心既喪兮夫誰與匡我今作歌兮續正氣之剛方願言闢邪兮與日月而爭光
