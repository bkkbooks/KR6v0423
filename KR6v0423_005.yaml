body:
  text: 鹽官居士徐昌治覲周甫訂辨學芻言自敘三山陳候光著近有大西國夷航海而來以事天之學倡其標號甚尊其立言甚辨其持躬甚潔闢二氏而宗孔子世或喜而信之且曰聖人生矣余詳讀其書則可異焉孔子言事人而修庸行彼則言事帝而存幻想孔子言知生而行素位彼則言如死而邀冥福孔子揭太極作主宰實至尊而至貴彼則判太極屬依賴謂最卑而最賤其以時王之賞罰為輕也則無君之罪甚於楊其以親之鞠育為小也則無父之罪甚於墨其以理謂非性之本有也則外義之罪甚於告子獨托事天事上帝之名目以行其謬説嗚呼大西借儒為援而操戈入室如螟特附苗其傷必多乃崇其學者半為貴人為慧人愚賤如小子設起而昌言排之則唾而罵者衆矣雖然孔子之道如日中天大西何能為翳惟夷教亂華煽惑浸衆恐間先聖者必憤而不能默也偶有客與余辨因臚列為五章夫亦芻蕘之言願希聖者採而擇焉西學辨一大西國有利瑪竇者言航海數萬里而至中華以天主之教倡復引詩書所稱上帝為證其友龐畢艾龍輩相與闡繹焉著書數十種世之疑信者半有客過東庠居士東庠居士問客曰自古迄明郊天饗帝孰得而行之客曰天子也東庠居士曰諸侯祭封內山川大夫祭宗廟士庶人祭先祖聖人祭禮有定典矣惟天至尊而無對則燔柴升中非君不舉焉凡經書所載祀圓丘類上帝者孰非禹湯文武也瑪竇令窮簷蔀屋人人祀天僭孰甚焉且上帝不可形形不可像像瑪竇執彼土耶穌為天帝散髮披枷繪其幻相瀆孰甚焉夷書亦云道家所塑上帝俱人類耳人惡得為天皇帝耶在道家則譏之在彼教則崇之抑何相矛盾也且彼謂耶穌即上帝是禹湯文武周公孔子所昭事者誣耶穌也誣禹湯文武周公孔子也適所以自誣也西學辨二客醉西教踰夕復過而問曰子尊上帝而不敢僭不敢瀆則聞命矣然瑪竇謂天主化生天地萬物乃大公之父也又時主宰安養之乃無上共君也人凡愛敬不忘者皆為建祠立像豈以大父共君而不仰承拜禱之則亦至無忠至無孝矣東庠居士曰此真道在邇而求諸遠者也父兮生我母兮鞠我孝惟愛吾親已矣惟辟作福惟辟作威忠惟敬吾君已矣愛親仁也敬長義也天性所自現也豈索之幽遠哉今瑪竇獨尊天主為世人大父宇宙公君必朝夕慕戀之欽崇之是以親為小而不足愛也以君為私而不足敬也率天下而為不忠不孝者必此之言夫且余覽瑪竇諸書語之謬者非一姑摘其略以相正瑪竇之言曰近愛所親禽獸亦能之近愛本國庸人亦能之獨至仁君子能施遠愛是謂忠臣孝子與禽獸庸人無殊也謬一又曰仁也者乃愛天主則與孔子仁者人也親親為大之旨異謬二又曰人之中雖親若父母比于天主猶為外焉是外孝而別求仁未達一本之真性也謬三又曰宇宙有三父一謂天主二謂國君三謂家君下父不順其上父而私子以奉己若為子者聽其上命雖犯其下者不害其為孝也嗟乎斯言心亦忍矣親雖虐必諭之于道君雖暴猶勉之至仁如拂親抗君皆藉口于孝天主可乎謬四又曰國主于我相為君臣家君于我相為父子若比天主之公父乎以余觀之至尊者莫若君親今一事天主遂以子比肩于父臣比肩于君則悖倫莫大焉復云此倫之不可不明者何倫也謬五就五謬而反覆玩味謂余言苛耶非苛耶吾人居堯舜之世誦孔孟之書乃欲舉忠孝綱嘗而紊之而廢之以從于夷恐有心者所大痛也西學辨三客曰子言忠君愛親皆善德耳然賜我以作德之性者非天主乎中華第言修德而不知瞻仰天帝以祈慈父之佑故成德者鮮東庠居士曰作德之性未暇深言即瑪竇所説天主者先自矯亂余豈無徵而談一云天主生是天地萬物無非生之以為人用如日月星辰麗天以照我五色悅我五音娛我諸味香以甘我百端輕暖以逸我故我當感天主尊恩而時謹用之又云天主悲憫于人者以人泥于今世卑事而不知望天原鄉及身後高上事是以增置茶毒于此世界欲拯之夫既造物以養人復造物以𢦤人則天主之生殺相左矣一云天主始創制天地化生萬物人無病夭嘗是陽和快樂今鳥獸無敢侵害又云自我輩元初祖先忤逆天主物始忤逆我而萬苦生是多苦非天主初意也信如其言則天主之愛憎至變矣且瑪竇云我自為我子孫自為子孫若我所親行善惡天主必不捨其本身而子孫是報何今以元初祖先獲罪于天主乃令千百世子孫共受其苦姑勿論天主之罰太酷得無與前説戾耶况瑪竇謂天主能造天地萬物無一不中其節則初造生人之祖自當神聖超群何男曰亞黨女曰厄襪即匪類若此譬之匠人製器器不適用非器之罪也必云拙匠豈天主知能獨巧于造天地萬物而拙于造人耶我中華遡盤古氏開闢以來如伏羲神農黃帝堯舜世有哲王以輔相天地木聞不肖如亞黨厄襪者也且洪荒以漸而平民始得所亦未聞初極樂而後反苦者也立言先自矯亂欲中華士昧心以相從吾子過矣西學辨四客曰瑪竇以天地萬物皆天主所造故人感深恩而愛敬之如詆其誑説則視天主為烏有矣若子所云尊上帝者又安屬也東庠居士曰以形體言則為天以主宰之神言則為帝人居覆載中自當敬畏非若西士之幻説耳客曰凡物有作者有模者有質者有為者理甚明著使無天主掌握其間則天地萬物元初從何而成東庠居士曰陰陽絪縕萬物化生問孰主宰而降施是雖神聖不得而名也故強名太極瑪竇謂天主以七日創成世界則已屬情識著能所矣造化樞機當不其然客啞而笑曰太極虛理泰西判為依賴之品不能自立何以創制天地而化生萬物耶東庠居士曰瑪竇歷引上帝以證天主皆屬附會影響其實不知天不知上帝又安知太極夫太極為理之宗不得單言理為氣之元不得單言氣推之無始而能始物引之無終而能終物者也瑪竇管窺蠡測乃云虛空中理不免于偃墮又云始何不動而生物後誰激之使動又云今有車理何不生一乘車種種淺陋智能𠷣之即以此還詰天主瑪竇亦作何解昔賢謂説天者莫辨乎易伏羲以天地山澤雷風水火羅宇宙之法象孔子又遡其從出之原特揭易有太極一句故下面遂云生兩儀生四象生八卦顯矣亦玄矣惟能認得太極為生天生地生人生物之主宰便不落意識界中而仁義禮智觸處隨流吾儒返本還源祕密全在于此何彼敢無忌憚而曰太極之理卑也賤也又曰仁義禮智在推理之後不得為人性夫告子未嘗知義以其外之也今瑪竇實祖其説而尤遁焉至謂神魂人魂禽獸魂草木魂天主一一雕刻以付之誣妄支離則其見更在告子下矣告子誤論性孟子辭而闢之瑪竇誤逾甚而子信逾篤豈孔孟猶不足法與西學辨五客曰儒認虛理為性原則與佛老之談空無者何異乃復立門以攻二氏故瑪竇詆為燕伐燕亂易亂耳東庠居士曰吾儒主于經世則必宰事物即説到虛無處一切俱為實有二氏主于出世則必避事物即説到實有處一切俱歸虛無抄忽千里端緒極微泰西漫曰空者無者是絶無所有于己也胡能施有性形以為物體非惟不知儒併不知佛老矣佛氏云性色真空性空真色老氏云有物混成先天地生豈性地毫無所窺哉若瑪竇之天主教則妄想成魔叩以性學真門外漢也敢云燕伐燕亂易亂譬斥鷃而笑鳳凰適彰其傲而已矣客曰子既堅守儒宗今獨寬二氏而嚴斥西學不過止就人性上研求虛理視虞夏商周所以事天事上帝之實功終為有缺恐西學未可盡非也東庠居士曰學不師古而能有獲者未之前聞余何敢憑臆而談哉正惟經書之旨與彼夷戾若附會其説以塗世耳目余雖愚魯弗能從矣昔者三苗昏虐惟聽于神舜乃命重𥠖絶地通天今瑪竇朝夕媚帝猶三苗之故轍也豈知事天事帝之真功吾儒自有坦平塗徑知我其天孔子言之矣而下學上達者何事所以事天孟子言之矣而存心養性者何功昭受上帝書言之矣而必曰安汝止昭事上帝詩言之矣而必曰小心翼翼學問精微孰過于此至下手樞機更不求諸天而求諸己故易云天行健君子以自強不息書云天作孽猶可違自作孽不可逭又云惟克天德自作元命詩云永言配命自求多福確然大學歸本之消息也舍此不務而就瑪竇所言釘死之耶穌指為上帝勤拜禱以祈祐則惑矣甚至入暗室洗聖水佩密呪如巫祝邪術考之經書有是乎彼瑪竇諸夷真矯誣上帝以布命于下固當今聖天子所必驅而逐也耳食者徇事天事上帝之名而不察其實遂相率以從之悲夫天學剖疑福唐戴起鳳著客問天主教可從乎愚曰可或曰曷知其可曰聖教大旨在正心誠意毋自欺惡惡務決去好善求必得修慝崇德必辨惑令人體認真切著己用功世多苦而忽之一聞天主教視為善祛惡之訓欣心嚮往暗此而覺彼是亦通明一路何不可從或曰天主降生然乎曰此事狡夷傳久理未足信天主者主宰天地萬物化工無一息停既降生三十三年則百神無主化工不久輟乎天地萬物不盡毀乎甚不可解客曰天主仍在天主宰造物另一天主降生曰在天主宰一天主降生復一天主是二天主矣又不可解客曰天主降生不得已為救世選十二宗徒敷教時有掌教原受正傳只襲外禮心傲滿不奉敬天主誣以謀圖本國主位訟于官受木杖笞背𣗥環籠首諸苦至十字架釘死入地獄復生後升天天主受苦難令受難者知甘心故得救世超地獄升天堂曰此理大不可解也天主欲救世詎不能生聖人行天道以救之何必自受難釘死也客曰天主言在事前故意為之曰非也天主固極誠無妄者寧有無妄至誠之天行故意之事乎且天主至神靈何誤用非人不知被人誣陷莫解冤極釘死罔脫况謀國何事無形無影乃啞坐極刑之慘何以為天主何異從井救人而泥其身也在下天主既不能燭姦而罹禍在上天主又不能居高而聽卑又何見捉之地獄倐入脫之地獄更生乎按從古聖人皆無死地矧天主乎湯夏臺也而生文羑里也而生問官雖暴豈過桀紂湯文雖聖能勝天主耶昔舜父母頑嚚弟象傲多方死舜如焚廩浚井等害召之則來殺之則脫何置之死地而生亡地而存耶桓魋惡孔子伐其木將要而殺不知微服已過宋曰天生德于豫桓魋如豫何觀舜孔益知天主矣再按秦皇鞭撻四夷威震八方億萬擁衛千騎輔從張良令力士擊博浪之槌誤中副車大索十日匪唯不得良併不得力士謂天主不能得良且不可更不能得力士也可乎此萬萬無足疑矣天主實義殺生辨武林德園居士虞淳熙著利清泰瑪竇書來欲與余辨一月而闡實義不得今其書具在極口詆蔬食者謂禽獸紅血草木緑血白血不當重禽獸而輕草木夫肇公之白血萇弘之碧血寧獨草木不聞草繫比丘及斷一樹不以其時非孝之語乎草木之妖斫之血殷刀斧非白非緑寧不知痛故禪枝之蔭覆虞美人之和歌應拍靈明涉入豈容分別大小耶又云禁殺牲大有損於牧牲之道牛馬等受終身之患不如殺食止一時之痛然則負販負鋤之人囹圄床第之人與奴卒伍諸牛馬走多少苦患皆當引頸乞刀下一死而清泰哀憐行教何不引國人入犯盡殺之乃稱志齋乎又云以牧養而用之此類繁多不見蟲多於蠶𧊵蠅蚊蚋多於魚蝦野禽野獸多於家禽家獸耶清泰齋志比於齋心其義不大謬戾第不識本源不知萬物一體雲棲師嘗言諸君若皆信受我將著破邪論矣蓋憐之云聞之劫初天生地肥以養人地肥不生乃生五穀而啖果茹蔬皆不傷其根熟以枯枿石炭不啻足矣近世戒僧耕耘作務念誦經行其勞不減僕夫老病者而精力反勝于肉食之子何者樂而豐憂而瘠不待肥甘之足於口也若曰天生肉食海物以養人將曰天生人以養毒蟲猛獸乎彼非人不飽猶人非物不飽也又將曰天生弱之肉以恣強之食而使相吞噬乎縱強暴而欺怯弱天主之心應不如是也若夫豢養孳息生而殺之殺輪不絶遂繁生類家禽家獸或有焉然天主生毒蟲猛獸以警外人何故不生肉食海味以安內人乎吾國病人老人乳子人資丹石酥酪不傷物命者皆延年保命天主肯嘗生此物自絶殺機倘必速殺耕野乘之牛馬而脫其終身之患則患歸僕夫人役甘與牛馬同受一時之痛委其勞於大人矣大人又將誰委乎勢將人人受創生天堂者皆斷首決脰之鬼善吉界變頭飛國可畏哉又云身體為外人魂神為內人虎狼輩險外人而寧內人卒有益於人虎狼原不為害忤逆上帝者招之不知虎狼何以知人之忤逆上帝耶使生而知之則虎狼勝於人天主力能使之警人何故力不能使人不待警耶虎狼易化而人難化天堂為虎狼之魂神設耶假令虎狼之險止于警人益人不吞噬人人亦何畏乎虎狼而戒懼倘所謂外人者終飽其腹其內人將永墮地獄乎抑驚魂知懼徑生天堂乎墮地獄則警之無益生天堂則捨身喂虎為生天堂之捷徑有是哉况魂神為倀倀導而噬人人又為倀如此不已倀亦有益于人乎抑使舍羊豕而專食人乎如併食羊豕亦有益于羊豕乎生弱肉以養虎狼毒蟲天主當不爾也吾非不知齋志之義偶同原思告子第強制其心佛氏所謂事天神我一外道而已本之則無如之何為清泰之言者必曰人之性非牛之性馬之性也至理悅心則忘勞而戀世大嚼養力則叨味而貪生然戀世貪生肯復思天堂乎且牛馬性喜馳驅同惜軀命遊牝舐犢煦煦相樂試令受一時之痛免終身之患不勝悲號觳觫奔走而避之為牛馬計而拂其性所謂無惻隱之心非人也第一篇明天體以破利夷僭天罔世夷人利瑪竇為天主教以罔世曰天主開闢時能制作天地安排萬物如工匠之建樓閣即生一男曰亞黨一女曰厄襪是為世人之祖故命人莫親父母而親天主之大父莫尊國君而尊天主之大君人宜愛而戶俱祀也愛祀天主者雖賤不肖必生天堂不愛祀天主者即君若聖必墮地獄天主立而儒之太極佛之慈悲道之清淨皆無是君矣或從其教者至毀棄宗廟以祀天主而竟不知祀天之僭罪在無將罔世之夷志將移國抑且潛通利貨以誘貪愚誘一庶人入其教者賞誘一庠士賞十倍誘一縉紳賞百倍手受其書崇尚其説而為之梓行傳播于四方者不少其人矣度其漸久漸焻之勢不至於移九廟辟雍而天主之不已也生為聖人氓寧忘世道人心之痛乎黃河之決潰于蟻穴莫謂其理背其教微料螢光之不待朝也白蓮無為之教未聞如是之傳誦一熾而山東幾不可有近鑒也蓋可忽乎且天之當畏敬而昭事之也先儒之訓戒素嚴何待夷言而始覺如欲窮天之界極天之廣詳載釋典函之內藏又豈小識之能量何至誣天如工匠生一男一女之無稽哉故吾不諱言天亦不諱言天主而特破夷之僭天以罔世也夷之教一日不息夷之書一日不焚吾輩猶枕戈也敢惜軀命而不奮勇為前矛者非夫矣闢邪解三山黃紫宸章甫著夷教云子思子曰率性之謂道吾將曰克性之謂道夫性體之未壞也率之即已是道乃今人之性也亦盡非其故矣不克之又何以成道哉闢曰吾中國聖賢道脈志之經傳凡一句一字皆從心性流溢豈犬羊所可妄議者雖不屑與較第恐無見識者為彼所愚不得不以筆舌明焉夫率性之道子思子舉未雕未琢與生俱來之性順而行之莫非天則少容擬議便落情識遂非真性故曰天命謂性率性謂道若曰克性之謂道何以謂之性孔子曰性相近也習相遠也則性乃先天習為後染若云克習則可而曰克性則性非外來之物又焉用克性若克去中藏何物又曰不克之又何以成道則道在中而性反在外歟不然又何必克性以成道哉此言荒謬之甚吾子思子學宗曾氏𣲖衍尼山開中庸之教闢隱怪之流故標性之初曰天命推道之原曰率性立教之準曰修道以慎獨戒懼為入性之功以喜怒哀樂證性之體以中和位育見性之用而章章有法井井有條聖人復起亦不能少加增減何物狡夷敢以袾褵管窺妄談性命此之謂不知量也闢邪解三山釣龍黃問道著客有自西洋來者其人碧眼虬髯艾其姓儒略其名蓋聰明智巧人也客歲余自嶽陽歸有友從其教者道儒略向同利瑪竇來數十人自東粵香山𤀀齎天主像挾異物抵京師謁神宗皇帝惟時聖天子擴同人之量示無外之恩優容而未之遽絶也無何而利瑪竇欲倡其所為天主之説語言不相通音韻不相叶恐其旨與吾儒大相剌謬於是延中國之文人學士授五經而呫嗶焉遺其扄剽其廓遂陽著其説似與吾儒堯舜周孔之學無大差訛實陰肆其教排佛斥老抑儒駕其説于堯舜周孔之上嗚呼是何言耶昔者孔子沒楊墨煽禍子輿氏力而排之六經之旨皎如日星火傳于漢唐宋以及吾明楊墨之邪終不得逞今閲客之書大率以天主為宗旨以七克為條件以悔過邀福為祈禱以天堂地獄為究竟夫道德經有言有物混成先天地生吾不知其名強名之曰道儒者猶以為其説屬玄而不必道惡至天之上復加一主有形有象有謀有為或隱于上清或降于人世或受罪而遭讒或返魄而上升夫普天之下共一世界則普地之上共一天君也天主既降生于彼國欲救彼國之殃則遺漏于他國坐安他國之虐有是理乎况百千億萬其國則百千億萬其殃天網疏而不漏豈若此耶又何以昔不降生而今降生今既降生而後復不降生其降生也天之權孰代之既降生而復升天也地上之殃又誰續救之耶至以崇奉天主之故指天地為不靈日月星辰為頑物山川社稷為邪魔祖宗考妣為不必祭有是理乎禮曰天子祀天地諸候祀封內山川大夫祀宗廟士庶人祀祖禰以明天至尊不容僭也祀有等不容越也今欲人人奉一天主塑一天像日月禱其側而乞憐焉不其邀天褻天僭天瀆天者乎其所謂七克者曰驕曰吝曰色曰怒曰叨曰妬曰惰夫此數者雖修身之條件祗克復之粗迹夫子告顏子之旨大不如是以仁為宗以禮為體仁存則不仁自退禮復則非禮自除故曰顏氏之子其庶幾乎不遠之復以修身也古者辰弗集于房庶人走嗇夫馳天子公卿往救示天人相係相關之重也今天問之言曰日月無食食者其下蒙氣遮掩也弗用救至若分至啓閉之差黃道黑道之異南極北極之數九州分土之殊言雖影似自有星官曆師董之况天道遠人道邇自不必深究者乎其他種種悠謬不容殫述大抵或可行於彼土斷不可行於中國能惑于愚夫愚婦不能惑於高明俊哲所可訝者吾中國之縉紳學士揚其波而助之熖也是何異舍汗血連錢而乘駑駘也是何異舍夜光照乘而珍魚目也是何異棄蒼璧黃琮而寶瓦礫也或者曰子亦閲其書也酬應其人也何攻之至是余曰不然夫攻寇者必入其穴探其群察其動靜覘其虛實余向意其慕吾道而來今乃知其竊吾道而叛吾鄉崇相董先生學正品端不肖從遊門下先生以天下為己任防遼有疏防海有議持之數十年之前談及夷教慨然有崇正闢邪之思不肖略撰一二説以附先生之末矣男子生世間旋乾轉坤排難解紛作後人之鼻祖為前聖之功臣浸假委委靡靡閃閃抑抑媚奧媚竈傍鬼傍神是亦堯舜周孔之罪人也有志之士欲闢邪間道有先生在執牛耳立壇坫不肖左執鞭弭右屬𡒩鞬以從事焉劈邪説膽山子李璨著余不才後孔孟數千年後周程朱數百年以至我明又後陽明先生百餘年而生未面質於同堂竊心痛乎如線忝居儒列難諉斯文况當邪説橫流之際敢辭佐正好辨之擔如頃所見有教名天主者其説出於西洋國利瑪竇幻人之言窺其立意大約期於中土正教之內煽鼓雌黃爭立雄長我中土不才小智之人貪其燒茅揮鏹助其惑浪狂波陽為滅佛陰實抑儒利欲昏衷群愚往向揣其烈禍十倍白蓮即其迷蹤奚殊左袵不肖聞之豎髮疾首竊念氓之罔知國憲徒為可憫獨怪邇來士大夫亦翕然從之相與采經書類上帝之語以實天義又藉聖賢事親知天之論以闢佛經扯曳敷辭自語自背欺天誑聖喪盡良心前者搖煽金陵已蒙聖祖屏放近復舉其伎倆一二如星文律器稱為中土之所未見未聞竄圖訂用包藏禍萌不思此等技藝原在吾儒覆載之中上古結繩而治不曰文中古禮樂代興不無因革誠以治教之大源在人心而不在此焉故也是以諸子百家雖間有及於性命尚以立論不醇學術偏雜不能入吾夫子之門墻而况外夷小技竊淆正言欲舉吾儒性命之權倒首而聽其轉向斯不亦妖孽召亂之極而聖天子斧龯之所必加者乎吾且舉其略而言之夫聖賢之學原本人心故曰人者天地之心未聞心外有天也孟子不嘗云事天乎曰存其心養其性所以事天也所以云者見天於此心此性焉爾存養外非別有天可事也即云明王御極受命郊天未聞堯舜兢業只崇祀儀桀紂幽厲盡廢祈典也乃至借朱子云帝者天之主宰謂與天主之義相合刪字牽文深為可哂朱子生平得力不離誠意正心宋儒性理一書率明此事苟明此事自卓然見天之有人如人之有心卷之一掬放之六合蓋天蓋地之量人人自具不假外求若云仰求之天則情類血氣悉乏本根人物之空殼痿痺亦已久矣可哀孰甚且不思所云天主者渠且有心乎無心乎若云無心則頑如木石云有心則天主復有主矣其説之立窮可不勞辨也先儒曰東海有聖人此心此理同也西海有聖人此心此理同也是以佛弟子達磨西來直指人心見性成佛此理正與孔子一日克己復禮天下歸仁之旨吻一無二故自漢以及我明道互發明薪傳不絶且我高皇帝深明此宗煌煌御製誠見夫啓聾振瞶孔釋合符榮賜聖僧廣佐治化夫高皇帝生知絶學博洽群書豈不知有韓愈毀佛之書而故踵此斃哉沿習至今乃有亂臣賊子敢邈國憲澌滅本心貪天逐臭抑正升邪絶棄天理之極亦至於此夫凡為臣子見無禮於君父者如鷹鸇之逐鳥雀况此禍言傷入穀種慘于楊墨不止洪水猛獸懼何可言憤何可言且彼之陽剪佛而陰傾儒也其罪亦已昭著矣其言釋迦背父不孝至引孔子事親知天之語以實之其説之謬止可愚弄淺見小兒豈可與通人達士面折而勝哉昔孔子對哀公曰故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天非徑云事親不可以不知天也其書之一篇大旨歸重修身吾身即親之身也知人知天皆修身中事故孟子曰事孰為大事親為大守孰為大守身為大事歸於守親歸於身身歸心性修身以俟之正是本於存養釋迦棄國亦止為心性事大是吾親遺體之本來面目故辭榮有所不顧與孝經國有諍臣家有諍子之極則永符論語曰遊必有方此之謂矣古今論孝莫備於孔子其言事死如事生明乎生死皆不違親况遠近乎是以孔子周流十九年非拘拘於閭墓也若利瑪竇泛海數萬里至中土曾携父母妻子來乎彼利氏者吾不罪其泛海遠來之不孝而罪其離身言孝之為大不孝也嗟乎今之從天學者依然儒服也既舉心性之大權聽命於彼則孔孟之學已去其綱領徒存枝葉何儒之足云而猶靦顏人世與之效力與故不才此言非僅僅佐佛適所以存儒也俗云東鄰失火西鄰汲泉非救彼也自救而已矣中流遇風同舟之人如左右手非相濟也自濟而已矣從邪者將有甘心于不才者乎水火非所敢避矣闢邪摘要略議張廣湉著我太祖掃清邪氛混一寰宇開大明於中天四方莫不賔服威令行於天下矣然國中敦秉倫獨尊孔孟之學凡在攝化之區無不建立素王之廟誠萬世不易之教道也近有外夷自稱天主教者言從歐邏巴來已非向所臣屬之國然其不奉召而至潛入我國中公然欲以彼國之邪教移我華夏之民風是敢以夷變夏者也審察其教中有不可從者五據彼云國中君主有二一稱治世皇帝一稱教化皇帝治世者攝一國之政教化者統萬國之權治世則相繼傳位於子孫而所治之國屬教化君統有輸納貢獻之欵教化者傳位則舉國中之習天教之賢者而遜焉是一天而二日一國而二主也無論堯舜禹湯文武周公孔子之政教紀綱一旦變易其經嘗即如我皇上可亦為其所統御而輸貢獻耶嗟夫何物妖夷敢以彼國二主之夷風亂我國一君之治統據彼云國中男女配偶上自國君下及黎元止惟一夫一婦無嬪妃姬妾之稱不重無後為大之説所以我國之聖人如堯舜禹湯文武等亦皆云不免於鍊清之獄也無論民庶不得畜姬取妾以犯彼二色之誡即如周禮所載國君之三宮九嬪御妻夫人之屬寧亦悉令遣而出之若四民之單婦隻妻耶嗟夫何物妖夷敢以彼國一色之夷風亂我國至尊之大典據彼云國中惟尊崇一天主不祀他神不設他廟隨方建立天主堂而供安其像受其教者皆得家延戶祀如別奉他廟他神則犯天主之教誡必先毀我宣尼之廟以及山川保社之壇併廢往古敕建忠孝節義之祠一如夷説取其像而投諸糞窖之中然後檄令省郡州縣各建一天主堂以奉安彼刑架之罪夫嗟夫何物姦夷敢以彼國獨祀之夷風亂我國萬代之師表據彼云國中人父母死不設祭祀不立宗廟惟認天主為我等之公父薄所生之父母而弟兄輩視之不然則犯天主之教誡將斬先王之血食廢九廟之大饗以詔民從之耶嗟夫何物妖夷敢以彼國忘親之夷風亂我國如生之孝源據彼云國中首重天教推算曆數之學為優為最不同中國明經取士之科否則非天主之教誡矣不知私習天文偽造曆日是我太祖成令之所禁而併嚴剞劂其書者也假令我國中崇尚其教勢必斥毀孔孟之經傳斷滅堯舜之道統廢經濟而尚觀占壞祖宗之憲章可耶嗟夫何物妖夷敢以彼國末技之夷風亂我國天府之禁令略而摘之先此五端餘則悉難盡舉邇緣我國之縉紳已有喪心者踵習其非聖而景慕其夷風陰壞我素王之正學冥毀我列聖之真宗非儒非釋非道為怪為孽為妖豈現前之冠儒冠服儒服受君命餐君祿者耳目面顏之已往乎嗚呼痛哉目今流賊豕突郡州縣查異地姦細之人嚴各家共坐之禁即鄰縣隔郡如越人之來住吳地者僅爾一衣帶水之間尚根究其行蹤而各門盤詰猶嚴面生可疑之輩至於茫茫海外孰知其鄉之夷遁形省郡來莫之從去莫之往聽其雜入四民之中鄰里利其多金保甲貪其重賄而竟不疑其迹煌煌大明會典罔顧華夷疆界之功令不知果何相知相信之確若是乎世道至此人心已死真堪痛哭流涕長太息之時吾恐其不止披髮左袵而已也
