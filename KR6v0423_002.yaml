body:
  text: 鹽官居士徐昌治覲周甫訂發遣遠夷回奏䟽南京禮部侍郎沈著題為欽奉明旨發遣遠夷回奏事主客清吏司案呈奉本部送准禮部咨為遠夷久覊候旨懇乞聖明速賜處分以維風教以肅政體事該本部題據南京禮科給事中晏文輝揭稱前事雖未奉旨下部相應據揭題覆乞將王豐肅龐廸峩等勅下本部轉行各該衙門送廣東聽彼中撫按暫為收管督令西歸等因萬曆四十四年十二月初十日本部署部事左侍郎兼翰林院侍讀學士何宗彥等具題二十八日奉聖旨這奏內遠夷王豐肅等立教惑眾蓄謀叵測爾部移咨南京禮部行文各該衙門速差員役送廣東撫按督令西歸以靜地方其龐廸峩等去歲爾等公言曉知曆法請與各官推演七政且皆係向化來京亦令歸還本國該部院知道欽此欽遵除將龐廸峩等咨都察院轉行送外備咨臣部查炤欽依內事理將王豐肅等送廣東撫按衙門督令西歸一體欽遵施行等因到部送司卷查萬曆四十四年五月內該臣題為遠夷闌入都門暗傷王化懇乞聖明申嚴律令以正人心以維風俗事稱在南京有王豐肅陽瑪諾等及炤本年七月二十等日該廵視東城監察御史孫光裕行南京東城兵馬司擒獲一干人犯暫覊候旨聞彼時提有王豐肅鍾明仁謝務祿等一十四名其陽瑪諾據稱先歸本國未知有無窩藏容隱及見獲謝務祿亦供稱化外人未知虛實今該前因行司審據王豐肅供稱年五十歲西洋國人萬曆二十九年前來南京建立天主堂聚徒講教其陽瑪諾向住嶴中先曾與豐肅同住兩年又往北京三年仍復回南同住於四十三年十二月內仍往南雄居住訖又審得謝務祿亦供稱西洋人面貌與王豐肅相同其為遠夷無疑查明呈覆該臣查炤禮部題奉欽依內事理咨行南京都察院轉行五城廵視御史衙門速差員役將王豐肅等送廣東撫按衙門收管續據回稱會差小教塲中營中哨衛總李鈺龍江陸兵前營把總鎮撫劉仕曉帶領兵勇俞大亮等八名於三月二十五日起程送去訖相應回奏等因具呈到部該臣看得王豐肅等潛住多年妄稱天主利驅術誘愚民被其煽惑不難出妻獻子至於擦油灑水婦女皆然而風俗之壞極矣明旨所謂立教惑眾蓄謀叵測真是洞見萬里之外而尚寬之以不殺之恩還本國又真所謂包荒不遐遺聖人之仁明並用也惟是私剏庵觀有禁而况乎門庭之清肅陵寢之森嚴豈容留狡夷鼾睡之迹服舍違式有禁而况乎無樑殿其制逼尊事天堂其名大僭豈容不掃除以易都人耳目之觀臣謹行上元江寧二縣東城兵馬司將前項二處折毀入官蓋皆遵律令明文仰體我皇上以靜地方之旨而為之一以清愚民積習炫誘之端一以杜彼夷覬覦復來之地爾然不敢不一併上聞也萬曆四十五年五月日會審鍾明禮等犯一案南京禮部王客清吏司為緝獲人犯事據東城兵馬司呈解犯人鍾明禮張寀余成元方政湯洪夏王周用吳南等八名到部奉堂諭四司會審奉此該本司吳郎中會同司務廳張司務祠祭司徐郎中儀制司文主事審據鍾明禮即鍾鳴宇供年三十四歲廣東新會縣人父鍾念山生兄鍾鳴仁及鳴禮幼時曾住香山𤀀中𤀀中有大天主殿一𤀀人皆從其教彼時主教者名曰歷山又有頭目曰東寶祿兩人共住𤀀中或兩年一換或三年一換俱從西洋國撥來鳴禮失記日月不知何年分有利瑪竇龐廸峩王豐肅郭居靜羅儒望等從西洋國來入𤀀繇將天主教愈加講明要得行教中國是父鍾念山率鳴禮兄弟往拜從之自此朝夕不離利瑪竇等向在韶州地方起造房屋供奉天主像約有十年乃至江西南昌府賃房居住比時從之者少教未大行眾議分投行教王豐肅至南京郭居靜至浙江羅儒望住江西萬曆二十七年利瑪竇龐廸峩前往北京有鳴仁從之同住鳴禮自住江西於萬曆三十三年間鳴禮來至南京與王豐肅同住天主堂內兄鍾鳴仁亦自北來一同居住及萬曆三十九年利瑪竇死鳴禮兄弟同往北京會塟塟畢仍復來京王豐肅一切費用俱自香山𤀀送來其銀自西洋國送入𤀀中𤀀中商人轉送羅儒望羅儒望轉送到此歲歲不絕凢天主堂中有來從教者或鳴仁或鳴禮先與講說然後引見王豐肅一向無異至今年五月內鳴禮前往杭州與郭居靜會話八月初二日知王豐肅事發兄鳴仁已被拘獲又聞浙江軍門亦將緝拿郭居靜鳴禮即於初十日到京見天主堂已封即訪教中人王甫余成元比時王甫已獲在城惟余成元在家見張寀先已在彼持有北邊書揭俱不敢開鳴禮云開亦何害即開其包袱見護封內有揭帖一封是禮稱說刻此揭帖徧送各老爺可以釋放我兄并一干人犯即于初十夜將錢僱已發落刻匠明華并已迯秦文等包工刊刻至十四日刻完隨到蓬厰中裝釘欲于十五日朝天宮習儀處所投不意城上聞知當有兵馬官前來擒獲是鳴禮說平日受天主大恩無以報荅今日就拏也不怕等語又據張寀供年二十六歲山西平陽府曲沃縣人於萬曆四十二年三月內前往北京推水過活因見同鄉人說稱天主教極好遂拜從龐廸峩門下迪峩即以鷄翎粘聖油向額上畫一十字謂之擦聖油乃又持聖水念天主經向額上一淋即滌去前罪自後七日一瞻拜群誦天主經在天我等父者云云日將出乃散習以為嘗至今年七月二十一日龐廸峩見南京王豐肅事發要得救解與寀盤費銀二兩交袱包一個內書揭一大封差寀送南京天主堂中開拆寀於八月初八日到南京見王豐肅天主堂已經封鎻乃尋到教中余成元家比時鍾鳴禮自杭州來解包開封因商量刻揭情繇十一日刻起十四日刻完隨于本夜刷印裝釘共成一百本約十五日習儀處所投不意二更時即被拘獲等情又據余成元供年二十九歲原籍江西本京府軍右衛人住鷹揚倉地方向與王甫同院居住合種一園萬曆三十九年十一月內有表叔曹秀先從天主教勸余成元亦入教中先遇鍾鳴仁講說人生不久壽夭不同不如及今修一修使靈魂不滅等語遂于本月初七日進見王豐肅成元跪于天主像前王豐肅先擦聖油後淋聖水令拜天主四拜并向王豐肅叩頭口稱王爺自後七日一聚會天未明而至日未出而散每次或三四十人或五六十人不等至今年七月二十日王豐肅事發王甫被城上拘獲成元獨住園中八月初八日值張寀自北京齎揭前來至成元家即與同住尚未敢開揭適鍾鳴禮亦從杭中來將書揭拆開是成元僱得明華并已迯秦文等包工刻完議于十五日習儀日投揭隨被拘獲等情又據方政供年三十二歲徽州府歙縣人描金生理先於三十八年十一月二十日有不在官叔方文榜向從天主教政因此拜從王豐肅稱為王爺自稱小的擦油淋水其眾俱同七日一會歲時不絕至今年五月內王豐肅被叅至八月初九日余成元見北京張寀持揭到來遂向政說北京有個信來不知其中何意值鍾鳴禮自浙江來乃開書揭即同刊完要趕十五日投十四日夜隨被拘獲等情又據湯洪供年三十二歲上元縣人住朝天宮後易家橋總甲劉科地方有故兄湯應科向在天主堂中每向洪勸誘應科即于四十年十一月率洪到天主堂先見鍾鳴仁即叩王豐肅四頭擦油淋水如嘗自後如期聚會今年七月內王豐肅事發洪雖住家中時嘗探聽消息至八月十四日到余成元家見張寀鍾鳴禮等先在余成元向洪云你母舅王桂捉在監中你可幫送揭帖救你母舅等語是洪聽信亦同在彼幇釘釘完即同喫酒約十五日投隨被捉獲等情又據夏玉供年三十三歲南京府軍右衛人住本衛平倉地方賣糕生理萬曆四十年十月內前往帽子店曹秀家做帽曹秀因說天主生天生地生萬物汝何不從之有鍾鳴仁等與玉講說天主道理玉云既謂之天主何以有像仁等荅云當初天主化生止有一男一女自後百姓作業不認得天主了所以洪水泛濫遭此大難天主不忍降生西洋國以教化天下至今共一千六百十五六年又將夷教書十五本付玉誦讀隨進天主堂擦油淋水一一是實若婦人有從教者王豐肅差鍾鳴仁前往女家以聖水淋之止不用油至今年七月二十一日見天主堂門已封思我既敬天主就有災患亦無事至八月二十四日余成元來呌玉同買魚肉等項前往蓬中但見揭已刷完只要明早送了正喫飯間被城上拿獲等情又據周用供年六十八歲江西撫州府東鄉縣人一向在京居住開設書舖并刷書生理萬曆三十八年正月內王豐肅僱用刷天主經因與用說你年紀老大何不從天主教日後魂靈可昇天堂用遂入教今年八月十四日早有湯洪來說揭已刊完你須去刷印幾簿用因年老恐刷不及即僱覔吳南同往蓬中刷至起更時分方完隨即裝釘商量明日投不意被獲等情又據吳南供年二十四歲羽林左衛人平日刷印為生並未從入天主教中八月十四日周用向南說有一相公有幾本書速要刷完要趕十五日分送各位爺我刷不及你同去一刷及刷時乃知其為揭帖許錢二十文尚未交付正留喫飯隨即被獲等情今據該城將一干人犯申解前來各供口詞前情是實叅看得狡夷之闌入中國也駕稱八萬里不可窮詰之程途妄揑西洋外千古所無之天主狡焉盤踞留都突然私駕巍殿百千瞻拜昏夜成群舉國既已若狂隱憂大為叵測已經本部題叅廵院拘禁靜候明旨攘除蕩滌一時從邪之民俱已去番字而貼門符遠夷教而祀宗祖會見維新之眾大有廓清之機而何物鍾鳴禮等當此見晲雪消之日廼為魑魅魍魎之謀潛集蓬厰公行刻揭幸被獲於深夜幾得中其狂鋒鍾鳴禮父子兄弟通夷雖戴履中華天地而儼然披髮左袵張寀天南地北奔馳即么麼亡命廝走而甘為伏戎隱𭁵余成元方政一則以灌園而為保匿奸徒之藪一則以鏤金而效刻揭投之功湯洪夏玉一則從兄邪而與舅同惡一則受夷書而利蓄亡命此皆利于明條亦何辭於法網宜叅送法司次第輕重擬罪儆示者若周用則垂盡之息或蠱於輪𢌞而終迷吳南則鬼鼠之流偶誘以青蚨而效用宜即解網以覆顓愚緣奉堂諭會審事理本司未敢擅便伏乞裁奪施行須至呈者計開解犯人八名鍾鳴禮張寀余成元方政湯洪夏玉周用吳南萬曆四十四年十月日署郎中主事吳爾成堂批題叅各犯自合靜聽處分鍾鳴禮等故來犯法所惡異教之惑人者正惡有此等軰耳本都當叅送正法姑念周用年老止當日受僱吳南認不入教止受僱未得錢量與省放其餘六犯情有輕重總之為夷人用而勾連煽惑揚波助瀾則鍾鳴禮實謀主矣該法司分別定罪會審鍾鳴仁等犯一案南京禮部主客清吏司為遠夷闌入都門暗傷王化事奉本部劄付前事奉此遵依行據五城兵馬司呈解從夷犯人鍾鳴仁等一起到司該本司署司事祠祭司徐主事會同司務廳張司務祠祭司徐郎中儀制司文主事除王桂即王貴病故外會審得鍾鳴仁年五十五歲廣東廣州府新會縣人供稱先年同父念山及弟鳴禮往香山𤀀中從天主教於己亥年隨利瑪竇進貢在北京七八年方來南京住三年又往浙江一年舊歲五月間仍來天主堂中為王豐肅招引徒眾若婦人從教者不便登堂令仁竟詣本家與婦淋水宣呪呪云我洗爾因的利揭非畧揭西必利多三多明者亞們大約淋過婦人十五六口不記姓仍管買辦使費所費銀兩在𤀀中來每年約有一二百兩曹秀年四十歲江西南昌府南昌縣人供稱先年來京結帽為生因妻染痰疾五年不愈慕天主教可以禳灾獲福遂於四十年三月間同妻入教誦天主經經云在天我等父者我等願爾名承盛爾國臨格爾止承行於地如與天焉我等望爾今日與我我日用糧爾免我債如我亦赦負我債者又不我許陷與誘感乃救我與離惡亞們專務招引從教如余成元王文等是實姚如望年六十一歲福建興化府莆田縣人供稱挑脚為生在京三十年於甲寅正月十六日進教因王豐肅事發手執黃旗口稱願為天主死遂被獲游祿年五十三歲江西南昌府南昌縣人供稱𩬈頭為生有夷人羅儒望在江西開教即便投入教中於四十四年五月間儒望以書一封差祿送王豐肅處即入天主堂中於頭門外耳房居住看守蔡思命年二十二歲廣東廣州府新會縣人供稱幼年粗讀詩書於三十七年間同陽瑪諾費奇規來京投入王豐肅家專管書柬兼理茶房每年約得錢一千二百文來時年止十六歲同來費奇規亦夷人尚在韶州府王甫年三十一歲浙江湖州府烏程縣人供稱四十四年五月十二日有桐鄉縣錢秀才僱甫來京抽豐失意棄甫獨歸被隣居余成元引進王豐肅處看園每月得受僱工錢一百五十文飯米三斗菜錢三十文張元年三十二歲江西瑞州府人供稱結帽生理在南京十餘年於四十年間偶在縉紳家做巾見本宦拜禮豐肅心𥨸慕之遂傭於天主堂內客至捧茶每月得受工食銀三錢從夷教守十戒王文年三十歲江西九江府湖口縣人供稱補網為生來京二世於四十三年正月十六日進教有姐夫曹秀先在教中招之使去也劉二年三十九歲江西南康府都康縣人供稱木匠為生於三十八年來京前年從王豐肅教先在天主堂中修理做工遂聽其教迨事發往看因而被獲周可斗年二十七歲江西九江府湖口縣人供稱隨母在安慶府宿松縣王佑家帶至南京結帽為生四十四年六月十二日進教王豐肅將錢一百七十文凂斗結帽一頂網完送去被獲王玉明年二十九歲福建邵武府邵武縣人供稱前年八月到京跟陳外郎度日外郎往山西蒲州探親遺下玉明遂進天主堂煑飯每月得工錢一百二十文候外郎回日仍去隨之幼童三郎年十五歲松江府上海縣人供稱父親鄒元盤於四十三年同母病故有祖父鄒思化送杭州開教夷人郭居靜處讀書因交遊不暇轉送王豐肅處讀書今染病仁兒年十四歲北直保定府人供稱父親劉大於四十四年三月內將仁兒賣於龐廸峩聞南京要人使用差管家送至豐肅處兩月被獲龍兒年十四歲北直保定府漆水縣人供稱父故有伯張文正將龍兒賣與龐廸峩得銀一兩同仁兒一起送至南京本多年十四歲廣東東莞縣人供稱父親劉應魁在此當軍於四十二年將本多僱與王豐肅燒火每月得錢七十文熊良年十四歲江西南昌人供稱父親熊廷試久住南京木匠生理時嘗在王豐肅家做工帶良進出偶豐肅與錢五十文買鷄送進被獲各供是實據此看得此數犯者皆亡命之徒烏合之眾也執業甚賤無恒產以固其心故投之以纖利而奔走若狂秉性好奇有妖言以熒其聽故攻乎異端而扞網不顧即均置之法庶挽異趨而細按其情不無差等如鍾鳴仁其殆登壇執牛耳者乎代宣夷呪廣招羽翼猶曰引男子也至於公然淋婦女之水而瓜嫌不避幾淪中國以夷狄之風父率其子兄勉其弟猶曰惑邪謀也至於甘心供辦之役而錢糓是司顯受夷人以心膂之寄所當與別案之鍾鳴禮同律擬究者也若夫曹秀其即次焉者乎深信其教至挈妻以從縱託言有疾終屬無恥誦習其經至呼朋以往彼余成元王文等是誰之愆所當與鍾鳴仁並擬示懲者也姚如望一擔負么麼耳輒敢揭竿而呼聲言效死則不但從邪抑且亂民矣罪豈在鳴仁曹秀下哉游祿既從該省之羅儒望而郵筒自效暗通彼此之情又登此處之天主堂而閽人見委謹司出入之候鷹犬不辭三尺焉逭蔡思命專供掌記暇則烹茶先經與匪人偕來每年有多錢之入法不容貸苐其來時年止十六耳尚屬無知誤入量當原情末减此外則有被服其教寢處其廬此借彼之衣食彼藉此之傭作者如王甫之灌園張元之捧茶王玉明之執爨是也因之以為利非有深謀也則又有謁徒而來請依期而進拜聚則為教中之人散猶能自食其技者如王文之不棄補網劉二之仍操斧周可斗之不廢帽匠是也偶牽於所誘非其本心也他如幼童五名三郎仁兒龍兒本多熊良或捨入於堂中或鬻之為僕𨽾赤子入井誠為可矜即時省發猶以為晚要而論之鍾鳴仁曹秀姚如望引例則有左道惑眾之人或燒香集徒夜聚曉散為從者軍衛發邊遠充軍有司發口外為民各犯政與例合引律則有左道亂正之術或隱藏圖像燒香集眾夜聚曉散煽惑人民為首者絞為從者各杖一百流三千里各犯又與律合是在法曹酌而用之也游祿蔡思命雖為夷人效用尚非引類呼朋合送法司定罪方行回原籍王甫張元三郎免送法司竟回籍王玉明雖係受僱實為愚民相應與王文劉二周可斗免行解放歸生理幼童本多熊良見有父在即宜發領仁兒龍兒皆北直人無親識者若竟放之不免為棍徒拐賣姑令寺中收管以俟北方之訊可也為此分別具繇連人犯一併呈堂定奪原蒙劄審事理本司未敢擅便須至呈者計開解犯人十一名鍾鳴仁曹秀姚如望游祿蔡思命王甫張元王文劉二周可斗王玉明幼童五名三郎仁兒龍兒本多熊良萬曆四十五年五月日署司事祠祭主事徐從治堂批各犯既審問明白所引律例似亦允當但勘鍾鳴仁曹秀姚如望與別案鍾鳴禮張寀平時勾連夷教扇誘愚民臨事又往來偵探壞法情重按律有在京在外軍民人等與朝貢夷人私通往來投託管顧撥置害人因而透漏事情者俱問發邊衛充軍之例五犯是否又與此例合該司并入繇內將鍾鳴仁等與同游祿蔡思命俱叅送法司定罪其王甫張元三郎免其叅送竟回籍王文劉二周可斗王玉明姑准省放幼童本多熊良著令親識人領回取領狀繳仁兒龍兒暫令僧錄司收管寄養俟該府縣有親識人來發領奉此遵將鍾鳴仁曹秀姚如望游祿蔡思命于五月二十五日叅送南京刑部河南司收問定罪取有批𢌞在卷其王甫行上元縣轉浙江湖州府烏程縣三郎行江寧縣轉直𨽾松江府上海縣張元在京年久行上元縣著落甲隣收管取上江二縣回報收管在卷王文劉二周可斗王玉明放歸生理幼童仁兒龍兒發僧錄司收養本多熊良各發伊父領回各領狀在卷拿獲邪黨後告示南京禮部為禁諭事炤得狡夷王豐肅等潛住都門妄稱天主教煽惑人民先該本部題叅只欲申嚴律令解散其徒眾耳向在候旨未遽有行及部科兩䟽并前䟽發抄該城兵馬司奉察院明文提人候旨本部亦未有行也但據申報西營地方搜獲十三名幼童五名孝陵衛地方搜獲一名如此而已本部之意若明旨一下只此見獲者究論此外不必株連一人目今地方素不從邪者固幸獲狡夷之發露無或撓亂我而可以各安生理即有為所引誘者知其犯律令所禁而回心改過一朝洗滌依然是平世良民本部嘉與維新何曾搜剔無柰有一二邪黨如鍾明宇等八名自遠而來齎有龐廸峩熊三等䟽揭二件潛搭窩棚私行刊刻肆出投夫本部未有一牌票提治而狡夷公然揭又公然䟽又公然刻此等伎倆豈法紀所容為此不得不拿此外仍未嘗株連一人猶恐愚民無知怵惕合行曉諭今後各務本等生理不許訛言恐喝安心無事做太平百姓不必疑畏即在彼夷若能靜聽處分官府必且哀矜若多一番鑽刺徒增一番罪案無益有損為此出示禁諭各宜知悉今將狡夷邪說欺世惑人相應破除者開欵于後一夷人辨䟽辨揭俱稱天主即中國所奉之天而附和其說者亦曰吾中國何嘗不事天也乃彼夷自刻天主教解要略明言天主生於漢哀帝某年其名曰耶穌其母亞利瑪是西洋一胡耳又曰被惡官將十字枷釘死是胡之以罪死者耳焉有罪胡而可名天主者乎甚至辨䟽內明言天主降生西國其矯誣無禮敢於欺誑天聽豈謂我中國無一人覺其詐耶一大明律有私習天文之禁正謂大統曆法為萬世不刊之典惟恐後世有姦宄之徒威侮五行遁天倍法者創為邪說以淆亂之也故預嚴其防耳凢我臣子皆凜凜奉若不敢二三而狡夷突來明犯我禁私藏另造渾天儀等器甚至為七政七重天之說舉天體而欲决裂之然則天下何事非可以顛倒誑惑者耶無論百里不同風千里不同晷九萬里之外晷影長短懸殊不可以彼格此目今聖明正御三光順度晦朔弦望不愆于月分至啟閉不愆于時亦何故須更曆法而故以為狡夷地耶一大明律禁私家告天書符呪水隱藏圖像燒香集眾夜聚曉散等欵今彼夷妄稱天主誘人大瞻禮小瞻禮名色不為私家告天乎從其教者灑之以水曰灑聖水擦以油曰擦聖油不為書符呪水乎其每月房虛星昴大小瞻禮等日俱三更聚集天明散去不為夜聚曉散乎種種邪術煽惑人民豈可容于堯舜之世一夷人煽惑愚民從其教者每人與銀三兩此係民間歌謠遍傳者而遠聽之君子豈能入彼窟穴探彼葢藏遂身任其無咎曲證為借貸乎或曰人未有不自愛其鼎者獨疑彼夷有禁呪之術是以不得已而護之不知彼鬼術者只可在魑魅之邦騙下愚耳豈能行于大明之世而堂堂士君子立身行已自有法度何至畏彼狡獪反沮其正氣耶今該本部出示之後彼夷縱有邪術自然不靈不必畏護萬曆四十四年八月日示清查夷物一案應天府上元江寧二縣為清查夷物事抄蒙巡視京城監察御史趙郭孫憲牌內開炤得狡夷王豐肅謝務祿近奉南京都察院劄付准南京禮部咨奉有欽依事理擇差的當員役押解廣東撫按衙門交割發遣在邇所有夷人原存房內貨物合行清查為此仰上江二縣會同東城兵馬司原經手三員量帶隨役三人前往夷人房內騐開原封將原日揭報騐存貨物并隱藏未盡物件逐一清查除私置中國書籍及自造番書違禁天文器物具揭報院以憑轉送禮部貯庫存炤外其餘衣物器皿家伙等項逐一交付王豐肅收領變賣以資盤費以示柔遠之仁取領狀回報仍着兵番把守前後門毋令閑人混入致有遺失違者許行拿究其孝陵衛洪武岡違例置造房屋徑聽禮部定奪施行蒙此隨經會同東城兵馬司原經手兵馬三員前詣本犯屋內查明違禁天文書籍器皿并自置番書天主像造冊并應給本犯衣物器皿等件當給本犯收領取有領狀具繇通詳去後只奉本院孫蒙批所不許狡夷帶去者惟違禁天文器物書籍耳據冊開報如玻璃琥珀珠串琴畵銅器等件硃筆勾的仍給還王豐肅收領取領狀繳示中國不寶遠物毋利分毫之意其變價什物着人代為議價交易不許勢豪衙役勒騙強買驅夷之中不失柔遠之恩第毋縱兇出柙致有疎虞可也林斐理屍棺臨行聽其領出安埋義塚仰行東城會同查行繳蒙此隨經會同東城唐吏目復詣本犯屋內將冊內硃勾應給什物逐一查明當付本犯收領訖所有衣服什物等件給發本犯收領變賣又經復查出應入官圖像并番書數目造冊見在其林斐理屍棺責令王豐肅領出塟埋義塚取有領狀見在其入官違禁什物俱封貯本犯屋內未蒙批示貯庫二縣未敢擅便擬合申詳為此今將前繇并造完入官什物文冊粘連領狀理合具申拆毀違制樓園一案南京禮部主客清吏司為奉旨處分夷情事炤得狡夷王豐肅等違制葢造無梁殿樓房花園已經題請拆毀入官其苜蓿園廳房物料因浡泥王墳屋盡燬業經稟堂批行東城唐吏目移葢所有園基當憑城官同經紀估價銀一十五兩賣與內相王明唐吏目隨將前價給發工費訖至於洪武岡拆毀樓房及基地墻圍初議欲建公署一所比緣帑藏如洗不能為無米之炊而拆卸既久又恐滋鼠𥨸之弊合無將前基地甎料發經紀變賣收其價銀送貯縣庫俟本衙門修造取用庶物料不致散失而垂涎此地者亦可息念矣本司未敢擅便擬合稟候裁奪批示施行須至呈者萬曆四十五年八月日署郎中事主事徐從治堂批前據司呈五間樓移葢於黃公祠則遺下地基甎料委應發賣以杜非分垂涎者銀貯縣庫尤為得體依擬查行具呈人李成為承買入官房地事近有南京禮部奉請拏獲夷犯王豐肅起解去訖遺下入官房地一塊坐落崇禮街西營三舖地方前街至後巷基地通共七間併拆毀甎料等物發賣竊成愿得承買當憑經紀戈九疇議定時值價銀一百五十兩整為此具呈連銀投上伏乞俯賜批准發下該司驗明貯庫仍賜給執炤自買之後聽憑成執業葢居住實為恩便上呈禮部老爺施行萬曆四十五年八月日具呈人李成堂批李成呈買官地銀兩該司查明發上元縣貯庫候本部正項修造支發主客司票仰東城唐吏目即將承買狡夷王豐肅入官房地人李成二次齎來價銀共一百五十兩驗看明白轉送上元縣秤貯庫聽候本部修造作正支銷其本宅內原樓房七間木料甎瓦等件運至黃公祠葢造仍將修過本祠并拆花園修造浡泥王墳一應工料數目造冊回報以憑施行須票萬曆四十五年八月日會估修黃公祠一案南京禮部主客清吏司為修造名臣祠宇以光爼豆事先該本司郎中徐從治呈為奉旨處分夷情事奉一連送該司行翰林院行人司五府詹事府宗人府欽天監太醫院錦衣衛萬曆四十六年正月日福建巡海道告示欽差巡視海道兼理邊儲福建布政使司左布政使兼按察司副使施為拿獲通夷事十月二十二日奉督撫軍門沈批據本道呈詳本月十五日據寧德縣申蒙本道牌炤得夷漢之防甚嚴通夷罪在不赦據稱王春首告通夷之犯稱見有夷人四名窩藏在已故吳鄉官庄內為此備牌仰縣會同中軍官顧世臣前往拘拿狀內通夷人犯并通夷賍證一并解道等因蒙此隨該本縣即時密委廵捕典史何汝煥同顧中軍到吳家庄時獲得夷人一名同夥福安人黃克私即黃尚愛餘夷二名及到庄亭內諸等物件顧中軍俱已搜出攤開見在查點竹籠八隻皮包三隻布包三包內係褁衣物番畫三張熊皮二張隨查夷人一名瑪方濟一名阿腦伯一名多明莪福安縣一名黃尚愛庄戶一名李財六并籠箱物件押解到縣當該本縣即會顧中軍何典史當堂與夷人及福安縣人黃尚愛眼同逐件報明填票入箱外更未獲夷人一名據稱在福安縣白石司停住隨復差役前往緝拿即據福安縣三十四都塘邊保長副甲頭黃清褒繆文明黃興阮福等僉結稱崇禎九年八月內本鄉生員郭邦雍黃大成繆兆昂郭若翰等設立夷舘集眾從教本縣聞知給示驅逐出境雍等不遵今蒙差官到處擒拏據廿八口稱初八夜二更時分夷人同受教人林一黃尚綗等護送落船走脫等情只獲得從天主教犯人徐伯獻黃利八洪若翰黃沾四名并籠一隻內貯物件及外獲大小天主龕各一座經架一隻印板十板賣契二張各到縣隨炤數備開文冊見在其未獲夷人與從迯林一等犯乞嚴行福安縣捕緝另解今將見在人贓合就解報物件數目冊一本併供開福安縣從夷教生員郭邦雍陳台臣陳五臣黃大成黃元中繆士响繆兆昂繆仲選王之臣王道淑郭崑陳端震郭弘惠阮孔貫等緣繇到道該本道查是呂宋夷利瑪竇一𣲖專講天主者看得華夷界限從古甚嚴左道惑人法律最重故以夷亂華以邪亂正實深人心世道之憂粵稽古聖人治世教人惟有人倫自堯舜以來未之有改何忽有所謂天主教者自利瑪竇一人航海而來闡揚其說中國之人轉相慕效莫覺其非本道細閱其書大槩以遵從天主為見道以天堂地獄為指歸人世皆其唾棄獨有天主為至尊親死不事哭泣之哀親塟不修追遠之節此正孟子所謂無父無君人道而禽獸者也其為邪說惑人明白易見然其巧詞深辨足新好異之聽聞細小伎能又足動小民之嗜好於是窮鄉僻壤建祠設舘青衿儒士投誠禮拜堅信其是而不可移易如生員吳伯溢以縉紳之後甘作化外之徒黃尚愛等田野匹夫堅為護法之眾本道庭問尚愛等以從教之故則云中國自仲尼之後人不能學仲尼天主入中國勸人為善使人人學仲尼耳夫仲尼教人慎終追遠又曰生事之以禮死塟之以禮祭之以禮寧有親死不哀親塟不奠而稱為仲尼之教者乎且極詆中國親死追薦之非既從天主便生天堂春秋祭祀俱屬非禮是則借夷教以亂聖道真為名教罪人然此猶以理之是非言也本道諭令尚愛等悔悟徙教免其戒責彼則寧受責而不肯悔從教之非但云秀才不從則某等亦不從矣是何異教之令人信從牢不可破如此夫一人能鼓數十人之信從數十人便能鼓百人既能鼓惑百十人即能鼓惑千萬人從其教者人人皆堅信若斯使之赴湯蹈火亦所不辭又何事不可為哉是不但人道等于禽獸必至夷狄而亂中華誠時事之大可慮者也况近奉功令海禁甚嚴安容非我族類實逼處此伏乞本院嚴𩛙沿海各郡縣不許容留此軰於十家牌內註明有從其教者十家連坐從教者處以左道惑眾之律見在夷人三名并從教諸犯俱應重處念此道惑人有日在上申𩛙未行夷人姑着帶原來行李速令歸國不許再處內地藏夷生員吳伯溢等俱行學道懲戒令其悔改黃尚愛等該縣講鄉約以誨諭之再不改則治之以律此亦正人心以正風俗杜患於未然之一端耳最可異者方具詳間有生員黃大成郭邦雍忿忿不平直赴本道為夷人護法極口稱人間追遠祭祀為虛文惟天主為真實且以本道為古怪不近情者此等情狀似不普天下而入夷教不已者二生更應行學道重處等緣繇奉批人心不古即聖訓揭於中天尚或淪于匪僻天主夷教何為者乃能使士民齊嚮牢不可破如是足見誘惑易行漸不可長矣夷人驅逐出境勿許地方潛留通𩛙講明鄉約一洗邪說吳伯溢炤議罰懲黃大成等仍行學道處治此繳奉此又蒙巡按御史張批該本道呈同前繇蒙批據詳士民惑邪殊可怪詫倡教夷人押令歸國隨身行李許其帶回天主龕板架等項即行燒毀藏夷生員吳伯溢護法生員黃大成等即行學道降責仍責同黃尚愛等朔望赴縣具結該地方尚有私習此教者左道惑眾之罪悉歸其身一年無犯許令自新該道即於通行保甲中嚴𩛙此欵講讀鄉約候另文頒布繳蒙此合行嚴禁為此示仰地方軍民人等知悉凢有天主教夷人在於地方倡教煽惑者即速舉首驅逐出境不許潛留如保甲內有士民私習其教者令其悔改自新如再不悛定處以左道惑眾之律十家連坐并究决不輕貸須至示者崇禎十年十一月初一日給廵海道施諱邦曜字爾韜號四明浙江餘姚人己未進士提刑按察司告示福建等處提刑按察司為奉旨緝獲邪教事欽惟聖諭以六章教民平坦大道百姓克遵身家康泰若無為天主等教悉屬左道妖妄邪言律禁森嚴近者奸徒董一亮牛君臣等在京私習煽惑痴愚就經捕獲題奉明旨將董一亮等即時凌遲處决訖李光福等監候處决復行福建緝擒黨習陳大有等正罪隨行各府縣拿解去後訪得閩屬傳習邪教者不少而省城尤甚本宜盡拿正法以銷亂萌本司矜念蠢爾無知被奸簸弄誤入迷途不教而誅寸衷惻然稔聞邪教害人烈愈長乎祖宗神主不祀男女混雜無分喪心乖倫莫此為甚且呼群引類夜聚曉散覬覦非分之福懶惰生業之營卒至妄萌鼓亂名陷逆黨身棄法塲遠不具論即今董一亮等可為殷鑒除將天主教首楊瑪諾艾儒畧等驅逐出境外合行出示禁諭為此示仰軍民人等知悉以後各宜力行忠孝保守身家不得妄習無為天主邪教如前已被惑者今各改過自新示禁之後若再執迷不悛及祖宗神主不祀者該府縣印捕官採訪得實即行擒拿解司以憑轉解兩院盡法重治各家仍遵近蒙按院頒行家甲牌上仍書本甲並無倡習邪教等人如互相容隱事發一體連坐其地方若有教堂妖書盡行拆毀焚除不得隱藏違者該保約并處不貸各宜恪遵毋貽噬臍須至示者右仰知悉崇禎十年十一月初五日給發雙門前張掛提刑按察司徐諱世蔭福州府告示福州府為嚴防邪教以靖地方事夫經正民興載在古訓叛常亂俗厥有明刑故周禮不能寬左道之誅春秋所以凜防微之戒從來邪教聿興多方煽惑致蚩蚩之眾俛首皈依或棄倫常而弗顧或傾貲產以相從種種昬迷為憂方大如近日楊瑪諾艾儒畧軰以天主教首簧鼓人心非覺發之早驅逐之速漸不可知矣雖已押出境仍恐邪黨未消去向復入更為厲階爾家甲人等以後嚴加防察如有天主教艾儒略楊瑪諾等并無為教首來省城者許即稟官嚴拿究治如容隱不舉事發一體連坐上司耳目最近禁法森嚴斷不為爾等貸也特示崇禎十年十一月初五日給福州府知府吳諱起龍
