body:
  text: 鹽官居士徐昌治覲周甫訂聖朝佐闢自敘德清後學許大受著闢者何闢近年私入夷人利瑪竇之邪説也何言佐草茅涼德不敢主闢而目擊乎東省白蓮之禍與吾西吳赤子之危念此邪徒禍危實甚而𥨸儒滅儒人所叵測日熾一日靡有底歸今且夜授婦女不避幃簿之嫌揮鏹聚民將有要領之懼甚至舉三五君師之諸大聖人受抑千古將我二祖列宗之華夷內外忽倒一時即欲不佐一臂而又有所不忍也或曰汝既懼要領奈何犯夷鋒應之曰等懼也懼法為正且夷之言曰為夷死難者生最上天夫堂堂中國豈讓四夷祖宗養士又非一日如能為聖人為天子吐氣即死奚辭或又曰然則子闢言中何不直崇儒而乃兼袒佛乎曰夷言人有後世非貫通儒釋不足以折妖邪故也况夷之狡計陽闢佛而陰貶儒更借闢佛之名以使不深於儒者之樂於趨故區區之心必欲令天下曉然知夷説鄙陋尚遠遜於佛及老何况吾儒然後知三教決不容四治統道統各不容姦而聖人之道自嘗尊於萬世矣𥨸料我邦士民聰明正直豈難熄此一磷第好奇者務採謬言為新理見小者思藉淫巧為用資最下則眩其輦璧燒茅為貪泉金穴而未究其無君無父傷俗斁倫之情狀故致爾爾倘肯全披是册一旦然譬之晲見犀然立見雪消妖露則尤小子佐闢之雅志而世道人心之大幸云其説之荒蕪剌謬不勝闢今撮其大要凡十篇凡十一闢誑世彼詭言有大西洋國彼從彼來涉九萬里而後達此按漢張騫使西域或傳窮河源抵月宮况是人間有不到者山海經搜神記咸賔録西域志太平廣記等書何無一字紀及彼國者又詭言彼天主名耶穌生漢哀帝中按吾夫子及老聃並生彼前大易稱冒天下之道如斯而已及彌綸範圍等贊豈更有剩理反超諸聖之上者詭言耶穌為人甘罪釘死於十字枷上所謂聖人無死地其生也榮又何取焉釋迦生周昭時故家語載西方聖人一條其果是孔子語否且不必論彼乃詭言孔子所指之佛正是彼徒特僧輩𥨸之以行其教耳則豈有周之至聖而先譽漢之戮夷者又詭言耶穌前已有費略罷德勒之天主堯時洪水係彼怒噴且無論上世淳龐至德不怒縱使有怒豈有不怒于霧桀風而怒于堯天禹洛者嘗閲小説中有龍名錢塘君與他龍戰一怒而堯世懷襄彼特𥨸此諧殘以譸張為幻而已萬萬無大西等説豈待智者而後知哉吾鄉有余生士恢負四方之志親履其地歸而刻書名藜藿亟言云彼特廣東界外香山嶴人極陳其凶逆孔𣗥狀若是則先恭簡撫閩時議處倭酋疏中有云至於香山嶴交通一節委屬有因乞敕兩廣總督軍門設法禁處其浙江福建廣東三省住居倭國之人不論歲月久近有罪無罪但有歸志詔令跟附差去使客船隻回還則順逆之分明華夷之防定等語灼有先見今考萬曆二十八年彼夷始潛入長安貢獻方物乞留中華候旨多年神皇聖明以若輩未經該國差遣不聽散布而豢之京師其豢之者仁之也而不聽散布者恐其倡邪而欲以輦下威靈坐治其族類也至三十八年瑪竇死龐迪峩等疏乞給地瘞骸其辭絶楚故姑聽之此聖朝柔遠之法自應如是初未嘗一念作興而崇奉之也瑪竇既死當事者尚恐不測上疏促歸又奉明詔盡行遣回該國夷輩又乞止留一人守視夷冢上必不許及夫秩宗疏逐復奉旨詔獄考掠矣今更橫行豈知國法夫不召而來不遣而入是謂私通詔逐不遵屢除潛蔓是謂蔑旨且以收瑪竇為尊瑪竇而號於人曰嘗為聖天子所尊禮擇地祭葬則文王之澤枯骨亦尊枯骨乎欺天罔俗至此極矣且孔子之稱聖學乃帝王聖之孔子不自聖也獨此邪徒不但稱聖而直稱天又不但稱天且稱天主至於一切愚世之物並以聖名伏思漢光武中興令主也尚敕祝史不得稱聖稱天彼何夷斯而敢自天自聖又據其駢述詞云天子之議禮制度無過人為惟有彼國教化皇是為真主又云生也不逢其主語焉誰得其真所慨中邦尤嗟末代等語既蔑歷朝天子且敢指斥乘輿此其心何等無將而為士大夫者或左祖之又何其全不知利害耶伏讀皇明祖訓於諸夷之曾通貢者稍有叵測尚嚴絶之何况祖訓所不載而可使逼處若我中國士民有非聖侮君者法尚必屏四夷何况夷民而可容之中國嘗聞黨夷者之説曰若輩初欲服我之服以便化我而不敢擅也必走九萬里奏彼之教化皇而後行其信義如此余則曰一往一返是十八萬里何人諧之而何從核之耶此不根之論而以是為信義不愚甚哉就令果爾彼一衣冠之細尚不擅更豈我天朝主臣內外之防移風易俗之巨而偏不凜天威於咫尺魯夷狄之弗若矣真可浩歎二闢誣天董子曰道之大原出於天子思子曰天命之謂性聖學何嘗不言天然實非夷之所謂天也彼籍曰善皆天主使為惡皆爾之自為若是則人性皆惡為天主者何從得此惡種以蔓之人人而人之為善反成妖妄彼天主者又何苦自為而自賞之哉且從古有敬天無媚天夷不用敬而用媚迹其晝夜翹勤似乎苦行然其種子無非欲得妖妄之歡心全不肯依素位之正願所謂尊天實褻天耳若以上帝臨汝維皇降衷之典為藉口此又帝王誥辭宗子家法天止一子恐不可以盡人而僭為天子也且彼籍又曰天之與地及與天神皆彼天主以六日六夜內自虛空中造成如是則不如乾元多矣乾以不疾而速彼勞六日六夜優劣何如也又曰今之玉皇上帝特是天主初造三十六神內之一神以其知諂天主故不次而擢居此職是上帝又不足尊矣書曰矯誣上天正此之謂又按天尊之説道家專稱吾儒何嘗覔天於徵應桓文挾天子儒者猶非之茲且揑天主以制天挾天以制天子矣于情於理不知安否宋儒亦曰天堂無則已有則君子登地獄無則已有則小人入古之聖賢寧其舍修德之外別有修福之法哉况夷所指之善不善與聖賢所指正相反如宋君有人君之言三熒惑退舍何嘗為其諂天又如虞公饗祀修潔無救危亡何嘗為其不諂而夷籍乃曰若爾畢世為善而不媚天主為善無益若終身為惡而一息媚天惡即全消若是則為天主者之著我著情自私自利也且百千萬倍于嘗人矣又何以生天生地以為天之主哉而謬欲以此為邀福免禍之陋計也夷又曰如易稱範圍中庸稱參配猶非至當之語惟孔子所謂知我其天及獲罪於天之天即彼天主之明證嗟乎彼認性外有天故譏範圍參配其淺陋固不必辨若使知我其天之天果屬夷所妄立之天主是不勝其畔援歆羡其為怨尤特甚寧成不怨不尤審如是只宜曰但奉天不宜曰不怨天又不宜以天人平論矣又使折賈之天不指得天統之人君而別推執我見之天主是夫子教賈之精於媚而豈尊君之本意哉通文理者請於語脈思之三闢裂性文皇帝頒性理於學宮其於天地之間亦備矣獨於生前死後略而不言孔子曰性相近也習相遠也曰未知生焉知死是以不言言至繫易之辭曰精氣為物遊魂為變是故知鬼神之情狀已言其不言矣而朱晦翁又以氣化詮之祕其實義若是者何也吾儒手眼只使人體認目前絶不許人想前想後所以前世後世總不拈起以絶人徼福免禍之私萌而專精倫物若精研儒理自信得及不言佛道亦可也佛典既明後世必追前世先言三際後極一乘以絶人自他有無之橫計而不濫外邪即彼道家者流雖似徇生滯有然張平叔敘悟真云黃老悲其貪著故以長生之術漸次誘之是其極軌亦未嘗與吾儒之性理相背故我高皇帝謂佛老為陰扶聖教暗助皇綱大哉王言允為定論乃利瑪竇及艾龍諸夷之稱性獨不然言諸性不同禽獸之性無前世亦無後世何也天主創生殺則頓滅也吾人之性亦無前世永有後世何也人魂亦係天主創造一造以後苦樂之報皆無盡也惟天主之性生於極前貫於極後而無始無終何也能造一切更無一物能造彼也又言上能包下所以禽獸魂混有草木魂人魂混有禽獸魂天主魂又混有人禽水石諸魂等其種種割裂萬萬不通之論一至此審如彼云異類之魂頓空而人魂獨苦者則夷人未入以前吾人之魂升者絶無墜者無量反不如禽獸之一殺永絶是天主之愛禽獸甚於愛吾人矣天主魂混有禽獸等魂又物物而雕之人人而怒之怒之而又永不肯脫之則彼天主必不能愛人并不能自愛矣今為之詰曰不識未造種種以前為天主者將諸魂藏向何處物類貪生怖死與人無異又將滅向何處又人物等承此魂時為別有二體如以手接物耶為直一體耶所造人魂幻耶真耶天主之魂獨無始終者無始之始必有一始無終之終必有一終此義竟何歸耶若所造之人魂是幻則既從幻生還從幻滅豈有始偏有而終獨無者若言是真則天人兩魂苦樂同受彼天主者何法以獨令人苦耶至若無始無終尤𥨸佛典不生不滅之吻而成其大妄耳夫佛言不生不滅以一切諸法當體純真故曰生滅無自性不生不滅亦無自性若執一死煞妄我是無始無終而不容法界圓具者不知此無始無終屬理乎屬智乎抑屬識情乎若屬理者則非道弘人何為突生天主縱許突生已有前際若其屬智即人人虛靈本體不應彼所獨私若屬識情則有能所有能所則有時代何無始終又若彼是生成者一切總是生成若從修得者一切總可修得其於獨具全性之義又何居焉彼又遁之以一性三位非同非異之説未讀佛書者以為精微殊不知此特𥨸法報化三身之意而橫成惡解有何精微之有又彼言混有諸魂等夫渾沌之渾尚非極則何况混雜之混成何話言總之彼欲令人殺生以恣口則硬曰無輪回曾不知如佛典所稱想不斷則輪不休安能硬無彼欲以無窮極之威福眩嚇愚民又曰有天堂地獄而決無升沉之中變曾不知如佛典所稱善惡既盡則升沉自更安能硬有余嘗問艾夷曰爾教謂人之靈魂善升天堂惡墮地獄二俱不返而禽獸之覺魂又斷滅不輪則中界人類應空我爾復自何出艾曰子以人魂為舊有乎皆天主新造耳造者生生不已所以雖不輪轉不礙多人實無佛家前世之説余曰若無前世為何有貧富貴賤壽夭及種種天淵之別艾曰如儒家言氣化之偶不齊耳余曰儒言聖人有所不能天地有憾故可屬之氣化若爾教言天主無所不能天地皆繇彼造而氣化復能為隔是天主無全能矣艾乃嘆曰子問甚深不得不言其實天主始生一男曰亞當一女曰厄襪為一切人類之始祖舉天地間之物恣其受用而獨留一果樹敕二人不得垂涎厄襪聽一魔鬼與亞當私嘗之天主怒甚乃著令曰自今以後凡從二人所生人類皆有原罪以有原罪故敕後世子孫男必曝日裂背粒食乃成女必拆腹刳腸生育乃就余曰易稱一陰一陽之謂道故乾成男而坤成女即竺典小教中稱劫初光音天為造世主猶吾儒稱盤古為三才首君之意並言肇人之形不言造人之性也今彼既言造性而以孑然之陽為性原則厥子所稟之性當肖乃父而一味以偏陽幻術化生人類足矣何苦妄造一性為女流以滋飲食男女之禍謬一世之生而富厚者多不耕而食之人無告之𡠉不育之婦皆不受娩身之苦豈獨無原罪耶謬二原罪是一而今報萬殊謬三其人之先得輕罪而使盡未來際之苗裔皆重刑與罪人不孥之意不同謬四祖纍子孫遠不如佛氏所稱六道輪回自作自受之平明公恕謬五徙木之法欲立信於通國耳彼亞當夫婦鶼鶼兩人乃以盜果深罰不大無謂乎謬六凡人之智慧有限所以不奈鬼何以彼天主之威魔鬼諉其血胤而勿能禁謬七凡小賢小善之人其子不肖則諉之曰其所不能者天也以神聖如天主篤生兩人為最初繼體即誨盜而為戎首何神聖之為謬八神叢倚木所以藉則神枯彼既尊為天主矣乃不怒耳意雲仍之萬愆而獨怒冡子冡婦之一果何其舛歟且後人不肖曰亞當作俑若更追亞當之不肖作俑其誰吾不知為天主者何辭以對則又謬九而謬十矣又問艾曰所謂魔鬼安昉耶艾曰天主初成世界隨造三十六神第一巨神曰輅齊弗兒是為佛氏之祖自謂其智與天主等天主怒而貶入地獄亦即是今之閻羅王然輅齊雖入地獄受苦而一半魂神作魔鬼遊行世間退人善念即天主亦付之誰何詰曰人類未生阿誰繫獄而以佛主獄耶夷曰從貶之天神其數無量繫獄者何慮無人曰以渠魁作王而以脅從受罪豈律也哉且正使佛所作之閻羅王遊行世界為天主者但付誰何可見其威靈超過天主又天主有無窮之怒為所怒者亦有無窮之壽可見其力量與天主同且所謂魔鬼者非天主親手製造耶何為至於此前云亞當厄襪之不肖尚是人也或與天主稍隔猶可言也若輅齊是彼天主第一化生之神而先見告焉可見天主是萬惡之源還罪天主為是豈不可為捧腹而噴飯乎至於性超形聲不受生滅魂無色相豈可造成而彼乃言創生各造如前所駁者余亦不必另生辨端或曰然則造化之説非乎曰造化以不造造邪説以造不造不造造者公造也自造也造不造者私造也他造也此性命之金針而正邪之秦鏡也四闢貶儒按彼天主實義云𥨸聞古先君子敬恭天主未聞有尊太極者如太極為萬物之祖古聖何隱其説太極之説甚難合理斥擊周易纍若干言嗟嗟甚矣夷人之敢於非聖而刻其書者之敢背先師也蓋易有太極是生兩儀兩儀生四象四象生八卦然後化生萬物此乃畫前原易夷輩此言如生盲人寧見天日彼又曰物類有二人物禽獸等自立類也為貴為先仁義五嘗依賴類也為賤為後嗚呼此又謬拾老瀋而肆無忌憚者也夫天地之性人為貴人禽之異教為先寧有人禽同貴而仁義不先之理即欲治老氏之圃如所云失道而後德失德而後仁等但謂仁義不如道德未嘗言不如禽獸也彼敢貴禽獸而賤仁義并賤太極即比之仁內義外之説更覺彼猖豈不謂之喪心歟然尚謂理非迹象人有愚迷無目與心猶可原也若我仲尼祖述憲章上律下襲凡有血氣莫不尊親彼乃謂其與羲皇堯舜諸聖同在地獄據藜藿亟言所載彼處夷人直名孔聖為魔鬼豈具人貌者之所宜出口耶時余面聆此語不覺痛心而作色焉艾龍輩乃曰此一種鍊清地獄無甚苦事凡從彼教而未造其極者亦入此獄蓋天堂之流亞云余曰天主一人吾不得而知之矣其諸天堂亦是人登者否彼曰從吾教則登不然則否余曰然則民之登天堂者每每有之而孔子反墮地獄則自有生民以來未有盛於孔子之讚揚亦當拔舌矣汝判孔子在地獄視孔子何卑判汝輩同在此中自視又何倨歟且既信孔子入地獄則有子若孫者萬萬不當令其與孔子作緣而必教其習四書五經以取世資業取世資偃然華裾鼎食或繫籍聖賢乃尊穢賤夷人於壇坫之上甚者簧鼓小才好事之豎儒大膽舞文之老宿盡棄其學以學彼且群父兄出妻子以北面之而令吾孔子曾不分半席焉真如破鏡鳥子成而即食其父矣豈不痛哉或曰彼極斥佛恐未斥儒也余曰貶太極仁義是貶其理貶孔子堯舜是貶其人猶謂其不斥歟其所以未敢痛斥如佛者徒以我中國戶尊孔子家慕堯舜而不得不權傍其籬間耳若如胡元時所列十等以僧居第三儒與娼丐同居八九十者則彼之斥儒必更甚於佛矣今彼徒又言孔夫子豈能及我艾先生之萬一興言及此無論智愚無論窮達凡存髮齒具頂踵者皆當號泣聲振大千而尚容默默乎余嘗以此質之江淡如丈旁友笑云此亦無害譬如地藏菩薩亦常現身地獄中淡如怫然曰説到此際豈容滑稽使余汗下故若淡如丈者此真佛子亦真孔子弟子也五闢反倫君臣父子夫婦昆弟朋友雖是總屬人倫而主敬主恩主別主序主信其間各有取義非可以夷天等地推親作疏陽反從陰手顧奉足背公以植黨去野而于宗也夷輩乃曰彼國之君臣皆以友道處之又曰彼國至今傳賢而不傳子審從其説幸則為楚人之並耕不幸則為子噲子之之覆轍忍言乎不忍言乎記曰孝弟之德通於神明孟子曰堯舜之道孝弟而已矣夷輩乃曰父母不必各父母子孫不必各子孫且對地之天亦不足父而同父天主其於父子大親但目為彼男彼女生此男此女而已夷亦屬毛乃忍捐本且於父母之已歿而生前未聞邪教者即甚賢哲必冤以鍊清地獄稍稍常流即誣入鍊罪永苦其言以為縱有孝子媚我天主得生天堂然天怒最嚇萬難解免雖存孝志無益親靈云云嗟乎舜大孝禹致孝假使舜禹陟位而瞽鯀不得配天吾知舜禹之必蹙然而不南面矣大易家人一卦極重間家恆之六五曰恆其德貞婦人吉夫子凶書曰牝雞之晨維家之索則婦當從夫夫決不當從婦審矣禮曰男女不同巾櫛椸枷不通名聘問則彼男與此婦不容混雜又審矣夷輩乃曰夫亦以婦為主婦死夫亦為未亡人雖無子而續娶者不齒人類甚而曰彼所經諸國皆從其教從教後則雖帝王之貴只許一夫一婦然則舜文先為不齒之人即所謂在鍊清地獄者亦不得已而未減之矣有是理哉余友周國祥老貧無子幸買一妾舉一子才二歲夷教之曰吾國以不妾為賢不以無後為大周聽而逐其子之母今不知此子活否又其設戒於丈夫子戒淫之外復立一戒曰不視他妻至若從夷者之妻女悉令其群居而受夷之密教為之灌聖水滴聖油授聖櫝嚃聖鹽燃聖燭分聖麵揮聖扇蔽絳帳披異服而昏夜混雜又何歟禮曰男女無辨則亂升吾不知其亂於何底也昔陳軫悅少婦而娶詈人者雖策士且修帷簿今若此為陰陽倒置忍言乎不忍言乎若乃昆弟以天合朋友以人合固當敦恤無取比私夷輩乃告編氓曰汝但從教即某某大老某某中貴亦稱曰教兄禮為上客雖酷貧者可驟富功名可掇患難必援雖其説十九不實然余親見某某本業刀筆今徙業歸夷不數月而屋潤徒之聚食者日益數十人夷又為令曰能勸百人從者賞自鳴鐘自鳴琴各一金帛稱是若得一青襟準十人得一縉紳準百人凡從之者楣有鱉形標記其徒之晉見者必開三代貫籍繳歸夷落與白蓮等何異且其以金買民動輒蠱人曰彼徒錢糧不可計量民之走者如騖焉則較白蓮之攫金録用者其衆又易集而其心又叵測矣嘗思其金從何來或謂其繇於黃白彼甚諱言云是彼國急於度人輦金來助嗟嗟為道從師尚恐陰為利藪夫子所以罕言今為利往豈有義徒且誠輦也彼云若曹之分教中國者且百餘人一人輦三萬餘金則歲得三百萬金以外何不以此實右北平殺豈非一假必生天堂之大功勞而僅為此洴澼絖以歿世也然彼於佛教不殺戒下增一人字有以知其決不殺人因有以知其決不殺也則火器一試帑命兩糜又不知其於不殺人之戒何如而於友道又何如也此可為賈生之痛哭者也六闢廢祀木本水源惟夷不念以故夷之初入實教人皆不祀先厥後被劾又變其説而今民間父祖得與天主並廟彼若諱言前非而云宜祀先者何稱彼之親死皆不卜宅兆見形家言則非笑之舉而委之荒丘乎又何為彼在我中國多年曾不携其先夷之一主乎彼若言宜與天主並廟者則不王不褅從古有一定之大分况彼所稱之天主又在圓丘方澤以上從來主神器者所未曾埒而輒敢以庶人躋祀奚取於三家之堂至若經傳所定五祀方社田祖等位祀典所載捍大災恤大患死勤事勞奉國等諸靈爽以上及吾夫子之聖神凡從夷者槩指為魔鬼唾而不顧以為諂天主之妙訣必督令棄之廁中其有龕室者令舁至本邑戎首之家所私設天主堂內雜燒之嗟嗟以大聖大賢精忠仗義之神明或受人之刑或遭秦火之烈何慘也舉歷代我朝所褒崇之聖哲即關公為神皇近年所新加帝號之英靈而恣意私𢦤又何逆也且私創庵院律有明禁不知彼所令民間人設一天主堂戶供一十字枷奉何敕旨因耶創耶私耶公耶且旦則聚其徒於斯講膚淺之笑柄夜則挾其尤混諸婦女披髮捶胸於斯授祕密之真詮傳記披髮而祭於野者以為不祥今無故而人人戶戶若此祥耶否耶夫小民之愚有何底止倘有人言媚百神可獲百福則祀立興今彼言毀百神以媚天主可獲一莫大之福則百神又立廢其於舉廢又何當焉若忠臣志士福國祐民而詆同淫祀彼天主者古未聞今未見上不命而矯舉以祭非淫祀而何七闢竊佛訶佛種種罪過夷竊佛典世尊之稱而不得其義輒告人曰一切帝王一切賢聖不如天主之獨尊又曰譬如天下統於帝子統於親臧獲統於家督方是正理若儒言羲農以至孔子並是大聖釋言十方三世佛悉皆平等不無統乎又言一切有佛性如此現成不令人放恣乎余曰此正夷説不通之病根而不容以不辨者也夫有形之類必有欲有欲而相聚必爭故有帝王以主天下有親以主家有家督以主臧獲今夷不識此義而反欲以友之一字強平之若夫超形而入氣超氣而入神又超情識魂神而反諸未生以前之真性則原非聲臭何從主宰夷又不識此義而反欲立天主一説以強制之曾不知有形而無主則亂此主之決不可無者無形而有主反粗此主之決不能有者何也帝王但論膺圖父母均為離裏撡家者之是非但辨奴郎不𢖍老少也故佛有法身以上之事如吾儒所謂統體一太極至尊無對者也然本覿體全真平等如如而非亢之以成尊亦有報化應機之身如吾儒所謂物物一太極各各皆尊者也然如來説有我者即非有我而未嘗判誰獨卑學道之人若果盡理謂之獨尊可也謂之平等亦可也稍有不盡則其所挾以自雄正如緑林黃屋號彌尊逆彌大耳今按彼天主之分能分所宛是外道恣喜恣怒宛是邪魔又且讚殺誣天儕君偶父尚賂誨謗經毀聖又宛是凡夫之有重過者奚其尊如彼天主經所載在天我等父云云今日也求天主賜糧明日也求天主免債昏夜祝頌揑怪疲神則無論我之魂神日放於索糧免厄之間而不能收拾恐天主為肆恣之戎首而卑卑不足道矣故按佛有惟吾獨尊之唱此善表性體者也雲門有一棒打殺之機此又真報佛恩者也豈邪流所可竊乎彼又云天主之來獨久此即長於上古而不為老之殘頰也余嘗問天主何人生彼曰其母余曰有母則又有久焉者矣彼曰此降生之天主耳又有所自生者實最久又進而問其是理是人不答又問天主於世界未生時為無為有又不答則何據而言獨久耶但曰天主不可思議若思議之即獲大罰曾不知釋典所稱不可思議有二種義一謂衆生界本不思議二謂若人造到佛之境界始稱妙不思議何謂衆生界本不思議如古之前又有古今之後又有今四方之外又有四方蟭螟之睫亦容國土乃至黃粱爛柯當此叵測浮塵勝義任舉無窮者是也彼夷則謂天地只若干重四方只幾何大古今可以死法拴牢一切性殊別無生活一線譬如太虛中而強設一斷垣圮壁以柴障之太虛寧受耶何謂佛境界妙不思議言佛浩劫勤修功德剎那圓極性光以及一切三昧一切無作神通絶非凡外邪魔三乘十地所及言語道斷心思路絶也然此妙不思議處人所本足佛祖出世一場正要人殫盡思惟雲興答問以至於不可思議之極如孟子所謂思則得之中庸所謂弗得弗措何嘗以禁人思議為不可思議乎乃彼於世出世法凡有理礙詞窮處便謂我天主不曾説此道理最惡人思甚謂此世界亘古至今只闢得七千年前此更無世界等謬説夫謂著我者可以造天是七情在一性之先矣謂七千年前無世界是有今不許有昨矣天主亦但有七千年壽是禁人莫思而實可思禁人莫議而實可議矣而但嚇愚流曰不可思議此又譬之向黃口小兒説暗室有鬼不可窺瞷瞷則禍人稍有智者照之立破耳又言一切大聖及佛之知能皆不如天主之全知全能曰如余前篇所駁輅齊當襪之不肖足見其於情世間無能矣須六日夜造作之勞與虛空判成兩橛足見其於器世間無能矣不特此也佛言一切衆生本來成佛止因妄想執著而不證得惟其本來是佛故妄想執著之業力與佛力等業力既等佛力正使千佛出世不能強度一生非佛不能是故悟本體之皆同則雖有所不能而真實全能孔子釋迦是也冤一真之或異則雖以全能私據而無一能彼之邪人邪説是也至其所論十二信之極果曰我信嘗生甚哉其不知生義也夫儒曰生生此據吾性之流行遍滿如環無端者言之也佛曰無生此據吾性之離過絶非如空無迹者言之也老氏明知天地不能長且久而於深根固蒂下著有長生二字正借長生以見不如嘗無嘗之有妙竅而欲人悟入耳今彼邪説乃改長生為嘗生夫生者起也起可嘗乎問之則曰人之墮地獄者魂雖不滅與死一般不知行尸走肉之喻是警詞非實語也既云不滅何可謂死既本不死何求嘗生嗚呼此正是彼徒於無主中強作主而千邪萬過之所自開矣至其教法第妄希他日之魂嘗生而今日之形莫急於求死云彼國之遇生子者親友共至其門哭而弔之父母死則共作樂而賀之又曰此世界是禽獸之世界故以死為天恩非獨不避而且樂之人有失其二目者謂是天主大恩去其二怨賊等語夫儒言不敢毀傷固非離形而覔性即佛言忘身為法豈其欣果以厭因而彼且言為天主死難者生最上天以致日夜鼓舞愚民人人敢死不知其意果安在乎按禪師言悟道之人終日喫飯不曾咬著一粒米設其未悟如海中有一業畜名壓油殃死幾千番未能捨殼則生何礙道死又何益於生天而彼邪人乃教人求死乎彼又謂地獄無多所只有鍊清孩童鍊罪永苦等四重鍊清以處我中國之聖帝明王聖師豪傑孩童以厚諸凶短折鍊罪永苦以驅天下之不從彼説者問彼孩童獄之義何居答曰天主以孩童之無知為可取故以此薄鍊其原罪罪畢出世身量永不長大而自在快樂靡有窮期若孩童生前曾遇彼徒灌聖水者其樂更倍於是簧鼓氓幸其子之夭亡而悼其不曾灌聖水也余恨其簧鼓詰曰所謂孩童以幾歲限彼曰視黠癡黠者既孩準長癡者稍長準孩若是則人家生子祝夭又祝癡而耆頤明哲反不如殤悼蔽蒙矣有是理乎且按藜藿亟言中言彼夷殘甚數掠十歲以下小兒烹食之率一口金錢百文惡少緣以為市廣人咸惴惴莫必其命御史丘道隆何鰲皆疏其殘逆異狀等語此固其誘嬰孩以速死之本意而可令其易種於我仁壽之域乎又曰地獄中無佛氏火塗之説但苦極暗極濕極窄余曰暗與濕即不問若窄安容無量罪人彼曰性靈與形骸不同如千燈互照雖窄如針鋒無憂不容余曰汝輩謂佛理誑虛汝獨課實若是則與坐微塵裏現一毫端之旨合矣何成課實彼乃良久又遁其説曰雖云極窄亦頗大在答曰此更不通若性同形骸者自開闢來積骸如大地高山復多無算將欲容向何處彼語方塞天堂之誑與此相類則謂彼理最實宜尊彼言不誑宜學者何其全無涇渭耶彼又竊佛忍辱悲願之説謂天主曾為衆生釘死於十字枷上嗟嗟佛以佛性總圓為何枉入生死譬醒人之憐醉漢以是悲生而夷則謂諸性不同悲從何發佛以雖極惡人若自轉念究竟出頭譬病瘧之有瘥期以是願滿而夷則謂一墜永錮願自何圓竊佛懺悔之説而以諂邪當之不知罪從心起諂則心濁所謂因地不真果招紆曲於懺法又何當焉至其訶佛者如曰漢明帝所夢金容正是彼天主魔鬼竊之以行佛教夫天主威神無極何物魔鬼而敢竊之即暫竊之亦當不旋踵誅之而復以夢告奈何瞌睡千餘年今日方醒又何為當日肉身不為帝現而於戮尸久死之後始倡此言且彼最惡佛之神通夢非神通耶而天主乃甘為之耶如裂性篇所指彼既認佛是閻王奈何又向人曰佛不過是小西洋一清修士中國人文其説為三藏十二部耳豈閻王是清修士耶而彼夷更宣言西國天書有七千部即書目已有充棟之多特未到此耳夫據現在幾種書談理如此不通談事又如此不通雖七千部何益又謂佛之天竺國其人最惡劣中國人何苦願生西方且無論其認西域是西方懵然不知佛典又不知生則定生去實不去之義大非彼所指若升若沉有來有去之邪言即舉彼五天竺中極粗淺之名號事相一詰問焉而全不聞又何為誑人曰彼大西人到此從佛國經過而反誣佛經之竊彼説乎此又全不知佛法影響亦無許多筆札以教誨癡人矣或曰彼不求人布施而肯施人比沙門似勝一籌余曰布施本破慳貪不肖沙門懷貪求施固非也彼夷以財賄餌人長人貪習且教其慳不施僧尤非之非也且金者所以貿百物者也故古來之民生國計獨珍惜之今彼乃不惜揮金以貿民所貿者又皆駔獪之徒倘非求所大欲何為割所甚珍而况可論施人施我之優劣哉或又曰佛有四衆將無為男女混雜之嚆矢耶余曰要哉此問余將詳言以折邪淫魔子之根抵佛之設教廣被群機故四衆八部及他世界無窮之品彚有根熟者自然皆得聞法初非群婦女至伽藍而私授受也是故姨母出家佛為之泣下而嘆正法之減防微何甚乃至律中所設尼戒五百比僧倍增與女人受戒儀軌必以朔望清旦於大衆前誦戒訖即散去不得退語僧乞食者不與寡女少女見面其男女之別豈有異於吾聖人扶陽抑陰之義哉慨自羅祖白蓮聞香等妖輩出而男女以混而混今天主之邪説陽教人謹邪陰以己行貪欲而男女名不混而實最混如前所言聖水聖油等豈能以私憎而故入其罪哉謹微君子恪守儒規以砥其波兼明佛律以防其濫則王化之始端而聖人之徒端有屬矣或又曰佛教禁殺只慮報復耶抑另有精義耶夷言克己正念二齋日單食水族是耶非耶曰因果感應不但佛書詳之史傳載之惟黃魯直頌云我肉衆生肉形殊性不殊元同一種性只是隔形軀苦惱從他受肥甘為我須莫教閻老判自揣看何如最得戒殺之意今夷不知鮮食是治世聖人之權乃以殺為宜而以齋為號又別水族異於牲牷宜充素食者與回回之單不食肫自殺自食之可笑有何異哉且夷謂殺生無罪而但教人不殺人人可殺乎則戒又何必立乎既曰不殺人而盛談兵學火學又何為乎將無所謂不殺人者第不殺於公戰而殺於私鬬所伏殺機正無窮乎彼本以財餌人而又惡人布施豈結黨則宜施而行仁則不宜耶本欲聚黨以殺人而誑曰愛人豈黨人則宜生非黨人則宜殺耶戒其徒勿視他妻而夷則不妨近女督其徒使出妾而他高足之畜妾者至數人從夷者宜法夷之輕利而封爾家者又比比惡佛崇虛彼獨課實則所謂天主天神與夫人魂之不消獸魂之獨滅及天主賦魂時之辱臨儀仗草木生魂之瘁往榮來皆應一一明見而今然否又云各國王之從彼者甚衆則出妃屏嬪而退甘一夫一婦者是龜茲王耶于闐主耶又告人曰再過三年盡天下人自然從彼彼之天主自然凌駕孔廟之上且曰若不蚤從而待三年後則天主亦怒而不容之矣其煽惑何甚歟又於邪黨中不別男女指而稱之曰天主甚愛念他或謂此人極易生天有何考據又教人求盍臘際盍臘際者莫大之福慧也而經年重病謂之天主愛我福慧之謂何詰之則曰病正所以福之而報在後世既曰後世誰人見來往歲武林火災從邪者偶不火輒誑人曰是夷寶辟火之力夫只辟八口火而不為萬竈禳可謂愛人乎及吾邑有嚴役者首從彼教而火其闔室燼及三棺夷寶之靈又安在而謂其不欺哉况古德謂若人被邪師熏一邪種於八識田中如油入麵永不可出其罪最重不知何日出頭而可言助揚佛法乎有著闢佛書者中有一則云佛説西方西是金位金是殺氣所以有五胡之擾余曰易傳曰乾為天為金為寒為冰則乾亦殺氣耶今彼夷因我大明而僭號大西大西者獨非大殺乎竊謂五胡殺亂主而彼直殺聖師及古聖帝五胡偶亂華而彼直舉從來之中華以永遜於彼夷之下其所殺有何窮已而謗佛者乃偏事夷何悖甚也或曰首楞嚴陰魔有倒圓種天主之説或是彼否曰非也觀自疑身心從彼流出句亦酷似之然彼禪定中人粗欲盡遺細惑未除是利使一邊此全不知身心是何物日在好惡財色叛逆上作活計虛揑一主而勸人尊他則鈍甚矣於倒圓種何啻天淵曰然則是何教耶余曰有宗始有教嘗思彼因人之好異也製為奇技因人之好利也誘以金帛因人之好味也寬以殺生因人之懼內也束男以不二色而鼓女使歸夷因人之求福免禍而欲攬盡威福之柄也則曰雖無輪回而天堂地獄之升沉者永永不返因人之好上擬則儕君若父因欲鼓人之好援而敢死則獨重友因欲令人之昏夜自便則不許人尊厥師故謂彼為聚欲倡亂之術則可謂之教則不可且佛之為教但闡心光弗干治統務尋法器弗濫庸流是故宗門孤峻固貴屏絶狐蹤縱使蓮社慈悲亦復不容靈運豈有如邪流之薄帝侮卿談兵説劒且貌怯怯而心耽耽不論智愚男女而一槩蠱惑之者乎是不特儒門之介狄而亦佛氏之毒魔也噫八闢夷所謂善之實非善或曰領惡全好儒之宗也彼之為教亦無非導人為善耳人莫大於無君臣父子夫婦故大處一不善小處之善愆不蓋也有意為善雖善亦私故皇天無親惟善是親之善正非計較邀求之可覬覦也如彼籍七克首貴克傲只曲禮傲不可長一句足以盡之安事彼不文不了之義而多言繁稱為且傲之起也有先則其克也亦有要即曲禮一篇有曰為人子者在醜夷不爭是因愛親之真而鋤其色於儕伍也又曰為人子者三賜不及車馬而遐邇皆稱是因尊父之至而流其順於姻朋也故曰孝為百行之本釋典心地戒品全是以孝順心為五戒萬行之大根源其捨親出家雖割愛哉其意蓋為塵中不能學道學道正以報親是門庭雖異而本孝之心與儒無異也今夷之輕父母也不但如前篇彼男彼女之説遍覽其書如所謂七克實義畸人十二信西學凡若經若戒及交友論幾何源本等數十萬言中曾不錯寫一孝字而乃襲三教諸子中皮毛曰克傲克驕以文其陋夫不愛吾親而愛他人不敬吾親而敬他人者未之前聞矣且夷既謂天怒難回親魂不度而現世相值又等路人勸未亡父母從夷又復路人祖魄吾不知其於罔極之心何時得展而但欲以空桑身私非分福乎其於親亡者不焚楮而焚帛從來惟朝廷有神帛堂督以中貴夷敢僭之可謂祭之以禮乎且親既是從墜之魂而越五祀百神之上與主同焚帛焉天主不大怒乎興言及此而孝子順孫有不斷腸欲絶者乎則善乎非乎其致敬彼主之狀則昏夜乞哀或就無人處跪而呼曰真主救我夷經首祝語曰我願爾名成聖等夫共主已真求真何謂未嘗被縛須救何為且彼既是至聖而無以加又欲借吾人以聖之不知何故夫吾儒之教君尊如天故春秋書法稱君曰天王書稱天命天討佛道雖云出世而梵宇中必設萬歲牌翹勤祝禮佛以經法付囑國王大臣豈曰諂君誠萬古莫逃之義也夷乃不稱臣而稱友且欲一切國王之皆從邪説盡去其後宮妃嬪而等於編氓然其自處又延無智女流夜入猩紅帳中闔戶而點以聖油授以聖水及手按五處之祕媟狀男女之亂曷以加諸又古有君道必嚴師道故曰師嚴然後道尊即佛稱三界大師必禮過去佛塔而此夷獨不立師以便其苟且行私之計則古今之傲孰大於是又况引誘人家好男好女無緣無因見神見鬼悉壞其本來之聰明而倒置其萬古之倫理其罪真不容誅矣夫新莽謙恭至赴闕而誦功德者八十餘萬人莽之為莽奚若而明眼人可隨豎儒婦女同善之乎是故能讀四書五經是為善之據能敦三綱五嘗是為善之本能不諂鬼不愧衾毫無所為而自潔精毫無怯弱而嘗謹凜寧天下不韙而決不忍負吾君親是又始於一善而終於萬善之宗若使捨華從夷棄人䁥鬼空疏現在而希冀未來吾斷不敢以為善也九闢夷技不足尚夷貨不足貪夷占不足信或曰彼理雖未必妙人雖未必賢而制器步天可濟民用子又何以闢之余應之曰子不聞夫輸攻墨守乎輸巧矣九攻九却而墨又巧焉何嘗讓巧於夷狄又不聞夫巧輗拙鳶及楮葉棘猴之不足貴與夫修渾沌氏之術者之見取於仲尼乎縱巧亦何益於身心今按彼自鳴鐘不過定刻漏耳費數十金為之有何大益桔橰之製曰人力省耳乃為之最難成之易敗不反耗金錢乎火車等器未能殲敵先已火人此又安足尚乎嘗有從彼之人以短視眼鏡示余余罩眼試之目力果加一倍歸舟時但切念曰罩此鏡矚便遙可見吾性無處不遍隔遠近者特形耳至若占候一節古天官所統之六大並掌天道則何夷之分野不在目中重譯迷歸我中國聖王作指南車以錫而歸之又何夷之部落不撡掌內若乃先天八卦之體自具後天之用而五行稟職焉即堯夫皇極經世一書雖抒其所得為水火土石四象然第各存其是羽翼五行而不敢非毀五行也彼夷獨謂五行為非而夷之氣火土水四行為是舉洪範炎上潤下之理而悉刺譏之曾不知氣屬陰陽包五行之統宗者也木金則一生一殺之大用而分五行之能事者也夷之是彼非此又何當焉且言星宮天高於日月天五星二十八宿之體並大於日月且無論王省惟歲庶民惟星之聖經斷乎不可改易凡有目者皆見日月之大而彼偏小之皆見三光共繫一天而彼偏多之小日是小王也多天是多帝也彼豈以是寓玩侮中國之讖歟夷又有偽書曰幾何源本幾何者蓋笑天地間之無幾何耳按堯夫十二萬年不過加一倍法初非荒唐即釋典廣陳華藏非別有隱怪之旨不過表心性本量包盡虛空衆生埋沒佛始開敷耳後之儒者不察佛意尚謂其幻妄天地彼竊仰世界覆世界之佛書而謂某處與某處足踵相對今其書所列其可知者不過吾儒已陳之詮其不可知者皆一無考據者耳又謂十二重天如彈丸嘗著天主膝上不知天主之身又著在何處又言人民所居之土浮於水面更屬最小天主慈悲為人僅留此不盡漂沒之丸泥以使人廬耳又謂渠從日邊來幾乎灼死此其言無稽且無理其為幻妄天地也又豈僅如談理之佛書哉胡元耶律楚材高皇帝但採其渾儀不尊其性學况彼所言之天文又最荒唐悠謬乎嘗考洪武二年夏四月上徵回回曆官鄭阿里等十一人至京師議曆法占天象給廩餼衣服有差因設回回欽天監至洪武三十一年夏四月罷回回欽天監伏讀之下深有以識聖祖內華外夷之大經大法確不可更也夫當草昧初造則兼集四夷之長及治定功成而知不可以訓後世則直削夷官之號且當時繇徵入不繇潛入今回回一種自祕其法而不敢以賺惑一人則繇聖祖之制馭精而照臨遠也逮我神皇初容瑪竇後嚴逐之家法相承與高皇若合符節為臣子者寧不當遠稽近憲世世稟之哉奈何才見異類聞異言輒驚怖之而聽熒心醉復容其逼處耶十闢行私曆攘瑞應謀不軌為千古未聞之大逆昔帝堯欽天以閏月定四時成歲敬授人時後世儒者雖有左旋右旋兩説而要之置閏以成歲則亘古不能易也何則有氣盈朔虛必有歲差有歲差必須置閏惟置閏歲功乃成而今歲某日與明歲某日方無參錯不齊之患而俾人人可以共守夷則曰中國曆家所言左旋右旋皆非也七政經天特繇一氣沖動非左非右而每月置為三十一日曾不思左旋右旋是運動之動健也常也若沖之為言則震撼之而為搖動之動躁也擾也乾元之體不為健為嘗而為躁為擾有是理乎嘗讀太史公律曆二書因纍黍然後有律呂因律呂然後有推步皆自然之法度非可以己臆穿鑿之者也今夷歲不成則閏不必置閏既不置則節序自移以此欺世而謂夷曆獨精真可笑之極矣縱使果精當繇上定倘無詔旨則不敢行此不倍之定理况夏殷周雖更三正不改四時即建亥之朝後世不以正統目之而一時黔首亦無敢違秦政之正朔况我大明一統萬國行夏之時庶邦小君罔不從化而居內地為良民者敢從私曆不知當論何罪乃彼欲尊夷輩至以辛酉河清壬戌鳳見為彼邪人之瑞夫今上亶聰神武真天所啓至德大治難盡名言則夫河清豈非海晏之開先鳳見實是龍飛之響應何物逆黨敢指為夷瑞哉况吾夫子之至聖而鳳不至圖不出麟不為遊而為獲則河清鳳見之不為師兆而但為君兆又明矣夷奈何而敢言此且讀藜藿亟言云愚以為黔中之續則粵中之嶴門是也嘉靖間嶴門諸夷不過漸運木石駕屋若聚落爾久之獨為舶藪今且高築城垣以為三窟且分遣間諜峩冠博𢃄闖入各省直地方互相交結即中國之縉紳章縫折節相從數千里外問候不絶得其餽遺者甚夥頻年結連呂宋日本以為應援凡我山川厄塞去處靡不圖之於室居恆指畫某地兵民強弱帑藏多寡洞如觀火實陰有覬覦之心時時鍊兵器積火藥適且鼓鑄大銃無虛日意欲何為此豈非窺伺中國睥睨神器之顯狀耶嗟嗟周之獫狁漢之冒頓唐之突獗宋之女直夷氛雖惡天下尚知其為夷尤之霧勝廣之狐黃巾之占風白蓮之詛社妖禍雖煽天下尚知其為妖惟此一邪流者直謂三五不足尊宣尼不足法鬼神不足畏父母不足親獨彼誑邪為至尊至親可畏可諂是以新莽天生之狡智肆蠻夷魑魅之兩毒者也况自開闢來惟我高皇帝掃腥羶而還華夏故尚論者謂功高萬古彼徒乃即以高皇帝之聖子神孫金甌世界而復欲沼華夏而再腥羶豈非千古未聞之大逆哉闢草既終或謂余曰汝賤而弱且無似焉而敢爾爾得無螳臂歟余曰然然余雖無似弒父與君必不從也况君有世恩父有世學若余今日不言一旦有事則墳墓妻子及此首領且不可保何如今日言之而死之猶愈乎曰然則當道君子宜窮治其徒耶曰非也夷黨滋蔓久成三窟即當道奮然驅除而崇夷之士大夫力為解免則羽翼更張永清何日伏願蒿目時艱之大人豪傑憂深慮遠密畫而斷行之將省直夷種渠魁如艾龍輩或斃之杖下或押出口外而取津吏之回文疏之朝廷永永不許再入入則戮其津吏及押夷者其在某邑某村之祖其説而風靡者先以保甲捕黨後以勒石銘功下令曰有敢怙終者罪死若矜子敢爾察以師儒又請悉毀其書且將其書各一册印鈐貯庫使民間咸知邪説謬書止有此數使此後之邪説不得如前篇所稱彼國有七千部夷書未來中國之訛言而別添紕説以貽將來不可窮詰之禍其有襟紳氓庶憬然改絃者樂與更始則亂庶遄已矣
