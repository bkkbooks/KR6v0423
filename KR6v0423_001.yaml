body:
  text: 鹽官居士徐昌治覲周甫訂南宮署牘序南宮署牘者吳興沈仲雨以少宗伯署南禮部諸稿也仲雨與余同籍同館號為莫逆居恆以經濟道誼相勗不欲徒以文藻稱雄長每共討館閣故實相與嘆高皇帝析中書省為六部然帷幄未嘗不與儒臣相咨輒殿閣皆設大學士特乾綱獨運親決萬機故顯潤色之猷而泯參贊之迹後人謂國初罷丞相而內閣創于永樂間者非也文皇神武定鼎投戈講藝即命三楊解胡七大夫日直文淵閣親臣比于重臣贊決機務有從他曹改入翰林官僅編簡積漸尊貴終始不離詞林後人謂內閣不盡出詞臣一途者非也惟景泰天順正靖之間初有繇潛邸部院入者而議禮諸臣皆先改館職而後大用則祖宗雅重詞臣其來久矣惟是文學侍從之臣初若優遊無所事事逮晉卿二則肩仔周應皆巨且要而禮卿為尤甚若南禮部人人以為間適無事之地用以養望而待遷而仲雨典南部獨不取優遊養尊所奏疏移文諸牘若干卷余受而卒業焉所言謹天戒開儲講請王婚定陵祀皆關宗社大計引經據禮明諍婉諷不遺餘力而其所發憤抗論至再至三不顧流俗不避勞怨必期于異説芟除之淨盡者毋如西洋夷人一事夫天下之患其來有端其成有漸惟早見遠慮者能預察其端而力防其漸為能剪其枝蔓拔其根株而不遺大患于後當其初議時或目為迂濶而訕笑之旁撓之若見為尋嘗不足介意者正智者之所瞿然恐蹙然憂如疾痛之在身不能一朝濡忍者也昔賈誼痛哭于庶孽江統著論于徙戎當時若能聽其言則七國之釁必可逆銷五胡之亂何至橫決哉惟端己見而不知漸已成而莫覺故一朝發難而不可收拾也仲雨于夷人王豐肅等據律參奏盡法驅逐意正在此或云彼夷無扞罔逆迹引繩批根不無傷向化心一統無外何所不包荒又云夷人窺天之器殊巧適當修正曆法之際或可參用如回回曆法而反覆仲雨牘中固皆侃侃言之矣彼夷妄稱大西洋且不奉其主箋表潛迹闌入兩都與重譯來王不同且其徒衆日繁金錢符水既足煽誘愚民異教祕器稱天測象又足以動士大夫好怪耽奇之聽于此不竭力掃除為虺不摧為蛇奈何即如仲雨身任禮卿奏請奉旨以治此么麼而辨揭縱橫南北響應伏莾含沙意正未已藉使鋤治少緩撰述同貝葉以盛行部署如黃巾而難制輦轂之下陵寢之旁其禍可勝道哉學者誦法孔孟仲尼之誅魯之文人也固曰行僻而堅言偽而辨記醜而博又曰其居處足以掫徒成黨其談説足以飾褎熒衆其強禦足以反是獨力不可不除也而孟子之詆楊墨曰楊氏為我是無君也墨氏兼愛是無父也夫孔子未攻擅政之三家而先誅亂政之少正卯孟子不攻儀秦之傾危而先距楊墨之淫邪乃後儒稱孔行周公之志孟之功不在禹之下則豈非以奇邪詭譎之患能早絶其端而防其漸哉仲雨之意蓋深遠矣方今宇內多故疆事叵測皆坐于見端不早積漸不防以養無窮之禍仲雨遇事有關係者不少寬假向與豫尋討館閣舊聞遺事止為今日政將及于海內共拭目新參之作用其擘畫建樹茲稿不足盡其大余特為茲刻表其用心之所在云庚申春仲就李年眷弟陳懿典頓首拜撰南宮署牘南京禮部侍郎沈著參遠夷疏奏為遠夷闌入都門暗傷王化懇乞聖明申嚴律令以正人心以維風俗事職聞帝王之御世也本儒術以定紀綱持紀綱以明賞罰使民日改惡勸善而不為異物所遷焉此所謂一道同風正人心而維國脈之本計也以太祖高皇帝長駕遠馭九流率職四夷來王而猶諄諄于夷夏之防載諸祖訓及會典等書凡朝貢各國有名其貢物有數其應貢之期給有勘合職在主客司其不係該載及無勘合者則有越渡關津之律有盤詰姦細之律至于臣部職掌尤嚴邪正之禁一應左道亂正佯修善事煽惑人民者分其首從或絞或流其軍民人等不問來歷窩藏接引探聽境內事情者或發邊充軍或發口外為民律至嚴矣夫豈不知遠人慕義之名可取而朝廷覆載之量可以包荒而無外哉正以山川自有封域而彼疆我理截然各止其所正王道之所以蕩平愚民易與為非而抑邪崇正昭然定于一尊乃風俗之所以淳厚故釋道二氏流傳既久猶與儒教並馳而師巫小術耳目略新即嚴絶之不使為愚民煽惑其為萬世治安計至深遠也不謂近年以來突有狡夷自遠而至在京師則有龐迪峩熊三等在南京則有王豐肅陽瑪諾等其他省會各郡在在有之自稱其國曰大西洋自名其教曰天主教夫普天之下薄海內外惟皇上為覆載照臨之主是以國號曰大明何彼夷亦曰大西且既稱歸化豈可為兩大之辭以相抗乎三代之隆也臨諸侯曰天王君天下曰天子本朝稽古定制每詔誥之下皆曰奉天而彼夷詭稱天主若將駕軼其上者然使愚民眩惑何所適從臣初至南京聞其聚有徒衆營有室廬即欲修明本部職掌擒治驅逐而説者或謂其類實繁其説浸淫人心即士君子亦有信向之者况于閭左之民驟難家諭戶曉臣不覺喟然長嘆則亦未有以尊中國大一統人心風俗之關係者告之耳誠念及此豈有士君子而忍從其説乎説者又謂治曆明時之法久失其傳臺監推算漸至差忒而彼夷所製窺天窺日之器頗稱精好以故萬曆三十九年曾經該部具題欲將平素究心曆理之人與同彼夷開局翻繹嗚呼則亦不思古帝王大經大法所在而不知彼之妖妄怪誕所當深惡痛絶者正在此也臣請得言其詳從來治曆必本於言天言天者必有定體堯典敬授人時始于寅賔寅餞以日為記如日中星鳥日永星火宵中星虛日短星昴蓋日者天之經也而月五星同在一天之中月之晦朔弦望視日之遠近而星之東南西北與日之短永中相應是故以日記日以月記月以中星記時舜典在璇璣玉衡以齊七政解之者以天體之運有恆而七政運行于天有遲有速有順有逆猶人君之有政事也則未聞有七政而可各自為一天者令彼夷立説乃曰七政行度不同各自為一重天又曰七政諸天之中心各與地心不同處所其為誕妄不經惑世誣民甚矣傳曰日者衆陽之宗人君之表是故天無二日亦象天下之奉一君也惟月配日則象于后垣宿經緯以象百官九野衆星以象八方民庶今特為之説曰日月五星各居一天是舉堯舜以來中國相傳綱維統紀之最大者而欲變亂之此為奉若天道乎抑亦妄干天道乎以此名曰慕義而來此為歸順王化乎抑亦暗傷王化乎夫使其所言天體不異乎中國臣猶慮其立法不同推步未必相合况誕妄不經若此而可據以紛更祖宗欽定聖賢世守之大統曆法乎臣又聞其誑惑小民輒曰祖宗不必祭祀但尊奉天主可以升天堂免地獄夫天堂地獄之説釋道二氏皆有之然以之勸人孝弟而示懲夫不孝不弟造惡業者故亦有助于儒術爾今彼直勸人不祭祀祖先是教之不孝也繇前言之是率天下而無君臣繇後言之是率天下而無父子何物醜類造此矯誣蓋儒術之大賊而聖世所必誅尚可然驅天下而從其説乎然閭左小民每每受其簧鼓樂從其教者聞其廣有資財量人而與且曰天主之教如此濟人是以貪愚之徒有所利而信之此其胸懷叵測尤為可惡昔齊之田氏為公私二量公量小家量大以家量貸民而以公量收之以收民心卒傾齊國可為炯鑒劉淵入太學名士皆讓其學識然而寇晉者劉淵也王夷甫識石勒張九齡阻安祿山其言不行竟為千古永恨有忠君愛國之志者寧忍不警惕于此猥云遠夷慕義而引翼之崇獎之俾生其羽毛貽將來莫大之禍乎伏乞敕下禮兵二部會同覆議如果臣言不謬合將為首者依律究遣其餘立限驅逐仍復申明律令要見彼狡夷者從何年潛入見今兩京各省有幾處屯聚既稱去中國八萬里其資財源源而來是何人為之津送其經過關津去處有何文憑得以越渡該把守官軍人等何以通無盤詰嚴為條格今後再不許容此輩闖入違者照大明律處斷庶乎我之防維既密而彼之蹤迹難詭國家太平萬萬年無復意外之虞矣臣不勝激切待命之至萬曆四十四年五月日再參遠夷疏奏為遠夷闌入都門暗傷王化懇乞聖明申嚴律令以正人心以維風俗事先該臣於本年五月間具題前事候旨未下頃於七月十九日接得邸報又該禮部覆題亦在候旨間臣有以仰體聖心未嘗不留念于此事也則臣言有所未盡而機務原不可不熟思爾夫左道惑衆律有明條此臣部之職掌當嚴也裔夷窺伺潛住兩京則國家之隱憂當杜也聖明自為社稷計豈其不留念及此乎惟是兩京事體稍有不同而王豐肅等潛住南京其盤詰勾連之狀尤可駭恨則臣前疏尚有言之未盡者何也京師為陛下日月照臨之所即使有神姦潛伏猶或上憚於天威之嚴重而下怵於舉朝之公論未敢顯肆猖狂公行鼓扇若南京則根本重地高皇帝陵寢在焉山川拱護固為臣庶之瞻依而門殿閟清全在紀綱之振肅所以譏防出入而杜絶夫異言異服者尤不可不兢兢也而豐肅神姦公然潛住正陽門裏洪武岡之西起蓋無梁殿懸設胡像誑誘愚民從其教者每人與銀參兩盡寫其家人口生年日月云有咒術後有呼召不約而至此則民間歌謠遍傳者也每月自朔望外又有房虛星昴四日為會期每會少則五十人多則二百人此其自刻天主教解要略中明開會期可查也蹤迹如此若使士大夫峻絶不與往還猶未足為深慮然而二十年來潛住既久結交亦廣不知起自何人何日今且習以為故嘗玩細娛而忘遠略比比是矣臣若更不覺察胡奴接踵於城闉虎翼養成而莫問一朝竊發患豈及圖尤可恨者城內住房既據洪武岡王地而城外又有花園一所正在孝陵衛之前夫孝陵衛以衛陵寢則高廟所從遊衣冠也龍蟠虎踞之鄉豈狐鼠縱橫之地而狡夷伏藏於此意欲何為乎更可駭者臣疏向未發抄頃七月初才有邸報而彼夷即於七月初旬具揭及至二十一日已有番書訂寄揭稿在王豐肅處矣夫置郵傳命中國所以通上下而廣宣達也狡焉醜類而橫弄線索於其間神速若此又將何為乎頃該巡視東城御史孫光裕查照會題事理行令兵馬司拘留彼夷候旨猶有愚民手執小黃旗自言願為天主死者幸而旋就拘獲然亦可見事機之不可失而處分之明旨更不可後矣臣查得大明律例凡化外人犯罪者並依律擬斷注云俱要請旨除王豐肅係化外人臣謹遵律令明文候旨處分外其餘同居徒衆妄稱天主教扇惑人民見在本所搜獲者一十三名一面行提鞫審此外更不株連一人今小民洗滌門戶不復從邪正可嘉與維新而都士大夫尤曉然知狡夷不可測臣乃得昌言以畢其愚慮惟恐遠聽者不審其情形而猶惑於術數之小知也且龐迪峩態三拔久在輦下傳送既速簸弄必巧遷延日久線索橫出則亦事機之不可不慮者也伏乞陛下念根本重計蚤賜批發該部覆請速咨臣等將夷犯從法依律擬斷其原參未獲陽瑪諾等者行提緝獲庶乎明旨昭然而人心大定道化歸一而風俗永清不惟臣部職掌得申而國家之隱憂亦杜矣臣不勝激切待命之至萬曆四十四年八月日參遠夷三疏奏為遠夷情形甚詭留都根本當防懇乞聖明蚤賜處分以清重地以正人心事臣聞邪不干正而左道惑衆者必誅夷不亂華而越關津者必禁方其萌芽窺伺則以禮教防之而有餘及其黨與勾連則將干戈取之而不足竊照夷犯王豐肅等詐言八萬里之遠潛來南京妄稱天主教扇惑人民非一日矣先該臣兩次具題又該禮部及南北臺省諸臣先後題催未奉明旨陛下豈猶未悉彼夷情形之詭乎夫其術之邪鄙不足言也據其所稱天主乃是彼國一罪人顧欲矯誣稱尊欺誑視聽亦不足辨也但使止行異教非有陰謀何故於洪武岡王氣所鍾輒私盤據又何故於孝陵衛寢殿前擅造花園皇上試差官踏勘其所蓋無梁殿果於正陽門相去幾里是否緣城近堞蹤迹可疑南京各衙門月給報房工食蓋謂兩京事體奉旨施行欲其呼吸相通爾其他鄉官士民皆不能得而彼夷人亦給工食與報房人意欲何為尤可異者各衙門參彼之疏尚未得旨而龐迪峩熊三等亦造疏揭差其細作鍾鳴禮張寀等齎持前來詐稱已經奏進刊刻投臣觀其疏揭內公然自言兩京各省有十三人殊為可駭夫利瑪竇昔年進京始末此廷臣所知原未嘗有如許彼衆也皇上憐其孤身賜之葬地此自柔遠之仁與成祖當年賜浡泥王葬地相同若使浡泥王蒙恩賜葬而浡泥國臣民遂借為口實因緣𥨸入散布京省成祖能置之不問否彼乃欲借皇上一時柔遠之仁而潛藏其狐兔蹤迹勾連窺伺日多一日豈可置之不問耶臣近又細詢閩海士民識彼原籍者云的係佛狼機人其王豐肅原名巴里狼當先年同其黨類詐稱行天主教欺呂宋國主而奪其地改號大西洋然則閩粵相近一狡夷爾有何八萬里之遙臣雖未敢即以此説為據然而伏戎於莽為患叵測總之根本重地必不可容一日不防者也伏乞皇上即下明旨容臣等將王豐肅等依律處斷其扇惑徒衆在本所捕獲鍾明仁等及續獲到細作鍾明禮張寀等或係勾連主謀或係因緣為從一面分別正罪庶乎法紀明而人心定姦邪去而重地亦永清矣臣無任激切待命之至萬曆四十四年十二月日付該司查驗夷犯劄南京禮部為奉旨處分夷情事準禮部咨照得狡夷王豐肅等與內地姦民鍾鳴仁鍾鳴禮等勾連扇惑潛住輦轂之下多年先該本部奏為遠夷闌入都門暗傷王化懇乞聖明申嚴律令以正人心以維風俗事內參夷犯王豐肅陽瑪諾龐迪峩熊三拔等四名除龐熊二犯係潛住京師近該禮部遵旨發外七月間禮部覆題抄到二十一日該巡視東城御史孫行兵馬司提拘王豐肅等一十四名該本部于八月初一題明前事除王豐肅係化外人臣謹遵律令明文候旨處分外其餘同居徒衆妄稱天主教扇惑人民見在本所搜獲一十三名一面行提鞫審此外並不株連一人等因又於十二月初一該本部續奏為遠夷情形甚詭留都根本當防懇乞聖明早賜處分以清重地以正人心事內稱尤可異者各衙門參彼之疏尚未得旨而龐迪峩熊三拔等亦造疏揭差其細作鍾鳴禮張寀等齎揭前來詐稱已經奏進刊刻投云云伏乞皇上即下明旨容臣等將王豐肅等依律處斷其扇惑徒衆在本所捕獲鍾鳴仁等及續獲到細作鍾鳴禮張寀等或係勾連主謀或係因緣為從一面分別正罪庶乎法紀明而人心定姦邪去而重地亦永清矣等因俱候旨間今該前因除鍾鳴仁鍾鳴禮張寀等合照本部題明事理另審外及查十三名內謝務祿一名亦供稱化外人在卷為此合劄該司查驗王豐肅謝務祿果否俱係化外夷人其未獲陽瑪諾是否先歸本國速具確報以憑查照禮部題奉欽依事理速差送督歸欽遵施行萬曆四十五年二月日會審王豐肅等犯一案并移咨南京禮部主客清吏司為奉旨處分夷情事奉本部劄付內開鍾鳴仁鳴禮張寀等合照本部題明事理另審外及查十三名內謝務祿一名亦供稱化外人在卷合劄該司查驗王豐肅謝務祿果否俱係化外夷人其未獲陽瑪諾是否先歸本國速具確報以憑查照禮部題奉欽依事理速差送督歸等因奉此隨牌行東城兵馬司將遠夷王豐肅謝務祿二名提解前來該本司吳郎中會同司務廳張司務祠祭司徐郎中精膳司黃郎中儀制司文主事祠祭司徐主事會審得王豐肅面紅白眉白長眼深鼻尖鬍鬚黃色供稱年五十歲大西洋人幼讀夷書繇文考理考道考得中多耳篤即中國進士也不願為官只願結會與林斐理等講明天主教約年三十歲時奉會長格老的惡之命同林斐理陽瑪諾三人用大海船在海中行走二年四個月于萬曆二十七年七月內前到廣東廣州府香山縣香山𤀀中約有五月比陽瑪諾留住𤀀中是豐肅同林斐理前至韶州府住幾日又到江西南昌府住四月于萬曆三十九年三月內前到南京西營街居住先十年前有利瑪竇龐迪峩郭居靜羅儒望等已分住南京等處利瑪竇要得進京貢獻寄書𤀀中到王豐肅處索取方物進獻是豐肅携自鳴鐘玻璃鏡等物前來比時利瑪竇先已進京隨將方物等件寄進京貢獻訖比時羅儒望將家火交與王豐肅遂在此建立天主堂聚徒講教約二百餘人每遇房虛昴星日一會寅聚辰散月以為嘗並未他往其林斐理于四十一年六月內病故其尸棺見停天主堂內其陽瑪諾向住𤀀中亦于先年移住南雄府約有幾月前到南京與豐肅同住兩年又往北京三年仍復回南同住于四十三年十二月內仍往南雄居住並未回還本國一向豐肅所用錢糧自西洋國商船帶至𤀀中約有六百兩若欲蓋房便增至千金每年一次是各處分教龐迪峩等分用等語又審得謝務祿面紅白色眼深鼻尖黃鬚供年三十二歲大西洋人曾中多耳篤不願為官亦只會友講學于先年失記月日自搭海船前到廣東𤀀中約有三年六個月等語據此看得謝務祿面貌與豐肅相同其為遠夷無疑陽瑪諾雖未回還本國據稱見在南雄則非潛匿此中明矣緣係劄審事理理合具繇連人解堂伏候裁奪施行須至呈者計開解夷犯二名王豐肅謝務祿見病堂批二犯既查驗明白即移咨都察院轉行巡城衙門遵旨速差員役送至廣東撫按衙門督令西歸萬曆四十五年二月日署郎中主事吳爾成移南京都察院咨南京禮部為遠夷久羈候旨懇乞聖明速賜處分以維風教以肅政體事主客清吏司案呈奉本部送準禮部咨前事該本部題主客清吏司案呈奉本部送據南京禮科給事中晏文輝揭稱前事內云臣惟天地開闢以來而中國之教自伏羲以迄周孔傳心有要闡道有宗天人之理發泄盡矣無容以異説參矣嗣是而老氏出焉楊墨出焉好異者宗之然不過𥨸吾儒之緒餘以鳴其偏見故當時衛道者力闢焉而不使滋蔓乃今又有倡為天主教若北有龐迪峩等南有王豐肅等其名似附於儒其説實異乎正以故南北禮卿參之北科道參之而南卿寺等巡視等衙門各有論疏也今一槩留中而不下豈皇上悉未省覽耶豈謂此輩未見其顯害而姑優容耶夫龐迪峩等在輦轂下誠不知其詳王豐肅等在南中臣得畢其説豐肅數季以前深居簡出入寡交遊未足啓人之疑民與之相忘即士大夫亦與之相忘邇來則有大謬不然者私置花園於孝陵衛廣集徒衆於洪武岡大瞻禮小瞻禮以房虛星昴日為會約灑聖水擦聖油以剪字貼戶門為記號迫人盡去家堂之神令人惟懸天主之像假周濟為招來入其教者即與以銀記年庚為恐嚇背其盟者云置之死對士大夫談則言天性對徒輩論則言神術道路為之喧傳士紳為之疑慮祖宗根本之地教化自出之區而可令若輩久居乎以故禮臣沈據其今日行事虞其將來禍患發憤疏聞誠大有於世道人心者其時臣巡視門禁亦於合疏中附名以上請而御史孫光裕羈之以候旨皆為地方為王化計也豈好為是激聒哉且天帝一也以其形體謂之天以其主宰謂之帝吾儒論之甚精而彼刻天主教要略云天主生於漢哀帝時其名曰耶穌其母曰亞利瑪又云被惡官將十字枷釘死是以西洋罪死之鬼為天主也可乎不可乎將中國一天而西洋又一天耶將漢以前無天主而漢以後始有天主耶據斯謬談直巫覡之邪術也孔氏有言曰攻乎異端斯害也已今正其攻之之時矣更民心易於從邪亦易於返正自王豐肅被論被羈之後聞從其教者一時盡裂戶符而易門對矣安家堂而撤夷像矣悔非遠害散黨離群無復可虞矣惟是王豐肅等尚在羈繫之中未蒙處分之旨守候既久結局無時萬一自斃其如法之未明何烏在其為尊朝廷而懾裔夷哉伏乞速下部議或𩛙我皇綱從重究治或恢我皇度從輕驅逐庶風教維而政體肅矣等因到部送司案呈到部看得南科臣疏請雖未奉旨下部但遠人久在羈禁時令又值嚴寒恐傷天地好生之心相應據揭題覆𥨸照夷夏之防自古嚴之故用夏變夷未聞變於夷者孟軻氏言之確矣王豐肅等之在南龐迪峩等之在北既自稱八萬里之遠人不載貢享突流寓於中華其來己自可疑特昔也隱處一㕓無甚非常可駭之事故置之不論今孝陵衛洪武岡何地也我太祖龍飛興王之所而侈列花園廣集徒衆大倡天主之教利誘術籠無所不至意欲何為此豈聖明之世車書軌物一道同風之景象哉況莫尊於天帝中國者稱天子彼乃出於天子之上乎南禮臣特疏參之而不報南府部臺省合疏參之而不報北科道諸臣暨本部參之亦不報故南科臣晏文輝又有速賜處分之請也職等伏念此輩左道惑衆止於鼓鐸搖鈴倡夷狄之道於中國是書所稱蠻夷猾夏者也此其關係在世道人心為禍顯而遲但其各省盤據果爾出神沒鬼透中國之情形於海外是書所稱寇賊姦宄者也此其關係在廟謨國是為禍隱而大年來皇上德威遐鬯東征西討諸妖氛小醜旋即殄滅視西洋零星諸夷蒙頭蓋面講性説天炫奇弔詭得無謂其頗有智慧無甚禍心姑以包荒於覆載耳寧知彼天主之説謬妄欺君淫邪誣民一至於此即所私創渾天儀自鳴鐘之類俱怪誕不準於繩迂濶無當於用嘗考堯舜之世有璿璣玉衡以齊七政之法歷代相傳有銅壺滴漏以測晷刻之法豈無異如王豐肅龐迪峩等其人絶不聞有此規制也稽祖宗令甲私習天文有禁私通海外諸夷有禁蓋防微杜漸慮至深遠也如皇上憫念遠人簧鼓雖有的據跳梁尚無實迹伏乞將王豐肅龐迪峩等勑下本部轉行各該衙門送廣東聽彼中撫按暫為收管督令西歸庶帡幪之仁以廣睥睨之漸以消統一聖真如日之中天寧謐海宇如盤之鞏固天下後世誦英君之舉動超出尋常萬萬矣等因萬曆四十四年十二月初十日本部署部事左侍郎兼翰林院侍讀學士何宗彥等具題二十八日奉聖旨這奏內遠夷王豐肅等立教惑衆蓄謀叵測爾部移咨南京禮部行文各該衙門速差員役送廣東撫按督令西歸以靜地方其龐迪峩等去歲爾等公言曉知曆法請與各官推演七政且皆係向化來京亦令歸還本國該部院知道欽此欽遵擬合就行為此除將龐迪峩等咨行都察院轉行五城巡視御史衙門至廣東撫按衙門督令西歸外合咨貴部查照本部題奉欽依內事理轉行各該衙門速差員役將王豐肅等送廣東撫按衙門督令西歸一體欽遵施行等因到部原參夷犯陽瑪諾已經先回南雄府另文知會驅逐外見有王豐肅謝務祿二名俱係夷人相應送看得狡夷王豐肅等盤據多年黨與日衆豈容太平之世有此不軌之徒南北交參事非得已近蒙聖明洞悉邪謀立賜驅逐雖云待以不死業已永靖地方但醜類實繁有徒而道里又甚遼遠兼以挾資營幹不無意外生姦仍恐送員役萬一踈虞為纍不小為此合咨貴院轉行五城巡視御史衙門查照禮部題奉欽依事理擇差的當員役將狡夷王豐肅謝務祿二名沿途加意隄防送至廣東撫按衙門交割明白仍聽從長計議督令西歸事竣之日希回文過部以便覆題煩為查照一體欽遵施行萬曆四十五年二月日南京都察院回咨南京都察院為遠夷久羈候旨懇乞聖明速賜處分以維風教以肅政體事據巡視京城監察御史郭一鶚趙紱孫光裕呈據指揮李鈺劉仕曉等齎回總督兩廣軍門今升南京戶部尚書候代周揭帖前事內開準巡視南京中等城河南等道揭帖前事奉南京都察院劄付準南京禮部咨主客清吏司案呈奉本部送準禮部咨該本部題主客清吏司案呈奉本部送據南京禮科給事中晏文輝揭前事題奉聖旨這奏內遠夷王豐肅等立教惑衆蓄謀叵測爾部移咨南京禮部行文各該衙門速差員役送廣東撫按督令西歸以靜地方其龐迪峩等去歲爾等公言曉知曆法請與各官推演七政且皆係向化來京亦令歸還本國該部院知道欽此欽遵備劄到職奉此看得狡夷王豐肅謝務祿連犬羊之類蓄蛇豕之姦盤詰且歷有年黨與所在而是雖覆載恩深既以假其殘息而窺伺情熟未必懷好音意外疏虞萬宜加慎為此選差指揮李鈺劉仕曉帶領兵勇將王豐肅謝務祿二名開具年貌押解前去沿途加意隄防送廣東撫按衙門交割明白仍聽從長計議督令西歸事竣之日希回文過院以憑回報覆部覆題施行又準南京禮部咨前事煩為查照禮部題奉欽依事理將狡夷王豐肅謝務祿委官的當收管及查本部原參夷犯今回住南雄府陽瑪諾一併行提等因并據差官解到夷犯王豐肅謝務祿二名俱經案發廣東布政司會同按都二司將二犯譯審果否西洋國人於何年月日從何處入中國從何路入南京今既奉旨遣還仍從何路歸還本國陽瑪諾見在何處曾否先回龐迪峩計不久解到應否候其同歸其在濠境𤀀各夷有無相識應否責成𤀀夷伴送歸國取具的確口詞酌議通詳及將未獲陽瑪諾嚴去緝拿去後今據該司呈稱廣州府署印同知林有梁審看得夷人王豐肅等以左道簧鼓士民麾之使去是治以不治之法也查王豐肅大西洋國人萬曆二十九年船泊濠境𤀀同行三人一林斐理一陽瑪諾肅與理先駐足韶州數日乃往江西入省住四月直至南京蓋利瑪竇徒也因利瑪竇有望北之行先息于三夷人使居于南為之管事耳後四十一年謝務祿亦繇大西洋船泊𤀀亦繇廣東而江西直抵南京以尋豐肅等先陽瑪諾入𤀀時患病不能進南京留于𤀀七八年方往韶州二年方進南京駐數月即進北京此人頗識天文故龐迪峩邀之同往龐迪峩熊三即與利瑪竇同來者諾後因不服水土不耐寒霜于四十一年還南京至四十三年臘月還南雄今查其人已駕西洋船去其蹤迹不可考也問二夷去向大抵欲入𤀀也但一入𤀀去與不去難以鈐制合就省內另擇一所羈候日撥營兵二名防護之五日一換禁絶通息即牌令𤀀中探有大西洋船欲回時隨就省差指揮官二員帶兵押至船直待其開駕回報以便轉文龐迪峩未知解到何期陽瑪諾合行牌南雄府屬嚴查下落其林斐理四十一年六月內在南京病故今年三月部委上元江寧二縣開驗埋葬訖豐肅務祿回夷日子未知久近月各給火食銀二兩等因具詳到司該本司左布政使臧爾勸右布政使堵維垣會同按察司署印副使羅之鼎都司掌印署都指揮僉事楊維垣譯審得夷人王豐肅謝務祿俱西洋國人豐肅于萬曆二十九年船泊濠境𤀀轉抵韶州而達江西直至南京務祿于四十一年亦船來泊𤀀轉繇廣東江西而至南京茲奉明旨遣還歸國無庸再議但歸國必取道于𤀀去留皆不可知須西洋船至𤀀庶便遣還今西洋船尚未至難定開洋日期合應羈候俟其船到發還其龐迪峩解向未到應候解到之日另行發遣通取開洋日期及𤀀夷不致潛留甘結繳報又據豐肅稟稱陽瑪諾于四十三年十二月內繇南雄回𤀀訖未委虛實應行南雄府嚴查另報再照夷人稽留境上無從得食該府議另擇一所撥兵防護每月給銀二兩似應準從等因到職除批如議行外該職會同巡按廣東監察御史田看得王豐肅等以海外夷人先年越關入廣漸達兩京潛住長安邸舍倡立天主異教惑世誣民法本難貸茲蒙待以不死遣還歸國誠廟堂崇正之訏謨安夏攘夷之長計也萬代瞻仰在此舉矣既經押解前來應即速遣還國苐此夷自西洋入中國取道濠境𤀀夷必多熟識曾經面審並無相識𤀀夷情偽叵測今當暫羈省城防護之以兵優給之以食俟有西洋船到𤀀回國即差的當官督押至船勒令開洋載歸本國取𤀀夷不致容留甘結繳查其龐迪峩熊三續報已到京城業行該司會議併發取各開洋日期呈報若陽瑪諾則稱久已還國除另查核外為此具揭并送廣州府印信收管一本等因到職又準巡按廣東監察御史田牒回前事相同內開隨經案行按察司會同布都二司將發去夷犯譯審後隨據該司經歷司呈奉本司帖文開稱又準布政司照會奉總督兩廣軍門周案驗亦同前事依蒙移會二司酌議及行廣州府將二犯譯審并行南雄府嚴緝陽瑪諾解報及香山縣查𤀀夷有無相識瑪諾密緝拏解又蒙本院案驗奉都察院勘劄亦同前因內稱龐迪峩等已行京城巡視衙門督令起程還國應否候至總發等因行間就據廣州府署印清軍同知林有梁審看于五月二十六日具詳到職除批如議行外本日就據夷人龐迪峩熊三拔赴職投見并順天府原給帖文仰沿途衙門送至廣東而止投撫按查收發回等因隨牌發按察司會同布都二司查驗并同王豐肅等一體羈候及委官督兵防守不致他虞候有洋船至日押發歸國取開洋日期呈報該職會同總督兩廣軍門周看得王豐肅謝務祿之至南京也始托足于濠境繼取道于江西倡邪説以誣民思用夷而變夏此固春秋所為別內外而孟氏所以正人心者奉旨遣歸天恩浩蕩苐兩夷之意亟欲準其入𤀀而三司會議謂宜押令開解參酌輿情若聽其從𤀀而歸是教之以𤀀為窟也寧使𤀀夷不致留存界限于今日毋使狡夷明居𤀀滋隱禍于他年惟有暫羈會城量給館穀俟西洋船至遣還耳其龐迪峩熊三已到巳牌行臬司議之亦宜一體施行若陽瑪諾則稱久已還國除另行查核外合行移復等因到職準此看得狡夷王豐肅等已經差官押送至廣取有撫按牒并廣州府收管一本惟彼中藩臬熟諳夷情今準前因處置停妥事已結局理合呈報伏乞照詳咨部以憑覆題施行等因到院據此案照先準南京禮部咨前事已經備行巡視五城御史查照禮部題奉欽依事理擇差的當員役將王豐肅謝務祿二名沿途加意隄防送廣東撫按衙門交割明白仍聽從長計議督令西歸事竣之日具繇回報以憑咨覆該部覆題施行去後今據回報前因擬合就行咨覆為此移咨貴部煩為查照施行須至咨者萬曆四十五年八月日廣東廣州府今於與收領除將發下夷犯王豐肅謝務祿收候遵照明文施行外中間不違收領是實萬曆四十五年五月日署印本府清軍同知林有梁
